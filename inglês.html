<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relógio Elegance Pro</title>

<!-- Importando fontes clássicas de alta relojoaria -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    transition:1s;
    /* Fundo Inicial: Verde Real com reflexo dourado sutil */
    background:
    radial-gradient(circle at top,#00331f 0%,#000 70%),
    linear-gradient(135deg,#02110b,#000);
}

.container{
    text-align:center;
    z-index:2;
    /* Efeito de vidro escuro no mostrador */
    background: rgba(0, 0, 0, 0.3);
    padding: 40px 60px;
    border-radius: 8px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.03);
    box-shadow: 0 30px 60px rgba(0,0,0,0.8);
}

.clock{
    font-family: 'Space Grotesk', sans-serif;
    font-size:110px;
    font-weight:700;
    letter-spacing:-2px;
    /* Degradê metálico suave nos números, sem o borrão neon */
    background: linear-gradient(to bottom, #ffffff 60%, #dcdcdc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
}

.date{
    font-family: 'Playfair Display', Georgia, serif;
    color:#a5a5a5;
    margin-top:20px;
    font-size:22px;
    letter-spacing:1px;
    font-style: italic;
}

.logo{
    font-family: 'Playfair Display', Georgia, serif;
    margin-top:30px;
    color:#d4af37; /* Cor Ouro */
    font-size:14px;
    font-weight: 700;
    text-transform:uppercase;
    letter-spacing:8px;
}

/* Transformei os círculos flutuantes em reflexos sutis de luz (efeito Sunburst) */
.circle{
    position:absolute;
    border-radius:50%;
    background:#ffffff03;
    filter: blur(40px);
    animation:float 12s infinite ease-in-out;
}

.circle:nth-child(1){
    width:500px;
    height:500px;
    top:-10%;
    left:5%;
}

.circle:nth-child(2){
    width:400px;
    height:400px;
    bottom:-10%;
    right:5%;
    animation-delay:3s;
}

#btnTema{
    margin-top:40px;
    padding:12px 28px;
    background: transparent;
    border:1px solid rgba(212, 175, 55, 0.4);
    color: #d4af37;
    border-radius:4px;
    cursor:pointer;
    font-family: 'Space Grotesk', sans-serif;
    font-size:11px;
    font-weight:bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition:.4s;
}

#btnTema:hover{
    background: #d4af37;
    color: #000;
    border-color: #d4af37;
    box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
}

@keyframes float{
    0%,100%{
        transform:translate(0px, 0px) scale(1);
    }
    50%{
        transform:translate(-20px, -20px) scale(1.05);
    }
}

</style>
</head>
<body>

<div class="circle"></div>
<div class="circle"></div>

<div class="container">

    <div class="clock" id="clock">
        00:00:00
    </div>

    <div class="date" id="date">
        Carregando...
    </div>

    <div class="logo">
        ADAN GOMES
    </div>

    <button onclick="trocarFundo()" id="btnTema">
        🎨 TROCAR FUNDO
    </button>

</div>

<script>

// =====================
// RELÓGIO
// =====================

function atualizarRelogio(){

    const agora = new Date();

    const hora = String(agora.getHours()).padStart(2,'0');
    const min = String(agora.getMinutes()).padStart(2,'0');
    const seg = String(agora.getSeconds()).padStart(2,'0');

    document.getElementById("clock").innerHTML =
    `${hora}:${min}:${seg}`;

    const opcoes = {
        weekday:'long',
        day:'2-digit',
        month:'long',
        year:'numeric'
    };

    let dataFormatada = agora.toLocaleDateString('pt-BR',opcoes);
    // Deixa a primeira letra maiúscula para ficar mais formal
    dataFormatada = dataFormatada.charAt(0).toUpperCase() + dataFormatada.slice(1);

    document.getElementById("date").innerHTML = dataFormatada;

}

setInterval(atualizarRelogio,1000);
atualizarRelogio();


// =====================
// 5 FUNDOS PROFISSIONAIS (Estilo Relojoaria Suíça)
// =====================

const fundos = [

/* 1. Verde Clássico (Rolex Green) */
`radial-gradient(circle at top,#00331f 0%,#000 70%),
 linear-gradient(135deg,#02110b,#000)`,

/* 2. Azul Abissal (Deepsea Blue) */
`radial-gradient(circle at top,#001f3f 0%,#000 70%),
 linear-gradient(135deg,#000b18,#000)`,

/* 3. Ouro Rosa (Everose) */
`radial-gradient(circle at top,#221010 0%,#000 70%),
 linear-gradient(135deg,#110505,#000)`,

/* 4. Preto Platina (Onyx) */
`radial-gradient(circle at top,#161616 0%,#000 70%),
 linear-gradient(135deg,#0a0a0a,#000)`,

/* 5. Vinho Nobre (Bordeaux) */
`radial-gradient(circle at top,#2a0813 0%,#000 70%),
 linear-gradient(135deg,#120207,#000)`

];

let fundoAtual = 0;

function trocarFundo(){

    fundoAtual++;

    if(fundoAtual >= fundos.length){
        fundoAtual = 0;
    }

    document.body.style.background = fundos[fundoAtual];

}

</script>

</body>
</html>
