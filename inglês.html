<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relógio Neon Pro</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    transition:1s;
    background:
    radial-gradient(circle at top,#ff000040,#000),
    linear-gradient(135deg,#050505,#151515);
}

.container{
    text-align:center;
    z-index:2;
}

.clock{
    font-size:110px;
    font-weight:900;
    color:#fff;
    letter-spacing:5px;

    text-shadow:
    0 0 10px #ff0000,
    0 0 20px #ff0000,
    0 0 40px #ff0000,
    0 0 80px #ff0000;
}

.date{
    color:#fff;
    margin-top:20px;
    font-size:28px;
    letter-spacing:2px;
}

.logo{
    margin-top:30px;
    color:#ff0000;
    font-size:20px;
    text-transform:uppercase;
    letter-spacing:6px;
}

.circle{
    position:absolute;
    border-radius:50%;
    background:#ffffff10;
    animation:float 8s infinite ease-in-out;
}

.circle:nth-child(1){
    width:300px;
    height:300px;
    top:10%;
    left:10%;
}

.circle:nth-child(2){
    width:200px;
    height:200px;
    bottom:10%;
    right:10%;
    animation-delay:2s;
}

#btnTema{
    margin-top:30px;
    padding:15px 30px;
    border:none;
    border-radius:40px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:.3s;
}

#btnTema:hover{
    transform:scale(1.08);
}

@keyframes float{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-30px);
    }
}

</style>
</head>
<body>

<div class="circle"></div>
<div class="circle"></div>

<div class="container">

    <div class="clock" id="clock">
        00:00:00
    </div>

    <div class="date" id="date">
        Carregando...
    </div>

    <div class="logo">
        ADAN GOMES
    </div>

    <button onclick="trocarFundo()" id="btnTema">
        🎨 TROCAR FUNDO
    </button>

</div>

<script>

// =====================
// RELÓGIO
// =====================

function atualizarRelogio(){

    const agora = new Date();

    const hora = String(agora.getHours()).padStart(2,'0');
    const min = String(agora.getMinutes()).padStart(2,'0');
    const seg = String(agora.getSeconds()).padStart(2,'0');

    document.getElementById("clock").innerHTML =
    `${hora}:${min}:${seg}`;

    const opcoes = {
        weekday:'long',
        day:'2-digit',
        month:'long',
        year:'numeric'
    };

    document.getElementById("date").innerHTML =
    agora.toLocaleDateString('pt-BR',opcoes);

}

setInterval(atualizarRelogio,1000);
atualizarRelogio();


// =====================
// 5 FUNDOS PROFISSIONAIS
// =====================

const fundos = [

`radial-gradient(circle at top,#ff000040,#000),
 linear-gradient(135deg,#050505,#151515)`,

`radial-gradient(circle at top,#00e5ff40,#000),
 linear-gradient(135deg,#001f3f,#000814)`,

`radial-gradient(circle at top,#00ff6640,#000),
 linear-gradient(135deg,#001a0a,#000)`,

`radial-gradient(circle at top,#ff00ff40,#000),
 linear-gradient(135deg,#2b1055,#000)`,

`radial-gradient(circle at top,#ffaa0040,#000),
 linear-gradient(135deg,#2a1400,#000)`

];

let fundoAtual = 0;

function trocarFundo(){

    fundoAtual++;

    if(fundoAtual >= fundos.length){
        fundoAtual = 0;
    }

    document.body.style.background = fundos[fundoAtual];

}

</script>

</body>
</html>
