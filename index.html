<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KINGS BURGER - Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --primary-red: #e61e1e;
            --secondary-gray: #2a2a2a;
            --text-muted: #888;
        }

        body { background-color: var(--bg-dark); color: #fff; font-family: sans-serif; margin: 0; }

        /* HEADER FIXO COM PROGRESSO */
        .checkout-header {
            background: var(--bg-dark);
            padding: 20px 10px;
            border-bottom: 1px dashed #333;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .steps-bar { display: flex; justify-content: space-between; max-width: 450px; margin: auto; position: relative; }
        .step-item { display: flex; flex-direction: column; align-items: center; flex: 1; z-index: 2; }
        .step-circle { 
            width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--primary-red);
            background: var(--bg-dark); display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 14px; margin-bottom: 8px; transition: 0.3s;
        }
        .step-item.active .step-circle { background: var(--primary-red); color: #fff; }
        .step-item.active .step-label { color: var(--primary-red); }
        .step-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
        
        /* Linha conectora */
        .steps-bar::before {
            content: ''; position: absolute; top: 16px; left: 10%; right: 10%;
            height: 2px; background: #333; z-index: 1;
        }

        /* CONTEÚDO */
        .content-area { padding: 20px; max-width: 500px; margin: auto; }
        .card-entrega { background: var(--card-bg); border-radius: 12px; padding: 20px; margin-top: 10px; }
        
        .form-label-custom { color: var(--text-muted); font-size: 14px; margin-bottom: 5px; display: block; }
        .form-control-custom {
            background: var(--secondary-gray); border: 1px solid #444; color: #fff;
            padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 15px;
        }
        .form-control-custom:focus { outline: 1px solid var(--primary-red); }

        .btn-add-address {
            border: 2px dashed #444; background: transparent; color: #fff;
            padding: 20px; border-radius: 12px; width: 100%; margin-top: 15px;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        .btn-gps {
            border: 1px solid var(--primary-red); background: transparent; color: var(--primary-red);
            padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: bold;
        }

        .btn-next { background: #00c853; border: none; color: #fff; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; }
        
        #lista-sugestoes { background: #222; border-radius: 8px; overflow: hidden; margin-top: -10px; margin-bottom: 15px; display: none; }
        .sugestao-item { padding: 15px; border-bottom: 1px solid #333; font-size: 13px; cursor: pointer; }

        /* LOADING */
        #loading { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner-border text-warning"></div>
    <p class="mt-3">Calculando frete real...</p>
</div>

<div class="checkout-header">
    <div class="steps-bar">
        <div class="step-item" id="st-1"><div class="step-circle">1</div><div class="step-label">Login</div></div>
        <div class="step-item active" id="st-2"><div class="step-circle">2</div><div class="step-label">Entrega</div></div>
        <div class="step-item" id="st-3"><div class="step-circle">3</div><div class="step-label">Pagamento</div></div>
        <div class="step-item" id="st-4"><div class="step-circle">4</div><div class="step-label">Revisão</div></div>
    </div>
</div>

<div class="content-area">
    
    <div id="tela-inicial-entrega">
        <h6 class="mb-4">Escolha uma opção</h6>
        <div class="form-check mb-3">
            <input class="form-check-input" type="radio" name="tipo" id="retirar">
            <label class="form-check-label" for="retirar">Quero retirar este pedido</label>
        </div>
        <div class="form-check mb-4">
            <input class="form-check-input" type="radio" name="tipo" id="entregar" checked>
            <label class="form-check-label" for="entregar">Quero que entregue este pedido</label>
        </div>

        <p class="text-muted small">Seus endereços cadastrados</p>
        <p class="small">Não há endereços cadastrados</p>

        <button class="btn-add-address" onclick="abrirNovoEndereco()">
            <span style="font-size: 24px;">⊕</span>
            <span>Adicionar um novo endereço</span>
        </button>
    </div>

    <div id="tela-novo-endereco" style="display:none;">
        <div class="d-flex justify-content-between align-items:center mb-4">
            <h5>Novo endereço</h5>
            <button class="btn-close btn-close-white" onclick="fecharNovoEndereco()"></button>
        </div>

        <input type="text" id="busca-rua" class="form-control-custom" placeholder="Buscar endereço e número">
        <div id="lista-sugestoes"></div>

        <button class="btn-gps">
            <span>📍</span> Usar minha localização
        </button>

        <div id="detalhes-endereco" style="display:none;">
            <label class="form-label-custom">Número</label>
            <input type="text" id="num" class="form-control-custom" placeholder="Ex: 123">
            
            <label class="form-label-custom">Bairro</label>
            <input type="text" id="bairro" class="form-control-custom" readonly>

            <button class="btn-next" onclick="finalizarEndereco()">Salvar e Calcular Taxa</button>
        </div>
    </div>
</div>

<script>
    const GEO_KEY = "208f6874a48c45e68761f3d994db6775";
    const ORIGEM = { lat: -26.464334, lon: -49.024909 };
    let latDest = null, lonDest = null;

    function abrirNovoEndereco() {
        document.getElementById('tela-inicial-entrega').style.display = 'none';
        document.getElementById('tela-novo-endereco').style.display = 'block';
    }

    function fecharNovoEndereco() {
        document.getElementById('tela-novo-endereco').style.display = 'none';
        document.getElementById('tela-inicial-entrega').style.display = 'block';
    }

    // Busca de Endereço
    const inputBusca = document.getElementById('busca-rua');
    const lista = document.getElementById('lista-sugestoes');

    inputBusca.addEventListener('input', async () => {
        if(inputBusca.value.length < 3) return lista.style.display = 'none';
        
        const res = await fetch(`https://api.geoapify.com/v1/geocode/autocomplete?text=${encodeURIComponent(inputBusca.value + " Jaraguá do Sul")}&apiKey=${GEO_KEY}`);
        const data = await res.json();
        
        lista.innerHTML = data.features.map(f => `
            <div class="sugestao-item" onclick="selecionar('${f.properties.street}', '${f.properties.suburb}', ${f.properties.lat}, ${f.properties.lon})">
                ${f.properties.street} - ${f.properties.suburb || 'Jaraguá do Sul'}
            </div>
        `).join('');
        lista.style.display = 'block';
    });

    function selecionar(rua, bairro, lat, lon) {
        inputBusca.value = rua;
        document.getElementById('bairro').value = bairro || "Centro";
        latDest = lat; lonDest = lon;
        lista.style.display = 'none';
        document.getElementById('detalhes-endereco').style.display = 'block';
    }

    function finalizarEndereco() {
        const num = document.getElementById('num').value;
        if(!num) return alert("Digite o número!");

        document.getElementById('loading').style.display = 'flex';

        // Cálculo da Taxa Real
        const R = 6371;
        const dLat = (latDest - ORIGEM.lat) * Math.PI / 180;
        const dLon = (lonDest - ORIGEM.lon) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(ORIGEM.lat*Math.PI/180) * Math.cos(latDest*Math.PI/180) * Math.sin(dLon/2)**2;
        const dist = R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));

        const taxa = 5 + (dist * 4); // Sua lógica de frete

        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
            alert(`Endereço Salvo! Taxa de Entrega: R$ ${taxa.toFixed(2)}`);
            // Aqui você avançaria para o passo 3 (Pagamento)
        }, 1200);
    }
</script>
</body>
</html>
