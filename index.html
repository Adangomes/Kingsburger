<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KINGS BURGER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="loading-geral" class="loading-overlay" style="display:none;">
    <div class="spinner-border text-warning" role="status"></div>
    <p id="loading-text" class="mt-2" style="color: white; font-weight: bold;">Calculando entrega...</p>
</div>

<div id="toast-geral" class="toast-custom">Produto adicionado! ✅</div>

<header class="header">
    <div class="header-top">
        <div class="logo-container">
            <div class="logo">KINGS BURGER</div>
            <div id="status-loja" class="status">VERIFICANDO...</div>
        </div>
        <div id="cart-icon-container" class="cart" onclick="abrirCarrinho()">
            <span class="cart-emoji">🛒</span>
            <span id="cart-count" class="cart-badge">0</span>
        </div>
    </div>
</header>

<nav id="categorias-nav" class="categorias-nav">
    <div id="categorias-scroll" class="categorias-scroll"></div>
</nav>

<main id="cardapio-corpo" class="container-main"></main>

<div id="cart-modal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
        <div class="modal-header-clean">
            <h3>Meu Carrinho</h3>
            <button onclick="fecharCarrinho()" class="btn-fechar-modal">✕</button>
        </div>
        <div id="cart-items" class="cart-items-list"></div>
        
        <div class="summary-box">
            <div class="summary-line"><span>Subtotal</span><span id="subtotal">R$ 0,00</span></div>
            <div class="summary-line total"><span>Total</span><span id="total">R$ 0,00</span></div>
        </div>
        
        <div class="modal-actions">
            <button class="btn-finalizar" onclick="abrirDelivery()">Finalizar Pedido</button>
            <button class="btn-continuar" onclick="fecharCarrinho()">Continuar Comprando</button>
        </div>
    </div>
</div>

<div id="delivery-modal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
        <div id="form-entrega">
            <div class="modal-header-clean">
                <h3>Entrega</h3>
                <button onclick="fecharDelivery()" class="btn-fechar-modal">✕</button>
            </div>
            
            <div class="form-grid">
                <input type="text" id="nomeCliente" placeholder="Seu Nome">
                <input type="text" id="telefone" placeholder="Seu telefone">
                
                <select id="cidade">
                    <option value="Jaraguá do Sul">Jaraguá do Sul</option>
                    <option value="Guaramirim">Guaramirim</option>
                    <option value="Schroeder">Schroeder</option>
                </select>

                <div style="position: relative; width: 100%;">
                    <input type="text" id="rua" placeholder="Digite o nome da rua" autocomplete="off">
                    <div id="lista-sugestoes"></div> </div>

                <div class="row-inputs">
                    <input type="text" id="numero" placeholder="Nº" style="flex:1">
                    <input type="text" id="bairro" placeholder="Bairro" style="flex:2">
                </div>

                <input type="text" id="referencia" placeholder="Ponto de Referência">
                <textarea id="obsPedido" placeholder="Observações (ex: Sem cebola)" rows="2"></textarea>
                
                <select id="pagamento" onchange="toggleTroco(this.value)">
                    <option value="Pix">Pix</option>
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Cartão">Cartão</option>
                </select>
                
                <div id="div-troco" style="display:none;">
                    <input type="text" id="trocoPara" placeholder="Troco para quanto?">
                </div>
            </div>
            
            <button class="btn-principal w-100 mt-3" onclick="processarResumoGeo()">Calcular Taxa e Ver Resumo</button>
        </div>

        <div id="resumo-pedido" style="display:none;">
            <div class="modal-header-clean"><h3>Resumo Final</h3></div>
            <div id="resumo-itens" class="resumo-lista"></div>
            <div id="resumo-taxa" class="resumo-valores p-2 bg-light rounded"></div>
            <h4 id="resumo-total" class="resumo-total-final text-center mt-3"></h4>
            
            <div class="modal-actions">
                <button class="btn-secundario" onclick="voltarParaEntrega()">Corrigir Endereço</button>
                <button class="btn-whatsapp" onclick="enviarPedidoFirebase()">Confirmar e Enviar Pedido</button>
            </div>
        </div>
    </div>
</div>

<div class="bottom-nav-container">
    <nav class="bottom-nav">
        <a href="javascript:void(0)" class="nav-item" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
            <i class="fas fa-home"></i>
            <span class="nav-label">Início</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="verificarStatusPedido()">
            <i class="fas fa-receipt"></i>
            <span class="nav-label">Pedidos</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="abrirPainelAdmin()">
            <i class="fas fa-user-shield"></i>
            <span class="nav-label">Admin</span>
        </a>
    </nav>
</div>

</body>
</html>
