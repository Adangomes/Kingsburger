<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KINGS BURGER</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


</head>

<body>

<div class="header">
<div class="logo">KINGS BURGER</div>
</div>

<div class="container mt-4">

<h3>Cardápio</h3>

<div id="lista-produtos"></div>

<hr>

<h4>Carrinho</h4>

<div id="carrinho"></div>

<p>
Subtotal: <b id="subtotal">R$ 0</b>
</p>

<button onclick="abrirEntrega()">Finalizar Pedido</button>

</div>

<!-- MODAL ENTREGA -->

<div id="modalEntrega" style="display:none;padding:20px">

<h3>Endereço</h3>

<input id="nomeCliente" class="form-control mb-2" placeholder="Seu nome">

<input id="telefone" class="form-control mb-2" placeholder="Telefone">

<div style="position:relative">

<input id="rua" class="form-control mb-2" placeholder="Digite seu endereço">

<div id="sugestoes"></div>

</div>

<input id="numero" class="form-control mb-2" placeholder="Número">

<input id="bairro" class="form-control mb-2" placeholder="Bairro">

<button onclick="processarResumoGeo()">Calcular Entrega</button>

<hr>

<div id="resumo"></div>

<button onclick="enviarPedidoFirebase()">Enviar Pedido</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
