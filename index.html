<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KINGS BURGER - Finalize seu Pedido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            --card-dark: #1e1e1e;
            --primary-orange: #f4511e;
            --text-gray: #a0a0a0;
            --border-color: #333;
        }

        body { background-color: var(--bg-dark); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; }

        /* BARRA DE PROGRESSO */
        .steps-container { display: flex; justify-content: space-between; align-items: center; padding: 20px 10px; max-width: 400px; margin: auto; }
        .step { display: flex; flex-direction: column; align-items: center; position: relative; flex: 1; }
        .step-circle { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary-orange); display: flex; align-items: center; justify-content: center; font-weight: bold; margin-bottom: 5px; background: var(--bg-dark); z-index: 2; }
        .step.active .step-circle { background: var(--primary-orange); color: #fff; }
        .step-label { font-size: 10px; color: var(--text-gray); text-transform: uppercase; }
        .step:not(:last-child)::after { content: ''; position: absolute; height: 2px; background: var(--border-color); width: 100%; top: 17px; left: 50%; z-index: 1; }

        /* MODAL E CARDS */
        .checkout-box { background: var(--card-dark); border-radius: 15px 15px 0 0; padding: 20px; position: fixed; bottom: 0; width: 100%; max-width: 500px; left: 50%; transform: translateX(-50%); max-height: 90vh; overflow-y: auto; }
        
        .form-control { background: transparent; border: 1px solid var(--border-color); color: #fff; border-radius: 8px; padding: 12px; margin-bottom: 15px; }
        .form-control:focus { background: transparent; border-color: var(--primary-orange); color: #fff; box-shadow: none; }
        .form-control::placeholder { color: #555; }

        .btn-orange { background: var(--primary-orange); border: none; color: #fff; font-weight: bold; padding: 14px; border-radius: 10px; width: 100%; }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: #fff; padding: 10px; border-radius: 8px; width: 100%; margin-top: 10px; }

        /* AUTOCOMPLETE PROFISSIONAL */
        #lista-sugestoes { background: #222; border: 1px solid var(--border-color); border-radius: 8px; position: absolute; width: 100%; z-index: 9999; display: none; margin-top: -10px; }
        .sugestao-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; font-size: 14px; }
        .sugestao-item:last-child { border: none; }

        #loading-geral { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div id="loading-geral">
    <div class="spinner-border text-warning"></div>
    <p class="mt-3">Calculando frete real...</p>
</div>

<div class="steps-container">
    <div class="step active"><div class="step-circle">1</div><div class="step-label">Entrega</div></div>
    <div class="step"><div class="step-circle">2</div><div class="step-label">Pagamento</div></div>
    <div class="step"><div class="step-circle">3</div><div class="step-label">Revisão</div></div>
    <div class="step"><div class="step-circle">4</div><div class="step-label">Acompanhar</div></div>
</div>

<div class="checkout-box">
    <div id="tela-dados">
        <h5 class="mb-4">Preencha seus dados</h5>
        <input type="text" id="nome" class="form-control" placeholder="Nome">
        <input type="text" id="telefone" class="form-control" placeholder="Telefone">
        <button class="btn-orange" onclick="proximo('entrega')">Próximo</button>
    </div>

    <div id="tela-entrega" style="display:none">
        <h5 class="mb-4">Endereço de Entrega</h5>
        <div style="position:relative">
            <input type="text" id="rua-busca" class="form-control" placeholder="Buscar endereço e número">
            <div id="lista-sugestoes"></div>
        </div>
        
        <div id="campos-detalhe" style="display:none">
            <input type="text" id="numero" class="form-control" placeholder="Número">
            <input type="text" id="bairro" class="form-control" placeholder="Bairro">
            <input type="text" id="ponto" class="form-control" placeholder="Ponto de Referência (Opcional)">
            <button class="btn-orange" onclick="calcularFreteFinal()">Calcular Taxa e Ver Resumo</button>
        </div>
    </div>

    <div id="tela-resumo" style="display:none">
        <h5 class="mb-3">Resumo Final</h5>
        <div id="detalhes-pedido" class="p-3 mb-3" style="background:#262626; border-radius:10px">
            </div>
        <button class="btn-orange" style="background:#25d366" onclick="enviarWhats()">Confirmar e Enviar Pedido</button>
        <button class="btn-outline" onclick="voltar()">Corrigir Endereço</button>
    </div>
</div>

<script>
    const GEO_KEY = "208f6874a48c45e68761f3d994db6775";
    const ORIGEM = { lat: -26.464334, lon: -49.024909 };
    let latDestino = null, lonDestino = null;

    // Autocomplete Lógica
    const inputBusca = document.getElementById('rua-busca');
    const lista = document.getElementById('lista-sugestoes');

    inputBusca.addEventListener('input', async () => {
        if(inputBusca.value.length < 3) return lista.style.display = 'none';
        
        try {
            const res = await fetch(`https://api.geoapify.com/v1/geocode/autocomplete?text=${encodeURIComponent(inputBusca.value + " Jaraguá do Sul")}&apiKey=${GEO_KEY}`);
            const data = await res.json();
            
            lista.innerHTML = data.features.map(f => `
                <div class="sugestao-item" onclick="selecionar('${f.properties.street}', '${f.properties.suburb}', ${f.properties.lat}, ${f.properties.lon})">
                    <small>📍</small> ${f.properties.street}, ${f.properties.suburb || 'Jaraguá'}
                </div>
            `).join('');
            lista.style.display = 'block';
        } catch(e) { console.error(e); }
    });

    function selecionar(rua, bairro, lat, lon) {
        inputBusca.value = rua;
        document.getElementById('bairro').value = bairro || "";
        latDestino = lat; lonDestino = lon;
        lista.style.display = 'none';
        document.getElementById('campos-detalhe').style.display = 'block';
    }

    function proximo(fase) {
        if(fase === 'entrega') {
            document.getElementById('tela-dados').style.display = 'none';
            document.getElementById('tela-entrega').style.display = 'block';
        }
    }

    async function calcularFreteFinal() {
        if(!latDestino) return alert("Selecione a rua na lista!");
        
        document.getElementById('loading-geral').style.display = 'flex';

        // Cálculo Haversine
        const R = 6371;
        const dLat = (latDestino - ORIGEM.lat) * Math.PI / 180;
        const dLon = (lonDestino - ORIGEM.lon) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(ORIGEM.lat*Math.PI/180) * Math.cos(latDestino*Math.PI/180) * Math.sin(dLon/2)**2;
        const dist = R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));

        const taxa = 5 + (dist * 4); // R$ 5 base + 4 por KM
        
        setTimeout(() => {
            document.getElementById('loading-geral').style.display = 'none';
            document.getElementById('tela-entrega').style.display = 'none';
            document.getElementById('tela-resumo').style.display = 'block';
            
            document.getElementById('detalhes-pedido').innerHTML = `
                <div class="d-flex justify-content-between mb-2"><span>Subtotal:</span> <b>R$ 47.98</b></div>
                <div class="d-flex justify-content-between mb-2"><span style="color:#25d366">Taxa de Entrega:</span> <b>R$ ${taxa.toFixed(2)}</b></div>
                <hr style="border-color:#444">
                <div class="d-flex justify-content-between"><h5>Total:</h5> <h5>R$ ${(47.98 + taxa).toFixed(2)}</h5></div>
            `;
        }, 1500);
    }

    function voltar() {
        document.getElementById('tela-resumo').style.display = 'none';
        document.getElementById('tela-entrega').style.display = 'block';
    }

    function enviarWhats() {
        alert("Pedido enviado para o WhatsApp!");
    }
</script>

</body>
</html>
