<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KINGS BURGER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #f8f8f8; color: #222; overflow-x: hidden; }

        /* HEADER */
        .header { background: #000; padding: 15px; position: sticky; top: 0; z-index: 1100; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.2rem; font-weight: 800; text-transform: uppercase; }

        /* LISTA DE PRODUTOS */
        .container-main { padding: 15px; max-width: 600px; margin: auto; padding-bottom: 100px; }
        .item-produto { background: #fff; display: flex; justify-content: space-between; padding: 15px; border-radius: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* MODAIS */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; display: none; align-items: flex-end; justify-content: center; }
        .modal-box { background: #fff; width: 100%; max-width: 500px; border-radius: 25px 25px 0 0; padding: 20px; max-height: 90vh; overflow-y: auto; }

        /* AUTOCOMPLETE SUPER Z-INDEX */
        #lista-sugestoes { 
            position: absolute; width: 100%; background: white; border: 2px solid #ff6b00; 
            z-index: 999999 !important; border-radius: 8px; display: none; max-height: 200px; overflow-y: auto;
        }
        .sugestao-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; color: #000; }

        /* LOADING TRAVAMENTO */
        #loading-geral { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 99999; 
            display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; 
        }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 10px; z-index: 1000; }
        .nav-hidden { display: none !important; }
        .btn-principal { background: #ff6b00; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 800; margin-top: 10px; }
    </style>
</head>
<body>

<div id="loading-geral">
    <div class="spinner-border text-warning"></div>
    <p class="mt-2">Calculando frete real...</p>
</div>

<header class="header">
    <div class="logo">KINGS BURGER</div>
    <div onclick="abrirCarrinho()" style="color:white; cursor:pointer">🛒 <span id="cart-count">0</span></div>
</header>

<main class="container-main" id="cardapio"></main>

<div id="delivery-modal" class="modal-overlay">
    <div class="modal-box">
        <div id="form-entrega">
            <div class="d-flex justify-content-between mb-3">
                <h3>Entrega</h3>
                <button onclick="fecharDelivery()" class="btn">✕</button>
            </div>
            <input type="text" id="nomeCliente" class="form-control mb-2" placeholder="Seu Nome">
            <select id="cidade" class="form-select mb-2">
                <option value="Jaraguá do Sul">Jaraguá do Sul</option>
                <option value="Guaramirim">Guaramirim</option>
            </select>
            <div style="position:relative">
                <input type="text" id="rua" class="form-control mb-2" placeholder="Nome da Rua" autocomplete="off">
                <div id="lista-sugestoes"></div>
            </div>
            <input type="text" id="numero" class="form-control mb-2" placeholder="Número">
            <button class="btn-principal" onclick="processarResumoGeo()">Calcular Taxa</button>
        </div>

        <div id="resumo-pedido" style="display:none;">
            <h3>Resumo Final</h3>
            <div id="detalhes-resumo" class="my-3"></div>
            <button class="btn-principal bg-success" onclick="finalizarPedido()">Enviar WhatsApp</button>
            <button class="btn btn-link w-100" onclick="voltar()">Corrigir Endereço</button>
        </div>
    </div>
</div>

<nav class="bottom-nav" id="menu-inferior">
    <div style="color:white text-align:center">🏠<br>Início</div>
    <div style="color:white text-align:center">📋<br>Pedidos</div>
</nav>

<script>
    const GEOAPIFY_KEY = "208f6874a48c45e68761f3d994db6775";
    const RESTAURANTE_COORD = { lat: -26.464334, lon: -49.024909 };
    const TAXA_BASE = 5.00;
    const VALOR_POR_KM = 4.00;

    let carrinho = [];
    let latDestino = null, lonDestino = null;

    // Renderizar Cardápio Simples
    const itens = [{t: "Kings Tradicional", p: 23.99}, {t: "Kings Duplo", p: 34.99}];
    document.getElementById('cardapio').innerHTML = itens.map(i => `
        <div class="item-produto" onclick="add('${i.t}', ${i.p})">
            <span>${i.t}</span><b>R$ ${i.p}</b>
        </div>
    `).join('');

    function add(t, p) {
        carrinho.push({t, p});
        document.getElementById('cart-count').innerText = carrinho.length;
        abrirCarrinho();
    }

    // AUTOCOMPLETE
    const inputRua = document.getElementById('rua');
    const sugestaoBox = document.getElementById('lista-sugestoes');

    inputRua.addEventListener('input', async () => {
        if(inputRua.value.length < 3) return sugestaoBox.style.display = 'none';
        try {
            const res = await fetch(`https://api.geoapify.com/v1/geocode/autocomplete?text=${encodeURIComponent(inputRua.value)}&apiKey=${GEOAPIFY_KEY}`);
            const data = await res.json();
            sugestaoBox.innerHTML = data.features.map(f => `
                <div class="sugestao-item" onclick="sel('${f.properties.street}', ${f.properties.lat}, ${f.properties.lon})">
                    ${f.properties.street}
                </div>
            `).join('');
            sugestaoBox.style.display = 'block';
        } catch(e) { console.error("Erro busca", e); }
    });

    function sel(r, lt, ln) {
        inputRua.value = r;
        latDestino = lt; lonDestino = ln;
        sugestaoBox.style.display = 'none';
    }

    // CÁLCULO COM TIMEOUT (IMPEDE TRAVAMENTO)
    async function processarResumoGeo() {
        const loading = document.getElementById('loading-geral');
        loading.style.display = 'flex';

        // Cria uma promessa de "limite de tempo" de 8 segundos
        const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 8000));

        try {
            // Tenta buscar a coordenada se não tiver clicado na lista
            if(!latDestino) {
                const buscaReal = fetch(`https://api.geoapify.com/v1/geocode/search?text=${encodeURIComponent(inputRua.value)}&apiKey=${GEOAPIFY_KEY}`).then(r => r.json());
                const data = await Promise.race([buscaReal, timeout]); // Quem ganhar leva!
                if(data.features?.length > 0) {
                    latDestino = data.features[0].geometry.coordinates[1];
                    lonDestino = data.features[0].geometry.coordinates[0];
                }
            }

            let taxa = TAXA_BASE;
            if(latDestino) {
                const dist = calcDist(RESTAURANTE_COORD.lat, RESTAURANTE_COORD.lon, latDestino, lonDestino);
                taxa = TAXA_BASE + (dist * VALOR_POR_KM);
            }

            exibirResumo(taxa);
        } catch (e) {
            console.warn("API demorou ou falhou. Usando taxa mínima.");
            exibirResumo(TAXA_BASE);
        } finally {
            loading.style.display = 'none';
        }
    }

    function calcDist(l1, o1, l2, o2) {
        const R = 6371;
        const dLat = (l2-l1)*Math.PI/180;
        const dLon = (o2-o1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function exibirResumo(taxa) {
        const sub = carrinho.reduce((a,b) => a + b.p, 0);
        document.getElementById('form-entrega').style.display = 'none';
        document.getElementById('resumo-pedido').style.display = 'block';
        document.getElementById('detalhes-resumo').innerHTML = `
            Subtotal: R$ ${sub.toFixed(2)}<br>
            Taxa Entrega: R$ ${taxa.toFixed(2)}<br>
            <b>Total: R$ ${(sub + taxa).toFixed(2)}</b>
        `;
    }

    // MODAIS
    function abrirCarrinho() { 
        document.getElementById('delivery-modal').style.display = 'flex'; 
        document.getElementById('menu-inferior').classList.add('nav-hidden');
    }
    function fecharDelivery() { 
        document.getElementById('delivery-modal').style.display = 'none'; 
        document.getElementById('menu-inferior').classList.remove('nav-hidden');
    }
    function voltar() {
        document.getElementById('resumo-pedido').style.display = 'none';
        document.getElementById('form-entrega').style.display = 'block';
    }
</script>
</body>
</html>
