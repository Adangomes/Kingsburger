<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kings Admin - Final Pro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        :root { --gold: #ffc107; --dark-bg: #0a0a0a; --card-bg: #161616; }
        body { background: var(--dark-bg); color: white; padding-bottom: 80px; font-family: 'Segoe UI', sans-serif; }
        
        .card-custom { background: var(--card-bg); border: 1px solid #333; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
        
        .card-prod { 
            background: #1a1a1a; border-radius: 10px; border-left: 4px solid var(--gold); 
            padding: 12px !important; margin-bottom: 15px; transition: 0.2s;
        }
        /* Classe que escurece o produto inativo */
        .card-prod.is-hidden { opacity: 0.4; filter: grayscale(1); border-left-color: #555; }
        
        .img-wrap { width: 80px; text-align: center; }
        .img-admin { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; background: #333; }

        .form-control { 
            background: #222 !important; border: 1px solid #383838 !important; 
            color: white !important; font-size: 0.85rem; padding: 6px 10px;
        }
        
        label { font-size: 0.65rem; color: var(--gold); text-transform: uppercase; font-weight: bold; margin-bottom: 2px; display: block; }
        
        .row-compacta { display: flex; gap: 15px; align-items: flex-start; }
        .info-main { flex: 1; }

        .sticky-actions { position: sticky; top: 0; background: var(--dark-bg); z-index: 100; padding: 10px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <div class="container mt-3" id="main-content">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="fw-bold mb-0">Kings <span class="text-warning">Admin</span></h4>
            <small class="text-muted">v3.1</small>
        </div>

        <div class="sticky-actions">
            <div class="d-flex gap-2">
                <button class="btn btn-success flex-grow-1 fw-bold" onclick="novoProduto()">+ NOVO PRODUTO</button>
                <button class="btn btn-warning flex-grow-1 fw-bold" id="btnSave" onclick="salvarCloud()">☁️ SALVAR TUDO</button>
            </div>
        </div>

        <div id="lista-produtos" class="mt-3"></div>
    </div>

<script>
    // Sua configuração do Firebase (Mantenha a mesma)
    const firebaseConfig = {
        apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
        authDomain: "myproject26-10f0e.firebaseapp.com",
        databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
        projectId: "myproject26-10f0e",
        storageBucket: "myproject26-10f0e.firebasestorage.app",
        messagingSenderId: "884850608032",
        appId: "1:884850608032:web:79db6983346c3c20edc6c5"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let produtos = [];

    // CARREGAR DADOS GARANTINDO O ÍNDICE 0
    function carregarTudo() {
        db.ref('cardapio/produtos').on('value', snap => {
            const data = snap.val();
            // Se o dado vier como objeto (comum no Firebase), converte para array
            if (data && !Array.isArray(data)) {
                produtos = Object.values(data);
            } else {
                produtos = data || [];
            }
            renderProdutos();
        });
    }

    function renderProdutos() {
        const div = document.getElementById('lista-produtos');
        div.innerHTML = "";
        
        produtos.forEach((p, i) => {
            if (!p) return; // Pula se o item for nulo
            
            const isAtivo = p.ativo !== false; // Se for undefined ou true, ele fica ativo

            div.innerHTML += `
            <div class="card-prod ${isAtivo ? '' : 'is-hidden'}">
                <div class="row-compacta">
                    <div class="img-wrap">
                        <img src="${p.image || ''}" class="img-admin" onerror="this.src='https://via.placeholder.com/70?text=S/F'">
                    </div>
                    
                    <div class="info-main">
                        <div class="row g-2">
                            <div class="col-12">
                                <label>Nome do Produto</label>
                                <input class="form-control" value="${p.title || ''}" onchange="edit(${i},'title',this.value)">
                            </div>
                            <div class="col-6">
                                <label>Categoria</label>
                                <input class="form-control" value="${p.categoria || ''}" onchange="edit(${i},'categoria',this.value)">
                            </div>
                            <div class="col-6">
                                <label>Preço R$</label>
                                <input class="form-control" type="number" step="0.01" value="${p.price || 0}" onchange="edit(${i},'price',this.value)">
                            </div>
                            <div class="col-12">
                                <label>Link da Imagem (URL)</label>
                                <input class="form-control" style="font-size:0.75rem; color:#00d1ff !important;" value="${p.image || ''}" onchange="edit(${i},'image',this.value)">
                            </div>
                            <div class="col-12">
                                <label>Ingredientes</label>
                                <input class="form-control" value="${p.ingredientes || ''}" onchange="edit(${i},'ingredientes',this.value)">
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="d-flex gap-2 mt-3 pt-2 border-top border-secondary">
                    <button class="btn ${isAtivo ? 'btn-outline-warning' : 'btn-success'} btn-sm flex-grow-1 fw-bold" onclick="toggleAtivo(${i})">
                        ${isAtivo ? 'SILENCIAR' : 'ATIVAR'}
                    </button>
                    <button class="btn btn-outline-danger btn-sm" onclick="remover(${i})">EXCLUIR</button>
                </div>
            </div>`;
        });
    }

    function edit(i, f, v) { 
        produtos[i][f] = (f === 'price') ? parseFloat(v) : v; 
    }

    function toggleAtivo(i) { 
        produtos[i].ativo = ! (produtos[i].ativo !== false);
        renderProdutos(); 
    }

    function novoProduto() { 
        produtos.unshift({title: "Novo Item", price: 0, categoria: "burger", image: "", ingredientes: "", ativo: true}); 
        renderProdutos(); 
    }

    function remover(i) { 
        if(confirm("Deseja apagar este produto?")) { 
            produtos.splice(i, 1); 
            salvarCloud(); 
        } 
    }

    function salvarCloud() {
        const btn = document.getElementById('btnSave');
        btn.innerText = "⏳ Gravando...";
        db.ref('cardapio/produtos').set(produtos).then(() => { 
            alert("Salvo com sucesso!"); 
            btn.innerText = "☁️ SALVAR TUDO"; 
        });
    }

    // Inicia o sistema
    carregarTudo();
</script>
</body>
</html>
