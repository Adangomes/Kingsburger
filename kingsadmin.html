<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin - Kings Burger</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<!-- FACE API -->
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<style>
body { background:#111;color:white;padding:20px }
.card-prod { background:#1e1e1e;padding:20px;border-radius:10px;margin-bottom:15px }
.form-control { background:#2b2b2b;color:white;border:1px solid #444 }
#lock-screen {
position:fixed;top:0;left:0;width:100%;height:100%;
background:#000;display:flex;align-items:center;justify-content:center;z-index:9999;
}
</style>
</head>

<body>

<!-- 🔒 LOGIN -->
<div id="lock-screen">
<div>
<h3>Kings Burger 🔐</h3>
<input type="password" id="senha" class="form-control mb-2" placeholder="Senha">
<button class="btn btn-warning w-100" onclick="login()">Entrar</button>
</div>
</div>

<!-- 🔥 SISTEMA -->
<div id="app" style="display:none">

<h2>Painel Admin</h2>

<button class="btn btn-success mb-3" onclick="novoProduto()">+ Novo Produto</button>
<button class="btn btn-warning mb-3" onclick="salvar()">Salvar</button>

<div id="lista"></div>

</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
        authDomain: "myproject26-10f0e.firebaseapp.com",
        databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
        projectId: "myproject26-10f0e",
        storageBucket: "myproject26-10f0e.firebasestorage.app",
        messagingSenderId: "884850608032",
        appId: "1:884850608032:web:79db6983346c3c20edc6c5"
    };

    // --- INICIALIZAÇÃO FIREBASE ---
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

const db = firebase.database();

// 🔥 INIT
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔥 LOGIN ANONIMO (OBRIGATÓRIO)
firebase.auth().signInAnonymously();

// 🔐 SENHA
function login(){
if(document.getElementById("senha").value === "123"){
document.getElementById("lock-screen").style.display="none";
document.getElementById("app").style.display="block";
carregar();
}else{
alert("Senha errada");
}
}

// 📦 PRODUTOS
let produtos = [];

function carregar(){
db.ref("produtos").on("value", snap=>{
produtos = snap.val() || [];
render();
});
}

function render(){
let html="";
produtos.forEach((p,i)=>{
html+=`
<div class="card-prod">
<input class="form-control mb-2" value="${p.nome}" onchange="edit(${i},'nome',this.value)">
<input class="form-control mb-2" type="number" value="${p.preco}" onchange="edit(${i},'preco',this.value)">
<button class="btn btn-danger" onclick="del(${i})">Excluir</button>
</div>
`;
});
document.getElementById("lista").innerHTML=html;
}

function novoProduto(){
produtos.push({nome:"Novo",preco:0});
render();
}

function edit(i,c,v){
produtos[i][c]=v;
}

function del(i){
produtos.splice(i,1);
render();
}

function salvar(){
db.ref("produtos").set(produtos)
.then(()=>alert("Salvo ✅"))
.catch(()=>alert("Erro ❌"));
}

</script>

</body>
</html>
