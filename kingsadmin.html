<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kings Admin Pro - Painel Compacto</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
        :root { --gold: #ffc107; --dark-bg: #0a0a0a; --card-bg: #161616; --input-bg: #222; }
        
        body { background: var(--dark-bg); color: white; padding-bottom: 50px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Containers */
        .card-custom { background: var(--card-bg); border: 1px solid #333; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
        
        /* Card de Produto Compacto */
        .card-prod { 
            background: #1a1a1a; border-radius: 10px; border-left: 4px solid var(--gold); 
            padding: 8px !important; margin-bottom: 8px; transition: 0.2s;
        }
        .card-prod.inativo { border-left-color: #444; opacity: 0.5; filter: grayscale(0.9); }
        
        /* Imagem Lateral */
        .img-admin { 
            width: 65px; height: 65px; object-fit: cover; border-radius: 8px; 
            background: #333; border: 1px solid #444;
        }

        /* Formulários Mini */
        .form-control { 
            background: var(--input-bg) !important; border: 1px solid #383838 !important; 
            color: white !important; font-size: 0.8rem; padding: 4px 8px; height: auto;
        }
        .form-control:focus { border-color: var(--gold) !important; box-shadow: none !important; }
        
        label { font-size: 0.6rem; color: #888; text-transform: uppercase; font-weight: bold; margin-bottom: 1px; display: block; }
        
        /* Botões de Dias */
        .dia-btn { 
            width: 30px; height: 30px; border: 1px solid #444; background: #222; 
            color: #888; border-radius: 6px; cursor: pointer; display: inline-flex; 
            align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold;
        }
        .dia-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }

        /* Layout de Linha */
        .row-compacta { display: flex; align-items: flex-start; gap: 10px; }
        .info-main { flex: 1; }
        
        /* Lock Screen */
        #lock-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #111; border: 1px solid var(--gold); border-radius: 20px; padding: 30px; width: 320px; text-align: center; }
        .camera-circle { width: 180px; height: 180px; border-radius: 50%; overflow: hidden; margin: 15px auto; border: 3px solid var(--gold); }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .btn-sm-custom { font-size: 0.7rem; padding: 2px 8px; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="login-box">
            <h5 class="text-warning fw-bold mb-3">KINGS ADMIN</h5>
            <div id="pass-area">
                <input type="password" id="local-pass" class="form-control mb-3 text-center" placeholder="Senha Administrativa">
                <button class="btn btn-warning w-100 fw-bold" onclick="verificarAcessoLocal()">ACESSAR</button>
            </div>
            <div id="face-area" style="display:none;">
                <div class="camera-circle"><video id="video" autoplay muted playsinline></video></div>
                <p id="face-status" class="small text-muted mb-3">Detectando Adan...</p>
                <button class="btn btn-outline-warning w-100 btn-sm" onclick="iniciarCaptura()">AUTENTICAR FACIAL</button>
            </div>
        </div>
    </div>

    <div class="container mt-3" id="main-content" style="display:none;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="fw-bold mb-0">Kings <span class="text-warning">Dashboard</span></h4>
            <button class="btn btn-danger btn-sm" onclick="logout()">Sair</button>
        </div>

        <div class="card-custom">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="fw-bold small">LOJA <span id="loja-label">...</span></span>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="loja-switch" onchange="toggleLoja(this.checked)">
                </div>
            </div>
            <div class="row g-2 mb-2">
                <div class="col-6"><label>Abre</label><input type="time" id="h-abre" class="form-control"></div>
                <div class="col-6"><label>Fecha</label><input type="time" id="h-fecha" class="form-control"></div>
            </div>
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex gap-1" id="dias-grid">
                    <div class="dia-btn" data-dia="0" onclick="toggleDia(this)">D</div>
                    <div class="dia-btn" data-dia="1" onclick="toggleDia(this)">S</div>
                    <div class="dia-btn" data-dia="2" onclick="toggleDia(this)">T</div>
                    <div class="dia-btn" data-dia="3" onclick="toggleDia(this)">Q</div>
                    <div class="dia-btn" data-dia="4" onclick="toggleDia(this)">Q</div>
                    <div class="dia-btn" data-dia="5" onclick="toggleDia(this)">S</div>
                    <div class="dia-btn" data-dia="6" onclick="toggleDia(this)">S</div>
                </div>
                <button class="btn btn-warning btn-sm fw-bold" onclick="salvarConfigLoja()">OK</button>
            </div>
        </div>

        <div class="card-custom">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="fw-bold small text-info">CUPONS ATIVOS</span>
                <button class="btn btn-outline-info btn-sm-custom" onclick="novoCupom()">+ NOVO</button>
            </div>
            <div id="lista-cupons"></div>
        </div>

        <div class="d-flex gap-2 mb-3">
            <button class="btn btn-success flex-grow-1 fw-bold btn-sm" onclick="novoProduto()">+ NOVO PRODUTO</button>
            <button class="btn btn-warning flex-grow-1 fw-bold btn-sm" id="btnSave" onclick="salvarCloud()">☁️ SALVAR TUDO</button>
        </div>

        <div id="lista-produtos"></div>
    </div>

<script>
    const ADMIN_EMAIL = "adangones55@gmail.com";
    const ADMIN_PASS = "Ada44ada"; 

    const firebaseConfig = {
        apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
        authDomain: "myproject26-10f0e.firebaseapp.com",
        databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
        projectId: "myproject26-10f0e",
        storageBucket: "myproject26-10f0e.firebasestorage.app",
        messagingSenderId: "884850608032",
        appId: "1:884850608032:web:79db6983346c3c20edc6c5"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let produtos = [];
    let faceMatcher = null;

    // --- LOGIN E BIOMETRIA ---
    function verificarAcessoLocal() {
        if(document.getElementById('local-pass').value === "Kings@20BR26burger") {
            document.getElementById('pass-area').style.display = 'none';
            document.getElementById('face-area').style.display = 'block';
            navigator.mediaDevices.getUserMedia({ video: {} }).then(s => {
                document.getElementById('video').srcObject = s;
                initFaceID();
            });
        } else alert("Senha incorreta");
    }

    async function initFaceID() {
        const URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
        await Promise.all([faceapi.nets.tinyFaceDetector.loadFromUri(URL), faceapi.nets.faceLandmark68Net.loadFromUri(URL), faceapi.nets.faceRecognitionNet.loadFromUri(URL)]);
        try {
            const img = await faceapi.fetchImage('imagens/Programador.jpeg');
            const desc = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            faceMatcher = new faceapi.FaceMatcher(desc);
            document.getElementById('face-status').innerText = "Rosto Pronto ✅";
        } catch(e) { document.getElementById('face-status').innerText = "Erro Foto"; }
    }

    async function iniciarCaptura() {
        const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
        if(detection && faceMatcher.findBestMatch(detection.descriptor).label !== 'unknown') {
            await firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);
            await firebase.auth().signInWithEmailAndPassword(ADMIN_EMAIL, ADMIN_PASS);
            location.reload(); 
        } else alert("Acesso negado!");
    }

    firebase.auth().onAuthStateChanged(user => {
        if(user) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            carregarTudo();
        }
    });

    // --- GESTÃO DE DADOS ---
    function carregarTudo() {
        db.ref('cardapio/produtos').on('value', snap => { produtos = snap.val() || []; renderProdutos(); });
        db.ref('configuracoes/statusLoja').on('value', snap => {
            const d = snap.val() || {};
            document.getElementById('loja-switch').checked = d.aberto;
            document.getElementById('loja-label').innerText = d.aberto ? "ABERTA" : "FECHADA";
            document.getElementById('h-abre').value = d.horarioAbertura || "";
            document.getElementById('h-fecha').value = d.horarioFechamento || "";
            const dias = d.diasAbertos || [];
            document.querySelectorAll('.dia-btn').forEach(b => b.classList.toggle('active', dias.includes(parseInt(b.dataset.dia))));
        });
        db.ref('configuracoes/cupons').on('value', snap => renderCupons(snap.val()));
    }

    function renderProdutos() {
        const div = document.getElementById('lista-produtos');
        div.innerHTML = "";
        produtos.forEach((p, i) => {
            const ativo = p.ativo !== false;
            div.innerHTML += `
            <div class="card-prod ${ativo ? '' : 'inativo'}">
                <div class="row-compacta">
                    <img src="${p.image}" class="img-admin" onerror="this.src='https://via.placeholder.com/80'">
                    <div class="info-main">
                        <div class="row g-1">
                            <div class="col-8">
                                <label>Produto</label><input class="form-control" value="${p.title}" onchange="edit(${i},'title',this.value)">
                            </div>
                            <div class="col-4">
                                <label>R$</label><input class="form-control" type="number" step="0.01" value="${p.price}" onchange="edit(${i},'price',this.value)">
                            </div>
                            <div class="col-12">
                                <label>Ingredientes</label><input class="form-control" value="${p.ingredientes || ''}" onchange="edit(${i},'ingredientes',this.value)">
                            </div>
                            <div class="col-12">
                                <label>URL Imagem</label><input class="form-control" style="font-size:0.65rem" value="${p.image}" onchange="edit(${i},'image',this.value)">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="d-flex gap-2 mt-2 pt-1 border-top border-secondary">
                    <button class="btn ${ativo ? 'btn-outline-warning' : 'btn-success'} btn-sm flex-grow-1 btn-sm-custom fw-bold" onclick="toggleAtivo(${i})">
                        ${ativo ? 'SILENCIAR' : 'ATIVAR'}
                    </button>
                    <button class="btn btn-outline-danger btn-sm-custom" onclick="remover(${i})">X</button>
                </div>
            </div>`;
        });
    }

    function renderCupons(obj) {
        const div = document.getElementById('lista-cupons');
        div.innerHTML = "";
        if(!obj) return div.innerHTML = "<small class='text-muted'>Sem cupons</small>";
        Object.entries(obj).forEach(([id, c]) => {
            div.innerHTML += `
            <div class="d-flex gap-2 mb-1">
                <input class="form-control py-0" value="${c.codigo}" readonly>
                <input class="form-control py-0" style="width: 60px" value="${c.valor}%" readonly>
                <button class="btn btn-danger btn-sm py-0 px-2" onclick="deletarCupom('${id}')">X</button>
            </div>`;
        });
    }

    // --- AÇÕES ---
    function edit(i, f, v) { produtos[i][f] = (f === 'price') ? parseFloat(v) : v; }
    function toggleAtivo(i) { produtos[i].ativo = (produtos[i].ativo === false); renderProdutos(); }
    function toggleDia(el) { el.classList.toggle('active'); }
    function novoProduto() { produtos.unshift({title: "Novo", price: 0, image: "", ingredientes: "", ativo: true}); renderProdutos(); }
    function remover(i) { if(confirm("Apagar produto?")) { produtos.splice(i, 1); salvarCloud(); } }

    function salvarCloud() {
        const btn = document.getElementById('btnSave'); btn.innerText = "⏳...";
        db.ref('cardapio/produtos').set(produtos).then(() => { alert("Salvo! ✅"); btn.innerText = "☁️ SALVAR TUDO"; });
    }

    function salvarConfigLoja() {
        const dias = Array.from(document.querySelectorAll('.dia-btn.active')).map(b => parseInt(b.dataset.dia));
        db.ref('configuracoes/statusLoja').update({
            horarioAbertura: document.getElementById('h-abre').value,
            horarioFechamento: document.getElementById('h-fecha').value,
            diasAbertos: dias
        }).then(() => alert("Horários atualizados!"));
    }

    function toggleLoja(s) { db.ref('configuracoes/statusLoja/aberto').set(s); }
    function novoCupom() { 
        const cod = prompt("Código:"); const val = parseInt(prompt("Desconto %:"));
        if(cod && val) db.ref('configuracoes/cupons').push({ codigo: cod.toUpperCase(), valor: val, ativo: true });
    }
    function deletarCupom(id) { if(confirm("Deletar?")) db.ref(`configuracoes/cupons/${id}`).remove(); }
    function logout() { firebase.auth().signOut().then(() => location.reload()); }
</script>
</body>
</html>
