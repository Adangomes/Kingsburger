<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin Cloud - Kings Burger</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body { background: #111; color: white; padding: 30px; font-family: sans-serif; }
        .card-prod { background: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        .card-prod img { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; background: #333; }
        .form-control { background: #2b2b2b; border: 1px solid #444; color: white; }
        .form-control:focus { background: #333; color: white; border-color: #ffc107; box-shadow: none; }
        label { font-size: 0.8rem; color: #888; margin-bottom: 2px; }
        .header-painel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .btn-warning { font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-painel">
            <h2>Painel Admin <span class="text-warning">Kings Burger</span></h2>
            <div>
                <div class="card-prod d-flex justify-content-between align-items-center mb-4" style="border: 2px solid #ffc107;">
    <h4 class="mb-0">Status da Loja: <span id="txtStatus" class="badge bg-secondary text-uppercase">Carregando...</span></h4>
    <div class="form-check form-switch scale-150">
        <input class="form-check-input" type="checkbox" id="switchStatus" onchange="alterarStatusLoja(this.checked)">
    </div>
</div>
                <button class="btn btn-outline-info me-2" onclick="migrarArquivoParaFirebase()">📥 Importar do JSON</button>
                <button class="btn btn-success me-2" onclick="novoProduto()">+ Novo Item</button>
                <button class="btn btn-warning" id="btnSalvar" onclick="salvarNoFirebase()">☁️ Salvar no Cloud</button>
            </div>
        </div>

        <div id="listaProdutos">
            <p class="text-center text-muted">Carregando cardápio do Firebase...</p>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
        authDomain: "myproject26-10f0e.firebaseapp.com",
        databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
        projectId: "myproject26-10f0e",
        storageBucket: "myproject26-10f0e.firebasestorage.app",
        messagingSenderId: "884850608032",
        appId: "1:884850608032:web:79db6983346c3c20edc6c5"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    let produtos = [];

    async function carregarProdutos() {
        const lista = document.getElementById("listaProdutos");
        db.ref('cardapio/produtos').once('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                produtos = Array.isArray(data) ? data : Object.values(data);
                renderizar();
            } else {
                lista.innerHTML = '<p class="text-center text-danger">Nenhum produto no Firebase. Use o botão "Importar do JSON"!</p>';
                produtos = [];
            }
        });
    }

    function renderizar() {
        const lista = document.getElementById("listaProdutos");
        lista.innerHTML = "";
        produtos.forEach((p, i) => {
            lista.innerHTML += `
            <div class="card-prod">
                <div class="row align-items-center">
                    <div class="col-md-1 text-center">
                        <img src="${p.image}" onerror="this.src='https://via.placeholder.com/100?text=Sem+Foto'">
                    </div>
                    <div class="col-md-3">
                        <label>Título</label>
                        <input class="form-control" value="${p.title || ''}" onchange="editar(${i}, 'title', this.value)">
                    </div>
                    <div class="col-md-2">
                        <label>Preço</label>
                        <input class="form-control" type="number" step="0.01" value="${p.price || 0}" onchange="editar(${i}, 'price', this.value)">
                    </div>
                    <div class="col-md-2">
                        <label>Categoria</label>
                        <input class="form-control" value="${p.categoria || ''}" onchange="editar(${i}, 'categoria', this.value)">
                    </div>
                    <div class="col-md-3">
                        <label>Imagem (URL)</label>
                        <input class="form-control" value="${p.image || ''}" onchange="editar(${i}, 'image', this.value)">
                    </div>
                    <div class="col-md-1 text-end">
                        <button class="btn btn-outline-danger btn-sm" onclick="excluir(${i})">X</button>
                    </div>
                    <div class="col-12 mt-3">
                        <label>Ingredientes</label>
                        <input class="form-control" value="${p.ingredientes || ''}" onchange="editar(${i}, 'ingredientes', this.value)">
                    </div>
                </div>
            </div>`;
        });
    }

    function editar(index, campo, valor) {
        if (campo === "price") valor = parseFloat(valor);
        produtos[index][campo] = valor;
    }

    function excluir(i) {
        if (confirm("Excluir item?")) { produtos.splice(i, 1); renderizar(); }
    }

    function novoProduto() {
        produtos.unshift({ title: "Novo Burger", price: 0.00, categoria: "burger", ingredientes: "", image: "imagens/placeholder.png" });
        renderizar();
    }

    function salvarNoFirebase() {
        const btn = document.getElementById("btnSalvar");
        btn.innerText = "⏳ SALVANDO...";
        btn.disabled = true;
        db.ref('cardapio/produtos').set(produtos)
        .then(() => alert("Atualizado no Firebase! ✅"))
        .finally(() => { btn.innerText = "☁️ Salvar no Cloud"; btn.disabled = false; });
    }

    // --- NOVA FUNÇÃO DE MIGRAÇÃO ---
    async function migrarArquivoParaFirebase() {
        if (!confirm("Isso vai ler o arquivo content/produtos.json e salvar no banco de dados. Confirma?")) return;
        
        try {
            const res = await fetch("content/produtos.json?v=" + Date.now());
            const data = await res.json();
            
            if (data && data.produtos) {
                await db.ref('cardapio/produtos').set(data.produtos);
                alert("Importado com sucesso! " + data.produtos.length + " itens migrados.");
                carregarProdutos();
            }
        } catch (err) {
            alert("Erro ao ler o arquivo produtos.json. Verifique se ele existe na pasta content.");
            console.error(err);
        }
    }
    // --- NO PAINEL ADMIN ---

// Faz o switch (botão) refletir o estado real do banco ao abrir a página
db.ref('configuracoes/statusLoja').on('value', (snapshot) => {
    const aberto = snapshot.val();
    const txt = document.getElementById("txtStatus");
    const sw = document.getElementById("switchStatus");
    
    if (txt && sw) {
        txt.innerText = aberto ? "Aberto" : "Fechado";
        txt.className = aberto ? "badge bg-success text-uppercase" : "badge bg-danger text-uppercase";
        sw.checked = aberto;
    }
});

// Salva a alteração quando você clica no switch
function alterarStatusLoja(novoStatus) {
    db.ref('configuracoes/statusLoja').set(novoStatus)
    .then(() => console.log("Status atualizado no Firebase! ✅"))
    .catch(err => alert("Erro ao mudar status: " + err.message));
}

    carregarProdutos();
</script>
</body>
</html>
