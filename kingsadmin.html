<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kings Admin PRO - Adan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        :root { --gold: #ffc107; --dark-bg: #0a0a0a; --card-bg: #161616; }
        body { background: var(--dark-bg); color: white; padding-bottom: 100px; font-family: sans-serif; }
        
        /* Layout dos Cards conforme sua referência */
        .card-custom { background: var(--card-bg); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .card-prod { background: #1a1a1a; border-radius: 12px; border: 1px solid #333; padding: 12px; margin-bottom: 12px; transition: 0.3s; }
        
        /* Estado Apagado (Cinza) */
        .is-hidden { opacity: 0.3; filter: grayscale(1); border-color: #ff4444; }

        .img-admin { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; background: #333; }
        .form-control { background: #222 !important; border: 1px solid #444 !important; color: white !important; font-size: 0.9rem; }
        label { font-size: 0.7rem; color: var(--gold); font-weight: bold; text-transform: uppercase; margin-top: 5px; display: block; }
        
        .dia-btn { width: 35px; height: 35px; border: 1px solid #444; background: #222; color: #888; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
        .dia-btn.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: bold; }
        
        .sticky-nav { position: sticky; top: 0; background: var(--dark-bg); z-index: 1000; padding: 10px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="login-screen" class="d-flex flex-column justify-content-center align-items-center" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0a0a0a; z-index:2000;">
    <div class="card card-custom p-4" style="max-width:320px; width:100%;">
        <h4 class="text-warning fw-bold mb-3 text-center">LOGIN ADMIN</h4>
        <div class="mb-3">
            <label>Email</label>
            <input type="email" id="login-email" class="form-control" placeholder="Digite seu e-mail">
        </div>
        <div class="mb-3">
            <label>Senha</label>
            <input type="password" id="login-senha" class="form-control" placeholder="Digite sua senha">
        </div>
        <button class="btn btn-warning w-100 fw-bold" onclick="entrar()">ENTRAR</button>
        <small class="text-muted d-block mt-2 text-center">Somente administradores autorizados</small>
    </div>
</div>
    
    

<div class="container mt-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold text-warning m-0">Kings Admin <span class="text-white small" style="font-size: 12px;">PRO</span></h4>
        <button class="btn btn-outline-danger btn-sm" onclick="firebase.auth().signOut().then(() => location.reload())">Sair</button>
    </div>

    <div class="card-custom">
        <div class="d-flex justify-content-between mb-3">
            <span class="fw-bold text-uppercase" style="font-size: 0.8rem;">Status da Loja</span>
            <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="loja-switch" onchange="toggleLoja(this.checked)"></div>
        </div>
        <div class="row g-2 mb-3">
            <div class="col-6"><label>Abre às</label><input type="time" id="h-abre" class="form-control"></div>
            <div class="col-6"><label>Fecha às</label><input type="time" id="h-fecha" class="form-control"></div>
        </div>
        <label>Dias de Funcionamento</label>
        <div class="d-flex gap-1 mb-3" id="dias-grid">
            <div class="dia-btn" data-dia="0" onclick="this.classList.toggle('active')">D</div>
            <div class="dia-btn" data-dia="1" onclick="this.classList.toggle('active')">S</div>
            <div class="dia-btn" data-dia="2" onclick="this.classList.toggle('active')">T</div>
            <div class="dia-btn" data-dia="3" onclick="this.classList.toggle('active')">Q</div>
            <div class="dia-btn" data-dia="4" onclick="this.classList.toggle('active')">Q</div>
            <div class="dia-btn" data-dia="5" onclick="this.classList.toggle('active')">S</div>
            <div class="dia-btn" data-dia="6" onclick="this.classList.toggle('active')">S</div>
        </div>
        <button class="btn btn-warning w-100 fw-bold" onclick="salvarConfigLoja()">ATUALIZAR HORÁRIOS</button>
    </div>

    <div class="card-custom">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <label style="color: #00d1ff;">CUPONS ATIVOS</label>
            <button class="btn btn-outline-info btn-sm" onclick="novoCupom()">+ NOVO</button>
        </div>
        <div id="lista-cupons"></div>
    </div>

    <div class="sticky-nav">
        <div class="d-flex gap-2">
            <button class="btn btn-success flex-grow-1 fw-bold" onclick="novoProduto()">+ NOVO PRODUTO</button>
            <button class="btn btn-info flex-grow-1 fw-bold" onclick="adicionarCategoria()">+ Nova Categoria</button>
            <button class="btn btn-warning flex-grow-1 fw-bold" id="btnSave" onclick="salvarCloud()">☁️ SALVAR TUDO</button>
        </div>
    </div>

    <div id="lista-produtos" class="mt-3"></div>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
        authDomain: "myproject26-10f0e.firebaseapp.com",
        databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
        projectId: "myproject26-10f0e",
        storageBucket: "myproject26-10f0e.firebasestorage.app",
        messagingSenderId: "884850608032",
        appId: "1:884850608032:web:79db6983346c3c20edc6c5"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let produtos = [];
    let categorias = ["burger", "bebidas", "combos"];

    // 1. CONFIGURAÇÕES DE ACESSO PERMITIDAS
    const usuariosPermitidos = [
        { email: "adangones55@gmail.com" },
        { email: "gabrieljunirrr@gmail.com" }
    ];

    // 2. FUNÇÃO INICIAL (CHAMADA NO FINAL DO SCRIPT)
    function carregarTudo() {
        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                const autorizado = usuariosPermitidos.some(u => u.email === user.email);
                if (autorizado) {
                    iniciarMonitoramentoDB();
                } else {
                    alert("Acesso Negado: E-mail não autorizado.");
                    firebase.auth().signOut();
                }
            } else {
                solicitarLogin();
            }
        });
    }

    function solicitarLogin() {
    document.getElementById('login-screen').style.display = 'flex';
}

function entrar() {
    const email = document.getElementById('login-email').value.trim();
    const senha = document.getElementById('login-senha').value;

    if (!email || !senha) {
        alert("Preencha e-mail e senha!");
        return;
    }

    firebase.auth().signInWithEmailAndPassword(email, senha)
        .then(() => {
            document.getElementById('login-screen').style.display = 'none';
        })
        .catch(e => {
            alert("Erro: " + e.message);
        });
}

    // 3. MONITORES DO BANCO DE DADOS (SÓ RODAM SE LOGADO)
    function iniciarMonitoramentoDB() {
        db.ref('cardapio/produtos').once('value', snap => {
            const data = snap.val();
            produtos = data ? Object.values(data).filter(i => i !== null) : [];
            renderProdutos();
        });

        db.ref('configuracoes/statusLoja').on('value', snap => {
            const d = snap.val() || {};
            const sw = document.getElementById('loja-switch');
            if(sw) sw.checked = d.aberto;
            document.getElementById('h-abre').value = d.horarioAbertura || "";
            document.getElementById('h-fecha').value = d.horarioFechamento || "";
            const diasAbertos = d.diasAbertos || [];
            document.querySelectorAll('.dia-btn').forEach(btn => {
                btn.classList.toggle('active', diasAbertos.includes(parseInt(btn.dataset.dia)));
            });
        });

        db.ref('configuracoes/cupons').on('value', snap => renderCupons(snap.val()));
    }

    // 4. FUNÇÕES DE INTERFACE (RENDERIZAÇÃO)
   function renderProdutos() {
    const div = document.getElementById('lista-produtos');
    div.innerHTML = "";

    produtos.forEach((p, i) => {
        const isAtivo = p.ativo !== false;

        div.innerHTML += `
        <div class="card-prod ${isAtivo ? '' : 'is-hidden'}">
            <div class="d-flex gap-3">
                <img src="${p.image || ''}" class="img-admin" onerror="this.src='https://via.placeholder.com/80?text=KING'">
                <div class="flex-grow-1">
                    <div class="row g-2">

                        <div class="col-9">
                            <label>Produto</label>
                            <input class="form-control" value="${p.title || ''}" onchange="edit(${i},'title',this.value)">
                        </div>

                        <div class="col-3">
                            <label>R$</label>
                            <input class="form-control" type="number" step="0.01" value="${p.price || 0}" onchange="edit(${i},'price',this.value)">
                        </div>

                        <div class="col-12">
                            <label>Ingredientes</label>
                            <input class="form-control" value="${p.ingredientes || ''}" onchange="edit(${i},'ingredientes',this.value)">
                        </div>

                        <!-- 🔥 SELECT DINÂMICO -->
                        <div class="col-6">
                            <label>Categoria</label>
                            <select class="form-control" onchange="edit(${i},'categoria',this.value)">
                                ${categorias.map(c => `
                                    <option value="${c}" ${p.categoria === c ? 'selected' : ''}>${c}</option>
                                `).join('')}
                            </select>
                        </div>

                        <div class="col-6">
                            <label>URL Imagem</label>
                            <input class="form-control" value="${p.image || ''}" onchange="edit(${i},'image',this.value)">
                        </div>

                    </div>
                </div>
            </div>

            <div class="d-flex gap-2 mt-3 pt-2 border-top border-secondary">
                <button class="btn ${isAtivo ? 'btn-outline-warning' : 'btn-success'} btn-sm flex-grow-1 fw-bold" onclick="toggleAtivo(${i})">
                    ${isAtivo ? 'SILENCIAR' : 'ATIVAR'}
                </button>
                <button class="btn btn-outline-danger btn-sm" onclick="remover(${i})">EXCLUIR</button>
            </div>
        </div>`;
    });
} 

    // 5. FUNÇÕES DE LÓGICA E BANCO
    function salvarCloud() {
        const btn = document.getElementById('btnSave');
        btn.innerHTML = "⏳ Gravando...";
        btn.disabled = true;
        const dadosLimpos = produtos.map(p => ({
            title: p.title || "Sem nome",
            price: parseFloat(p.price) || 0,
            ingredientes: p.ingredientes || "",
            categoria: p.categoria || "burger",
            image: p.image || "",
            ativo: p.ativo !== false
        }));
        db.ref('cardapio/produtos').set(dadosLimpos)
            .then(() => alert("Sincronizado! 🚀"))
            .finally(() => { btn.innerHTML = "☁️ SALVAR TUDO"; btn.disabled = false; });
    }

    function edit(i, f, v) { produtos[i][f] = (f === 'price') ? parseFloat(v) : v; }
    function toggleAtivo(i) { produtos[i].ativo = !(produtos[i].ativo !== false); renderProdutos(); }
    function toggleLoja(s) { db.ref('configuracoes/statusLoja/aberto').set(s); }

    function salvarConfigLoja() {
        const dias = Array.from(document.querySelectorAll('.dia-btn.active')).map(b => parseInt(b.dataset.dia));
        db.ref('configuracoes/statusLoja').update({
            horarioAbertura: document.getElementById('h-abre').value,
            horarioFechamento: document.getElementById('h-fecha').value,
            diasAbertos: dias
        }).then(() => alert("Configurações salvas!"));
    }

    function novoCupom() {
        const cod = prompt("Código:");
        const val = prompt("Valor %:");
        if(cod && val) db.ref('configuracoes/cupons').push({ codigo: cod.toUpperCase(), valor: parseInt(val), ativo: true });
    }

    function renderCupons(obj) {
        const div = document.getElementById('lista-cupons');
        div.innerHTML = obj ? "" : "<small class='text-muted'>Nenhum cupom ativo</small>";
        if(obj) Object.entries(obj).forEach(([id, c]) => {
            div.innerHTML += `<div class="d-flex gap-2 mb-2"><input class="form-control py-1" value="${c.codigo}" readonly><input class="form-control py-1 w-25" value="${c.valor}%" readonly><button class="btn btn-danger btn-sm" onclick="db.ref('configuracoes/cupons/${id}').remove()">X</button></div>`;
        });
    }

    function novoProduto() { 
        produtos.unshift({title: "Novo Item", price: 0, categoria: "burger", image: "", ingredientes: "", ativo: true}); 
        renderProdutos(); 
    }

    function remover(i) { if(confirm("Remover?")) { produtos.splice(i,1); salvarCloud(); } }
    
    
    function adicionarCategoria() {
    const nova = prompt("Nova categoria:");

    if (!nova) return;

    const nome = nova.toLowerCase().trim();

    if (categorias.includes(nome)) {
        alert("Essa categoria já existe!");
        return;
    }

    categorias.push(nome);
    renderProdutos();
}

    // INICIALIZAÇÃO
    carregarTudo();
</script>
</body>
</html>
