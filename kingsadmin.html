<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kings Admin PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        :root { --gold: #ffc107; --dark-bg: #0a0a0a; --card-bg: #161616; }
        body { background: var(--dark-bg); color: white; padding-bottom: 100px; font-family: 'Segoe UI', sans-serif; }
        .card-custom { background: var(--card-bg); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .card-prod { background: #1a1a1a; border-radius: 12px; border: 1px solid #333; padding: 12px; margin-bottom: 12px; position: relative; transition: 0.3s; }
        .card-prod.is-hidden { opacity: 0.4; filter: grayscale(1); }
        .card-prod.is-hidden::after { content: "OCULTO"; position: absolute; top: 10px; right: 10px; color: #ff4444; font-weight: bold; font-size: 10px; }
        .img-admin { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; background: #333; border: 1px solid #444; }
        .form-control { background: #222 !important; border: 1px solid #444 !important; color: white !important; font-size: 0.9rem; }
        label { font-size: 0.7rem; color: var(--gold); font-weight: bold; text-transform: uppercase; margin-top: 5px; display: block; }
        .sticky-nav { position: sticky; top: 0; background: var(--dark-bg); z-index: 1000; padding: 10px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<div class="container mt-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold text-warning m-0">Kings Admin <span class="text-white small" style="font-size: 12px;">PRO</span></h4>
        <span id="auth-label" class="badge bg-danger">DESCONECTADO</span>
    </div>

    <div class="sticky-nav">
        <div class="d-flex gap-2">
            <button class="btn btn-success flex-grow-1 fw-bold" onclick="novoProduto()">+ NOVO PRODUTO</button>
            <button class="btn btn-warning flex-grow-1 fw-bold" id="btnSave" onclick="salvarCloud()" disabled>⏳ LOGIN...</button>
        </div>
    </div>

    <div id="lista-produtos" class="mt-3"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
        authDomain: "myproject26-10f0e.firebaseapp.com",
        databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
        projectId: "myproject26-10f0e",
        storageBucket: "myproject26-10f0e.firebasestorage.app",
        messagingSenderId: "884850608032",
        appId: "1:884850608032:web:79db6983346c3c20edc6c5"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    let produtos = [];

    // --- 1. LOGIN AUTOMÁTICO (ESSENCIAL PARA AS SUAS REGRAS) ---
    // Substitua 'SUA_SENHA' pela senha do seu e-mail adangones55@gmail.com
    auth.signInWithEmailAndPassword("adangones55@gmail.com", "SUA_SENHA_AQUI")
        .then(() => {
            document.getElementById('auth-label').innerText = "CONECTADO";
            document.getElementById('auth-label').className = "badge bg-success";
            document.getElementById('btnSave').disabled = false;
            document.getElementById('btnSave').innerText = "☁️ SALVAR TUDO";
            carregarDados();
        })
        .catch(e => {
            alert("Erro no Login: " + e.message);
        });

    function carregarDados() {
        db.ref('cardapio/produtos').on('value', snap => {
            const data = snap.val();
            produtos = data ? Object.values(data).filter(i => i !== null) : [];
            renderProdutos();
        });
    }

    function renderProdutos() {
        const div = document.getElementById('lista-produtos');
        div.innerHTML = "";
        produtos.forEach((p, i) => {
            const isAtivo = p.ativo !== false;
            div.innerHTML += `
            <div class="card-prod ${isAtivo ? '' : 'is-hidden'}">
                <div class="d-flex gap-3">
                    <img src="${p.image || ''}" class="img-admin" onerror="this.src='https://via.placeholder.com/80?text=IMG'">
                    <div class="flex-grow-1">
                        <div class="row g-2">
                            <div class="col-9"><label>Produto</label><input class="form-control" value="${p.title || ''}" onchange="edit(${i},'title',this.value)"></div>
                            <div class="col-3"><label>R$</label><input class="form-control" type="number" step="0.01" value="${p.price || 0}" onchange="edit(${i},'price',this.value)"></div>
                            <div class="col-12"><label>Ingredientes</label><input class="form-control" value="${p.ingredientes || ''}" onchange="edit(${i},'ingredientes',this.value)"></div>
                            <div class="col-12"><label>Link Imagem</label><input class="form-control" value="${p.image || ''}" onchange="edit(${i},'image',this.value)"></div>
                        </div>
                    </div>
                </div>
                <div class="d-flex gap-2 mt-3 pt-2 border-top border-secondary">
                    <button class="btn ${isAtivo ? 'btn-outline-warning' : 'btn-success'} btn-sm flex-grow-1 fw-bold" onclick="toggleAtivo(${i})">
                        ${isAtivo ? 'SILENCIAR (OCULTAR)' : 'ATIVAR (MOSTRAR)'}
                    </button>
                    <button class="btn btn-outline-danger btn-sm" onclick="remover(${i})">X</button>
                </div>
            </div>`;
        });
    }

    function salvarCloud() {
        const btn = document.getElementById('btnSave');
        btn.innerHTML = "⏳ Gravando...";
        btn.disabled = true;

        const dadosLimpos = produtos.map(p => ({
            title: p.title || "Novo Item",
            price: parseFloat(p.price) || 0,
            ingredientes: p.ingredientes || "",
            categoria: p.categoria || "burger",
            image: p.image || "",
            ativo: p.ativo !== false
        }));

        db.ref('cardapio/produtos').set(dadosLimpos)
            .then(() => alert("Sincronizado! Os clientes já podem ver as mudanças. 🚀"))
            .catch(e => alert("Erro ao salvar: " + e.message))
            .finally(() => {
                btn.innerHTML = "☁️ SALVAR TUDO";
                btn.disabled = false;
            });
    }

    function edit(i, f, v) { produtos[i][f] = (f === 'price') ? parseFloat(v) : v; }
    
    function toggleAtivo(i) { 
        produtos[i].ativo = ! (produtos[i].ativo !== false);
        renderProdutos(); 
    }

    function novoProduto() { 
        produtos.unshift({title: "Novo Lanche", price: 0, categoria: "burger", image: "", ingredientes: "", ativo: true}); 
        renderProdutos(); 
    }

    function remover(i) { if(confirm("Remover?")) { produtos.splice(i,1); salvarCloud(); } }

</script>
</body>
</html>
