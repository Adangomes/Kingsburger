<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kings Admin Full - Adan</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --gold: #ffc107; --dark-bg: #0a0a0a; --card-bg: #161616; }
        body { background: var(--dark-bg); color: white; padding-bottom: 100px; font-family: sans-serif; }
        
        .card-custom { background: var(--card-bg); border: 1px solid #333; border-radius: 12px; padding: 12px; margin-bottom: 15px; }
        
        /* CARD PRODUTO */
        .card-prod { background: #1a1a1a; border-radius: 10px; border-left: 4px solid var(--gold); padding: 12px !important; margin-bottom: 12px; }
        .card-prod.is-hidden { opacity: 0.4; filter: grayscale(1); border-left-color: #555; }
        
        .img-admin { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; background: #333; }
        .form-control { background: #222 !important; border: 1px solid #383838 !important; color: white !important; font-size: 0.85rem; }
        
        label { font-size: 0.65rem; color: var(--gold); text-transform: uppercase; font-weight: bold; margin-bottom: 2px; display: block; }
        
        .dia-btn { 
            width: 32px; height: 32px; border: 1px solid #444; background: #222; color: #888; 
            border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; 
            font-size: 0.8rem; cursor: pointer; transition: 0.2s;
        }
        .dia-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }

        .sticky-top { background: var(--dark-bg); z-index: 1000; padding: 10px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <div class="container mt-3">
        <h4 class="fw-bold text-warning mb-3">Kings Admin <small class="text-white" style="font-size: 10px;">PRO</small></h4>

        <div class="card-custom">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <label>Status da Loja</label>
                <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="loja-switch" onchange="toggleLoja(this.checked)"></div>
            </div>
            <div class="row g-2 mb-3">
                <div class="col-6"><label>Abre às</label><input type="time" id="h-abre" class="form-control"></div>
                <div class="col-6"><label>Fecha às</label><input type="time" id="h-fecha" class="form-control"></div>
            </div>
            <label>Dias de Funcionamento</label>
            <div class="d-flex gap-1 mb-3" id="dias-grid">
                <div class="dia-btn" data-dia="0" onclick="toggleDia(this)">D</div>
                <div class="dia-btn" data-dia="1" onclick="toggleDia(this)">S</div>
                <div class="dia-btn" data-dia="2" onclick="toggleDia(this)">T</div>
                <div class="dia-btn" data-dia="3" onclick="toggleDia(this)">Q</div>
                <div class="dia-btn" data-dia="4" onclick="toggleDia(this)">Q</div>
                <div class="dia-btn" data-dia="5" onclick="toggleDia(this)">S</div>
                <div class="dia-btn" data-dia="6" onclick="toggleDia(this)">S</div>
            </div>
            <button class="btn btn-warning btn-sm w-100 fw-bold" onclick="salvarConfigLoja()">ATUALIZAR HORÁRIOS</button>
        </div>

        <div class="card-custom">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <label style="color: #00d1ff;">Cupons Ativos</label>
                <button class="btn btn-outline-info btn-sm" style="font-size: 10px;" onclick="novoCupom()">+ NOVO</button>
            </div>
            <div id="lista-cupons"></div>
        </div>

        <div class="sticky-top">
            <div class="d-flex gap-2">
                <button class="btn btn-success flex-grow-1 fw-bold" onclick="novoProduto()">+ NOVO PRODUTO</button>
                <button class="btn btn-warning flex-grow-1 fw-bold" id="btnSave" onclick="salvarCloud()">☁️ SALVAR TUDO</button>
            </div>
        </div>

        <div id="lista-produtos" class="mt-3"></div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
        authDomain: "myproject26-10f0e.firebaseapp.com",
        databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
        projectId: "myproject26-10f0e",
        storageBucket: "myproject26-10f0e.firebasestorage.app",
        messagingSenderId: "884850608032",
        appId: "1:884850608032:web:79db6983346c3c20edc6c5"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let produtos = [];

    function carregarTudo() {
        // Carrega Produtos
        db.ref('cardapio/produtos').on('value', snap => {
            const data = snap.val();
            produtos = data ? Object.values(data).filter(i => i !== null) : [];
            renderProdutos();
        });

        // Carrega Config Loja
        db.ref('configuracoes/statusLoja').on('value', snap => {
            const d = snap.val() || {};
            document.getElementById('loja-switch').checked = d.aberto;
            document.getElementById('h-abre').value = d.horarioAbertura || "";
            document.getElementById('h-fecha').value = d.horarioFechamento || "";
            const diasAbertos = d.diasAbertos || [];
            document.querySelectorAll('.dia-btn').forEach(btn => {
                btn.classList.toggle('active', diasAbertos.includes(parseInt(btn.dataset.dia)));
            });
        });

        // Carrega Cupons
        db.ref('configuracoes/cupons').on('value', snap => renderCupons(snap.val()));
    }

    function renderProdutos() {
        const div = document.getElementById('lista-produtos');
        div.innerHTML = "";
        produtos.forEach((p, i) => {
            const isAtivo = p.ativo !== false; //
            div.innerHTML += `
            <div class="card-prod ${isAtivo ? '' : 'is-hidden'}">
                <div class="d-flex gap-3">
                    <div style="text-align:center">
                        <img src="${p.image || ''}" class="img-admin" onerror="this.src='https://via.placeholder.com/70'">
                    </div>
                    <div class="flex-grow-1">
                        <div class="row g-2">
                            <div class="col-12"><label>Nome</label><input class="form-control" value="${p.title || ''}" onchange="edit(${i},'title',this.value)"></div>
                            <div class="col-6"><label>Categoria</label><input class="form-control" value="${p.categoria || ''}" onchange="edit(${i},'categoria',this.value)"></div>
                            <div class="col-6"><label>Preço R$</label><input class="form-control" type="number" step="0.01" value="${p.price || 0}" onchange="edit(${i},'price',this.value)"></div>
                            <div class="col-12"><label>Link da Imagem</label><input class="form-control" style="font-size:0.7rem; color:#00d1ff" value="${p.image || ''}" onchange="edit(${i},'image',this.value)"></div>
                            <div class="col-12"><label>Ingredientes</label><input class="form-control" value="${p.ingredientes || ''}" onchange="edit(${i},'ingredientes',this.value)"></div>
                        </div>
                    </div>
                </div>
                <div class="d-flex gap-2 mt-3 pt-2 border-top border-secondary">
                    <button class="btn ${isAtivo ? 'btn-outline-warning' : 'btn-success'} btn-sm flex-grow-1 fw-bold" onclick="toggleAtivo(${i})">
                        ${isAtivo ? 'SILENCIAR' : 'ATIVAR'}
                    </button>
                    <button class="btn btn-outline-danger btn-sm" onclick="remover(${i})">X</button>
                </div>
            </div>`;
        });
    }

    function renderCupons(obj) {
        const div = document.getElementById('lista-cupons');
        div.innerHTML = "";
        if(!obj) return div.innerHTML = "<small class='text-muted'>Nenhum cupom</small>";
        Object.entries(obj).forEach(([id, c]) => {
            div.innerHTML += `
            <div class="d-flex gap-2 mb-2">
                <input class="form-control py-1" value="${c.codigo}" readonly>
                <input class="form-control py-1" style="width:60px" value="${c.valor}%" readonly>
                <button class="btn btn-danger btn-sm" onclick="deletarCupom('${id}')">X</button>
            </div>`;
        });
    }

    // FUNÇÕES DE EDIÇÃO
    function edit(i, f, v) { produtos[i][f] = (f === 'price') ? parseFloat(v) : v; }
    function toggleAtivo(i) { 
        // Lógica forçada para evitar o erro de ficar cinza
        produtos[i].ativo = (produtos[i].ativo === false); 
        renderProdutos(); 
    }
    function toggleDia(el) { el.classList.toggle('active'); }
    function toggleLoja(s) { db.ref('configuracoes/statusLoja/aberto').set(s); }

    function salvarCloud() {
        const btn = document.getElementById('btnSave'); btn.innerText = "⏳...";
        db.ref('cardapio/produtos').set(produtos).then(() => { 
            alert("Salvo! ✅"); btn.innerText = "☁️ SALVAR TUDO"; 
        });
    }

    function salvarConfigLoja() {
        const dias = Array.from(document.querySelectorAll('.dia-btn.active')).map(b => parseInt(b.dataset.dia));
        db.ref('configuracoes/statusLoja').update({
            horarioAbertura: document.getElementById('h-abre').value,
            horarioFechamento: document.getElementById('h-fecha').value,
            diasAbertos: dias
        }).then(() => alert("Configurações salvas!"));
    }

    function novoCupom() {
        const cod = prompt("Nome do Cupom:");
        const val = prompt("Porcentagem (apenas números):");
        if(cod && val) db.ref('configuracoes/cupons').push({ codigo: cod.toUpperCase(), valor: parseInt(val), ativo: true });
    }
    function deletarCupom(id) { if(confirm("Apagar cupom?")) db.ref(`configuracoes/cupons/${id}`).remove(); }
    function novoProduto() { 
        produtos.unshift({title: "Novo", price: 0, categoria: "burger", image: "", ingredientes: "", ativo: true}); 
        renderProdutos(); 
    }
    function remover(i) { if(confirm("Excluir?")) { produtos.splice(i,1); salvarCloud(); } }

    carregarTudo();
</script>
</body>
</html>
