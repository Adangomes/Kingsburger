<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin Cloud - Kings Burger</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body { background: #111; color: white; padding: 30px; font-family: sans-serif; }
        .card-prod { background: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        .card-prod img { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; background: #333; }
        .form-control { background: #2b2b2b; border: 1px solid #444; color: white; }
        .form-control:focus { background: #333; color: white; border-color: #ffc107; box-shadow: none; }
        label { font-size: 0.8rem; color: #888; margin-bottom: 2px; }
        .header-painel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .btn-warning { font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-painel">
            <h2>Painel Admin <span class="text-warning">Kings Burger</span></h2>
            <div>
                <button class="btn btn-success me-2" onclick="novoProduto()">+ Novo Item</button>
                <button class="btn btn-warning" id="btnSalvar" onclick="salvarNoFirebase()">☁️ Salvar no Cloud</button>
            </div>
        </div>

        <div id="listaProdutos">
            <p class="text-center text-muted">Carregando cardápio do Firebase...</p>
        </div>
    </div>

<script>
    // --- 1. CONFIGURAÇÃO FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
        authDomain: "myproject26-10f0e.firebaseapp.com",
        databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
        projectId: "myproject26-10f0e",
        storageBucket: "myproject26-10f0e.firebasestorage.app",
        messagingSenderId: "884850608032",
        appId: "1:884850608032:web:79db6983346c3c20edc6c5"
    };

    // Inicializa o Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    let produtos = [];

    // --- 2. CARREGAR DADOS ---
    async function carregarProdutos() {
        const lista = document.getElementById("listaProdutos");
        
        // Buscamos na rota 'cardapio/produtos'
        db.ref('cardapio/produtos').once('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // Se for um objeto com chaves (ID), transformamos em array, senão usamos como está
                produtos = Array.isArray(data) ? data : Object.values(data);
                renderizar();
            } else {
                lista.innerHTML = '<p class="text-center text-danger">Nenhum produto encontrado. Comece adicionando um!</p>';
                produtos = [];
            }
        }).catch(err => {
            console.error(err);
            lista.innerHTML = '<p class="text-center text-danger">Erro ao conectar com Firebase.</p>';
        });
    }

    // --- 3. RENDERIZAR NA TELA ---
    function renderizar() {
        const lista = document.getElementById("listaProdutos");
        lista.innerHTML = "";

        produtos.forEach((p, i) => {
            lista.innerHTML += `
            <div class="card-prod">
                <div class="row align-items-center">
                    <div class="col-md-1 text-center">
                        <img src="${p.image}" onerror="this.src='https://via.placeholder.com/100?text=Sem+Foto'">
                    </div>
                    <div class="col-md-3">
                        <label>Título do Produto</label>
                        <input class="form-control" value="${p.title || ''}" onchange="editar(${i}, 'title', this.value)">
                    </div>
                    <div class="col-md-2">
                        <label>Preço (R$)</label>
                        <input class="form-control" type="number" step="0.01" value="${p.price || 0}" onchange="editar(${i}, 'price', this.value)">
                    </div>
                    <div class="col-md-2">
                        <label>Categoria</label>
                        <input class="form-control" value="${p.categoria || ''}" onchange="editar(${i}, 'categoria', this.value)">
                    </div>
                    <div class="col-md-3">
                        <label>URL da Imagem</label>
                        <input class="form-control" value="${p.image || ''}" onchange="editar(${i}, 'image', this.value)">
                    </div>
                    <div class="col-md-1 text-end">
                        <button class="btn btn-outline-danger btn-sm" onclick="excluir(${i})">Excluir</button>
                    </div>
                    <div class="col-12 mt-3">
                        <label>Ingredientes / Descrição</label>
                        <input class="form-control" value="${p.ingredientes || ''}" onchange="editar(${i}, 'ingredientes', this.value)">
                    </div>
                </div>
            </div>`;
        });
    }

    // --- 4. FUNÇÕES DE EDIÇÃO ---
    function editar(index, campo, valor) {
        if (campo === "price") valor = parseFloat(valor);
        produtos[index][campo] = valor;
    }

    function excluir(i) {
        if (confirm("Deseja realmente remover este item?")) {
            produtos.splice(i, 1);
            renderizar();
        }
    }

    function novoProduto() {
        produtos.unshift({ // Adiciona no topo da lista
            title: "Novo Burger",
            price: 0.00,
            categoria: "burger",
            ingredientes: "Pão, carne e queijo",
            image: "imagens/placeholder.png"
        });
        renderizar();
    }

    // --- 5. SALVAR NO FIREBASE (Mágica aqui!) ---
    function salvarNoFirebase() {
        const btn = document.getElementById("btnSalvar");
        btn.innerText = "⏳ SALVANDO...";
        btn.disabled = true;

        // Gravamos no caminho 'cardapio/produtos'
        db.ref('cardapio/produtos').set(produtos)
        .then(() => {
            alert("Cardápio atualizado com sucesso no Firebase! ✅");
        })
        .catch(err => {
            console.error(err);
            alert("Erro ao salvar: " + err.message);
        })
        .finally(() => {
            btn.innerText = "☁️ Salvar no Cloud";
            btn.disabled = false;
        });
    }

    // Inicialização
    carregarProdutos();

</script>

</body>
</html>
