<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin Real - Kings Burger</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
        body { background: #0d0d0d; color: white; padding: 20px; font-family: 'Segoe UI', sans-serif; }
        .card-prod { background: #1a1a1a; padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; transition: 0.3s; }
        .card-prod.inativo { opacity: 0.4; border-color: #555; filter: grayscale(1); }
        .card-prod img { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; }
        .form-control { background: #252525; border: 1px solid #444; color: white; }
        .form-control:focus { background: #333; color: white; border-color: #ffc107; box-shadow: none; }
        
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center;
        }
        .login-box { background: #1a1a1a; padding: 40px; border-radius: 25px; border: 1px solid #ffc107; text-align: center; width: 350px; }
        .camera-circle { width: 220px; height: 220px; margin: 0 auto; border-radius: 50%; border: 3px solid #ffc107; overflow: hidden; position: relative; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="login-box">
            <h3 class="text-warning mb-4">Kings Admin</h3>
            <div id="pass-area">
                <input type="password" id="local-pass" class="form-control mb-3 text-center" placeholder="Senha do Painel">
                <button class="btn btn-warning w-100" onclick="verificarAcessoLocal()">Acessar</button>
            </div>
            <div id="face-area" style="display:none;">
                <div class="camera-circle"><video id="video" autoplay muted playsinline></video></div>
                <p id="face-status" class="mt-3 small text-muted">Aguardando Biometria...</p>
                <button class="btn btn-outline-warning btn-sm" onclick="iniciarCaptura()">Validar Rosto</button>
            </div>
        </div>
    </div>

    <div class="container" id="main-content" style="display:none;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Admin <span class="text-warning">Real-Time</span></h2>
            <div>
                <span id="user-tag" class="badge bg-dark me-2"></span>
                <button class="btn btn-outline-danger btn-sm" onclick="logout()">Sair</button>
            </div>
        </div>

        <div class="card-prod border-warning mb-4">
            <div class="d-flex justify-content-between">
                <h5 class="mb-0">Status da Loja: <span id="loja-label">...</span></h5>
                <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="loja-switch" onchange="toggleLoja(this.checked)"></div>
            </div>
        </div>

        <div class="d-flex gap-2 mb-4">
            <button class="btn btn-success w-100" onclick="novoProduto()">+ Criar Produto</button>
            <button class="btn btn-warning w-100" id="btnSave" onclick="salvarCloud()">☁️ Salvar na Nuvem</button>
        </div>

        <div id="lista"></div>
    </div>

<script>
    // --- CREDENCIAIS REAIS DO FIREBASE ---
    const ADMIN_EMAIL = "adangones55@gmail.com";
    const ADMIN_PASS = "Ada44ada"; // <--- COLOQUE A SENHA QUE VOCÊ CRIOU NO FIREBASE AQUI

    const firebaseConfig = {
        apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
        authDomain: "myproject26-10f0e.firebaseapp.com",
        databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
        projectId: "myproject26-10f0e",
        storageBucket: "myproject26-10f0e.firebasestorage.app",
        messagingSenderId: "884850608032",
        appId: "1:884850608032:web:79db6983346c3c20edc6c5"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let produtos = [];
    let faceMatcher = null;

    // --- SEGURANÇA ---
    function verificarAcessoLocal() {
        if(document.getElementById('local-pass').value === "Kings@20BR26burger") {
            document.getElementById('pass-area').style.display = 'none';
            document.getElementById('face-area').style.display = 'block';
            iniciarCamera();
        } else alert("Senha incorreta");
    }

    async function iniciarCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
        document.getElementById('video').srcObject = stream;
        initFaceID();
    }

    async function initFaceID() {
        const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
        await Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
            faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
            faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
        ]);
        const img = await faceapi.fetchImage('imagens/Programador.jpeg');
        const desc = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
        faceMatcher = new faceapi.FaceMatcher(desc);
        document.getElementById('face-status').innerText = "IA Pronta ✅";
    }

    async function iniciarCaptura() {
        const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
        if(detection && faceMatcher.findBestMatch(detection.descriptor).label !== 'unknown') {
            logarNoFirebase();
        } else alert("Não reconhecido!");
    }

    async function logarNoFirebase() {
        try {
            await firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);
            await firebase.auth().signInWithEmailAndPassword(ADMIN_EMAIL, ADMIN_PASS);
            entrarNoPainel();
        } catch(e) { alert("Erro no Firebase: " + e.message); }
    }

    function entrarNoPainel() {
        document.getElementById('lock-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('user-tag').innerText = firebase.auth().currentUser.email;
        carregarDados();
    }

    // --- FUNÇÕES DE DADOS ---
    function carregarDados() {
        db.ref('cardapio/produtos').on('value', snap => { produtos = snap.val() || []; render(); });
        db.ref('configuracoes/statusLoja/aberto').on('value', snap => {
            const ab = snap.val();
            document.getElementById('loja-label').innerText = ab ? "ABERTA" : "FECHADA";
            document.getElementById('loja-switch').checked = ab;
        });
    }

    function render() {
        const lista = document.getElementById('lista');
        lista.innerHTML = "";
        produtos.forEach((p, i) => {
            const ativo = p.ativo !== false;
            lista.innerHTML += `
            <div class="card-prod ${ativo ? '' : 'inativo'}">
                <div class="row align-items-center">
                    <div class="col-2"><img src="${p.image}"></div>
                    <div class="col-4"><input class="form-control" value="${p.title}" onchange="edit(${i},'title',this.value)"></div>
                    <div class="col-2"><input class="form-control" type="number" value="${p.price}" onchange="edit(${i},'price',this.value)"></div>
                    <div class="col-4 text-end">
                        <button class="btn ${ativo ? 'btn-outline-light' : 'btn-success'} btn-sm" onclick="toggleAtivo(${i})">${ativo ? 'Silenciar' : 'Ativar'}</button>
                        <button class="btn btn-danger btn-sm" onclick="remover(${i})">X</button>
                    </div>
                </div>
            </div>`;
        });
    }

    function edit(i, f, v) { produtos[i][f] = f === 'price' ? parseFloat(v) : v; }
    function toggleAtivo(i) { produtos[i].ativo = (produtos[i].ativo === false); render(); }
    function novoProduto() { produtos.unshift({title: "Novo", price: 0, categoria: "burger", image: "", ativo: true}); render(); }
    function remover(i) { if(confirm("Remover?")) { produtos.splice(i, 1); salvarCloud(); } }
    function toggleLoja(s) { db.ref('configuracoes/statusLoja').update({ aberto: s }); }

    function salvarCloud() {
        const btn = document.getElementById('btnSave');
        btn.innerText = "⏳...";
        db.ref('cardapio/produtos').set(produtos).then(() => {
            alert("Sincronizado! ✅");
            btn.innerText = "☁️ Salvar na Nuvem";
        });
    }

    function logout() { firebase.auth().signOut().then(() => location.reload()); }

    firebase.auth().onAuthStateChanged(user => { if(user) entrarNoPainel(); });
</script>
</body>
</html>
