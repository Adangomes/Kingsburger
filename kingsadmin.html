<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Admin - Kings Burger</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#111;
color:white;
padding:30px;
}

.card-prod{
background:#1e1e1e;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

.card-prod img{
width:80px;
height:80px;
object-fit:cover;
border-radius:8px;
}

input{
margin-bottom:5px;
}

</style>

</head>

<body>

<h2>Painel Admin - Kings Burger</h2>

<button class="btn btn-success mb-3" onclick="novoProduto()">+ Novo Produto</button>
<button class="btn btn-warning mb-3" onclick="salvarJSON()">Salvar JSON</button>

<div id="listaProdutos"></div>


<script>

let produtos = []


async function carregarProdutos(){

const res = await fetch("content/produtos.json?v="+Date.now())
const data = await res.json()

produtos = data.produtos

renderizar()

}

function renderizar(){

const lista = document.getElementById("listaProdutos")

lista.innerHTML=""

produtos.forEach((p,i)=>{

lista.innerHTML += `

<div class="card-prod row">

<div class="col-md-2">
<img src="${p.image}">
</div>

<div class="col-md-3">
<input class="form-control" value="${p.title}" onchange="editar(${i},'title',this.value)">
</div>

<div class="col-md-2">
<input class="form-control" value="${p.price}" onchange="editar(${i},'price',this.value)">
</div>

<div class="col-md-2">
<input class="form-control" value="${p.categoria}" onchange="editar(${i},'categoria',this.value)">
</div>

<div class="col-md-2">
<input class="form-control" value="${p.image}" onchange="editar(${i},'image',this.value)">
</div>

<div class="col-md-1">
<button class="btn btn-danger" onclick="excluir(${i})">X</button>
</div>

<div class="col-12 mt-2">
<input class="form-control" value="${p.ingredientes}" onchange="editar(${i},'ingredientes',this.value)">
</div>

</div>

`

})

}


function editar(index,campo,valor){

if(campo=="price") valor = parseFloat(valor)

produtos[index][campo] = valor

}


function excluir(i){

if(confirm("Excluir produto?")){

produtos.splice(i,1)

renderizar()

}

}


function novoProduto(){

produtos.push({

title:"Novo Produto",
price:0,
categoria:"burger",
ingredientes:"",
image:"imagens/placeholder.png"

})

renderizar()

}


function salvarJSON(){

const data = {

produtos: produtos

}

const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"})

const a = document.createElement("a")

a.href = URL.createObjectURL(blob)

a.download = "produtos.json"

a.click()

}


carregarProdutos()

</script>

</body>
</html>
