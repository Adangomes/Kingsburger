<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kings Admin Pro - Autêntico</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
        body { background: #0a0a0a; color: white; padding-bottom: 50px; font-family: 'Inter', sans-serif; }
        .card-custom { background: #161616; border: 1px solid #333; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .card-prod { background: #1a1a1a; border-radius: 12px; border-left: 5px solid #ffc107; transition: 0.3s; }
        .card-prod.inativo { border-left-color: #444; opacity: 0.5; filter: grayscale(0.8); }
        
        .form-control { background: #222 !important; border: 1px solid #444 !important; color: white !important; font-size: 0.9rem; }
        .form-control:focus { border-color: #ffc107 !important; box-shadow: none !important; }
        
        label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; font-weight: bold; }
        
        .dia-btn { 
            width: 35px; height: 35px; border: 1px solid #444; background: #222; 
            color: #888; border-radius: 8px; cursor: pointer; display: inline-flex; 
            align-items: center; justify-content: center; font-weight: bold; transition: 0.3s;
        }
        .dia-btn.active { background: #ffc107; color: #000; border-color: #ffc107; }

        /* Lock Screen */
        #lock-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #111; border: 1px solid #ffc107; border-radius: 20px; padding: 40px; width: 350px; text-align: center; }
        .camera-wrap { width: 220px; height: 220px; border-radius: 50%; overflow: hidden; margin: 20px auto; border: 3px solid #ffc107; position: relative; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="login-box">
            <h4 class="text-warning">ACESSO RESTRITO</h4>
            <div id="pass-area">
                <input type="password" id="local-pass" class="form-control mb-3 text-center" placeholder="Senha do Painel">
                <button class="btn btn-warning w-100" onclick="verificarAcessoLocal()">Entrar</button>
            </div>
            <div id="face-area" style="display:none;">
                <div class="camera-wrap"><video id="video" autoplay muted playsinline></video></div>
                <p id="face-status" class="small text-muted">Carregando Biometria...</p>
                <button class="btn btn-outline-warning w-100" onclick="iniciarCaptura()">Validar Identidade</button>
            </div>
        </div>
    </div>

    <div class="container mt-4" id="main-content" style="display:none;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Kings <span class="text-warning">Admin</span></h2>
            <button class="btn btn-outline-danger btn-sm" onclick="logout()">Sair</button>
        </div>

        <div class="card-custom">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="text-warning mb-0">Configurações da Loja</h5>
                <div class="form-check form-switch scale-150">
                    <input class="form-check-input" type="checkbox" id="loja-switch" onchange="toggleLoja(this.checked)">
                </div>
            </div>
            <div class="row g-2">
                <div class="col-6"><label>Abre às</label><input type="time" id="h-abre" class="form-control"></div>
                <div class="col-6"><label>Fecha às</label><input type="time" id="h-fecha" class="form-control"></div>
            </div>
            <label class="mt-3 d-block">Dias de Funcionamento</label>
            <div class="d-flex gap-1 mt-1" id="dias-grid">
                <div class="dia-btn" data-dia="0" onclick="toggleDia(this)">D</div>
                <div class="dia-btn" data-dia="1" onclick="toggleDia(this)">S</div>
                <div class="dia-btn" data-dia="2" onclick="toggleDia(this)">T</div>
                <div class="dia-btn" data-dia="3" onclick="toggleDia(this)">Q</div>
                <div class="dia-btn" data-dia="4" onclick="toggleDia(this)">Q</div>
                <div class="dia-btn" data-dia="5" onclick="toggleDia(this)">S</div>
                <div class="dia-btn" data-dia="6" onclick="toggleDia(this)">S</div>
            </div>
            <button class="btn btn-warning btn-sm w-100 mt-3" onclick="salvarConfigLoja()">Atualizar Horários</button>
        </div>

        <div class="card-custom">
            <div class="d-flex justify-content-between mb-3">
                <h5 class="text-info">Cupons</h5>
                <button class="btn btn-outline-info btn-sm" onclick="novoCupom()">+ Novo Cupom</button>
            </div>
            <div id="lista-cupons"></div>
        </div>

        <div class="d-flex gap-2 mb-3">
            <button class="btn btn-success flex-grow-1" onclick="novoProduto()">+ Novo Produto</button>
            <button class="btn btn-warning flex-grow-1" id="btnSave" onclick="salvarCloud()">☁️ Salvar Alterações</button>
        </div>

        <div id="lista-produtos"></div>
    </div>

<script>
    const ADMIN_EMAIL = "adangones55@gmail.com";
    const ADMIN_PASS = "Ada44ada"; 

    const firebaseConfig = {
        apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
        authDomain: "myproject26-10f0e.firebaseapp.com",
        databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
        projectId: "myproject26-10f0e",
        storageBucket: "myproject26-10f0e.firebasestorage.app",
        messagingSenderId: "884850608032",
        appId: "1:884850608032:web:79db6983346c3c20edc6c5"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let produtos = [];
    let faceMatcher = null;

    // --- SEGURANÇA ---
    function verificarAcessoLocal() {
        if(document.getElementById('local-pass').value === "Kings@20BR26burger") {
            document.getElementById('pass-area').style.display = 'none';
            document.getElementById('face-area').style.display = 'block';
            navigator.mediaDevices.getUserMedia({ video: {} }).then(s => {
                document.getElementById('video').srcObject = s;
                initFaceID();
            });
        } else alert("Senha incorreta");
    }

    async function initFaceID() {
        const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
        await Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
            faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
            faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
        ]);
        try {
            const img = await faceapi.fetchImage('imagens/Programador.jpeg');
            const desc = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            faceMatcher = new faceapi.FaceMatcher(desc);
            document.getElementById('face-status').innerText = "IA Pronta ✅";
        } catch(e) { document.getElementById('face-status').innerText = "Erro ao carregar sua foto."; }
    }

    async function iniciarCaptura() {
        const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
        if(detection && faceMatcher.findBestMatch(detection.descriptor).label !== 'unknown') {
            await firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);
            await firebase.auth().signInWithEmailAndPassword(ADMIN_EMAIL, ADMIN_PASS);
            location.reload(); 
        } else alert("Rosto não autorizado!");
    }

    // --- LÓGICA DE DADOS ---
    firebase.auth().onAuthStateChanged(user => {
        if(user) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            carregarTudo();
        }
    });

    function carregarTudo() {
        // Produtos
        db.ref('cardapio/produtos').on('value', snap => {
            produtos = snap.val() || [];
            renderProdutos();
        });
        // Configs
        db.ref('configuracoes/statusLoja').on('value', snap => {
            const d = snap.val() || {};
            document.getElementById('loja-switch').checked = d.aberto;
            document.getElementById('h-abre').value = d.horarioAbertura || "";
            document.getElementById('h-fecha').value = d.horarioFechamento || "";
            const dias = d.diasAbertos || [];
            document.querySelectorAll('.dia-btn').forEach(b => {
                b.classList.toggle('active', dias.includes(parseInt(b.dataset.dia)));
            });
        });
        // Cupons
        db.ref('configuracoes/cupons').on('value', snap => renderCupons(snap.val()));
    }

    function renderProdutos() {
        const div = document.getElementById('lista-produtos');
        div.innerHTML = "";
        produtos.forEach((p, i) => {
            const ativo = p.ativo !== false;
            div.innerHTML += `
            <div class="card-custom card-prod ${ativo ? '' : 'inativo'}">
                <div class="row g-3">
                    <div class="col-md-2 text-center">
                        <img src="${p.image}" class="mb-2" onerror="this.src='https://via.placeholder.com/80'">
                        <input class="form-control form-control-sm" placeholder="Link Imagem" value="${p.image}" onchange="edit(${i},'image',this.value)">
                    </div>
                    <div class="col-md-4">
                        <label>Título</label><input class="form-control mb-2" value="${p.title}" onchange="edit(${i},'title',this.value)">
                        <label>Ingredientes</label><textarea class="form-control" rows="2" onchange="edit(${i},'ingredientes',this.value)">${p.ingredientes || ''}</textarea>
                    </div>
                    <div class="col-md-2">
                        <label>Preço</label><input class="form-control mb-2" type="number" step="0.01" value="${p.price}" onchange="edit(${i},'price',this.value)">
                        <label>Categoria</label><input class="form-control" value="${p.categoria}" onchange="edit(${i},'categoria',this.value)">
                    </div>
                    <div class="col-md-4 text-end d-flex flex-column justify-content-between">
                        <div>
                            <button class="btn ${ativo ? 'btn-outline-light' : 'btn-success'} btn-sm w-100 mb-2" onclick="toggleAtivo(${i})">
                                ${ativo ? '🔇 Silenciar Item' : '🔊 Ativar Item'}
                            </button>
                        </div>
                        <button class="btn btn-danger btn-sm w-100" onclick="remover(${i})">Excluir Permanente</button>
                    </div>
                </div>
            </div>`;
        });
    }

    function renderCupons(obj) {
        const div = document.getElementById('lista-cupons');
        div.innerHTML = "";
        if(!obj) return div.innerHTML = "<small class='text-muted'>Sem cupons</small>";
        Object.entries(obj).forEach(([id, c]) => {
            div.innerHTML += `
            <div class="d-flex gap-2 mb-2">
                <input class="form-control" value="${c.codigo}" readonly>
                <input class="form-control" style="width: 80px" value="${c.valor}%" readonly>
                <button class="btn btn-danger btn-sm" onclick="deletarCupom('${id}')">X</button>
            </div>`;
        });
    }

    // --- FUNÇÕES DE AÇÃO ---
    function edit(i, f, v) { produtos[i][f] = (f === 'price') ? parseFloat(v) : v; }
    function toggleAtivo(i) { produtos[i].ativo = (produtos[i].ativo === false); renderProdutos(); }
    function toggleDia(el) { el.classList.toggle('active'); }
    function novoProduto() { produtos.unshift({title: "Novo", price: 0, categoria: "burger", image: "", ingredientes: "", ativo: true}); renderProdutos(); }
    function remover(i) { if(confirm("Deseja excluir?")) { produtos.splice(i, 1); salvarCloud(); } }

    function salvarCloud() {
        const btn = document.getElementById('btnSave');
        btn.innerText = "⏳...";
        db.ref('cardapio/produtos').set(produtos).then(() => {
            alert("Produtos Sincronizados! ✅");
            btn.innerText = "☁️ Salvar na Nuvem";
        });
    }

    function salvarConfigLoja() {
        const dias = Array.from(document.querySelectorAll('.dia-btn.active')).map(b => parseInt(b.dataset.dia));
        db.ref('configuracoes/statusLoja').update({
            horarioAbertura: document.getElementById('h-abre').value,
            horarioFechamento: document.getElementById('h-fecha').value,
            diasAbertos: dias
        }).then(() => alert("Configurações Salvas!"));
    }

    function toggleLoja(s) { db.ref('configuracoes/statusLoja/aberto').set(s); }
    function novoCupom() { 
        const cod = prompt("Código do Cupom:").toUpperCase();
        const val = parseInt(prompt("Valor de desconto (apenas número %):"));
        if(cod && val) db.ref('configuracoes/cupons').push({ codigo: cod, valor: val, ativo: true });
    }
    function deletarCupom(id) { if(confirm("Deletar cupom?")) db.ref(`configuracoes/cupons/${id}`).remove(); }
    function logout() { firebase.auth().signOut().then(() => location.reload()); }
</script>
</body>
</html>
