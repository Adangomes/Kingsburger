<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Kings Burger - Gestão Total</title>
    <link rel="stylesheet" href="admin.css">
    <style>
        /* Estilos da Tela de Login */
        #tela-login { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-box { background: #111; padding: 30px; border-radius: 15px; border: 2px solid #f37021; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 0 20px rgba(243, 112, 33, 0.2); }
        .login-box h2 { color: #f37021; margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; background: #f37021; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* Estilos de Gestão de Cardápio */
        .card-menu { background: #1a1a1a; padding: 15px; margin: 10px; border-radius: 8px; border-left: 5px solid #f37021; display: flex; flex-direction: column; gap: 8px; }
        .card-menu input { background: #222; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; }
        .loja-status { background: #222; padding: 20px; margin: 10px; border-radius: 8px; text-align: center; border: 1px solid #444; }
        .status-badge { padding: 10px 20px; border-radius: 20px; font-weight: bold; display: inline-block; margin-bottom: 10px; }
        .aberto { background: #2e7d32; color: #fff; }
        .fechado { background: #c62828; color: #fff; }
        
        /* Filtros e Resumos */
        .filtro-container { background: #1a1a1a; padding: 15px; margin: 10px; border-radius: 8px; }
        .resumo-financeiro { background: #222; padding: 15px; border-radius: 8px; margin: 10px; color: #fff; border-left: 5px solid #ffcc00; }
    </style>
</head>

<body>
    <div id="tela-login">
        <div class="login-box">
            <h2>KINGS <span>ADMIN</span></h2>
            <input type="text" id="user-id" placeholder="ID do Usuário">
            <input type="password" id="user-pass" placeholder="Senha de Acesso">
            <button onclick="validarAcesso()">ACESSAR PAINEL</button>
        </div>
    </div>

    <div id="container-ativacao" style="display: none;">
        <div style="text-align: center;">
            <h2 style="color: #ffcc00; margin-bottom: 20px;">KINGS BURGER</h2>
            <button onclick="ativarSom()">INICIAR PAINEL</button>
        </div>
    </div>

    <header class="admin-header">
        <h1>KINGS <span>BURGER</span></h1>
        <div style="display: flex; gap: 10px;">
            <button class="btn-refresh" onclick="location.reload()">🔄</button>
            <button class="btn-refresh" onclick="logout()" style="background: #444;">🚪</button>
        </div>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" onclick="mudarAba('pendente', this)">NOVOS</button>
        <button class="tab-btn" onclick="mudarAba('historico', this)">FINANCEIRO</button>
        <button class="tab-btn" onclick="mudarAba('cardapio', this)" style="color: #ffcc00;">CARDÁPIO</button>
    </nav>

    <div id="area-relatorio" style="display:none;">
        <div class="filtro-container">
            <button class="btn-filtro active" onclick="setFiltro('hoje', this)">HOJE</button>
            <button class="btn-filtro" onclick="setFiltro('mes', this)">MÊS</button>
            <button class="btn-pdf" onclick="gerarPDF()" style="margin-top:10px; width:100%;">📄 BAIXAR PDF</button>
        </div>
        <div id="resumo-box" class="resumo-financeiro">
            <div>Bruto: <span id="res-bruto">R$ 0,00</span></div>
            <div style="color:#ffcc00;">Comissão 10%: <span id="res-comissao">R$ 0,00</span></div>
        </div>
    </div>

    <div id="area-cardapio" style="display:none;">
        <div class="loja-status" id="status-loja-box">
            </div>
        <div id="lista-produtos-edit">
            </div>
    </div>

    <ul id="pedidos-container"></ul>
    <iframe id="iframe-impressao" style="display:none;"></iframe>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        const CREDENCIAIS = { usuario: "kings##26burger", senha: "35Op89Bk190" };
        const firebaseConfig = {
            apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
            databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
            projectId: "myproject26-10f0e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let abaAtiva = 'pendente';
        let iniciado = false;

        function validarAcesso() {
            const user = document.getElementById('user-id').value;
            const pass = document.getElementById('user-pass').value;
            if (user === CREDENCIAIS.usuario && pass === CREDENCIAIS.senha) {
                localStorage.setItem('kings_session', btoa(user + ":" + pass));
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('container-ativacao').style.display = 'flex';
            }
        }

        window.onload = () => {
            if (localStorage.getItem('kings_session') === btoa(CREDENCIAIS.usuario + ":" + CREDENCIAIS.senha)) {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('container-ativacao').style.display = 'flex';
            }
        };

        function logout() { localStorage.removeItem('kings_session'); location.reload(); }

        function ativarSom() {
            document.getElementById('container-ativacao').style.display = 'none';
            iniciado = true;
            carregarDados();
            ouvirCardapio();
            ouvirStatusLoja();
        }

        function mudarAba(aba, btn) {
            abaAtiva = aba;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            document.getElementById('area-relatorio').style.display = (aba === 'historico') ? 'block' : 'none';
            document.getElementById('area-cardapio').style.display = (aba === 'cardapio') ? 'block' : 'none';
            document.getElementById('pedidos-container').style.display = (aba === 'cardapio') ? 'none' : 'block';
            
            carregarDados();
        }

        // --- GESTÃO DE STATUS DA LOJA ---
        function ouvirStatusLoja() {
            db.ref('status_kings').on('value', snap => {
                const s = snap.val() || { aberto: true, mensagem: "" };
                const box = document.getElementById('status-loja-box');
                box.innerHTML = `
                    <div class="status-badge ${s.aberto ? 'aberto' : 'fechado'}">
                        LOJA ${s.aberto ? 'ABERTA' : 'FECHADA'}
                    </div><br>
                    <button onclick="alternarLoja(${!s.aberto})" style="background:#444; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;">
                        ${s.aberto ? 'FECHAR AGORA' : 'ABRIR AGORA'}
                    </button>
                `;
            });
        }

        function alternarLoja(status) {
            const msg = status ? "" : "Estamos fechados no momento 😔";
            db.ref('status_kings').update({ aberto: status, mensagem: msg });
        }

        // --- GESTÃO DO CARDÁPIO ---
        function ouvirCardapio() {
            db.ref('cardapio_kings/produtos').on('value', snap => {
                const lista = document.getElementById('lista-produtos-edit');
                lista.innerHTML = "<h3 style='color:white; margin:15px;'>Editar Produtos</h3>";
                
                snap.forEach(item => {
                    const p = item.val();
                    const key = item.key;
                    lista.innerHTML += `
                        <div class="card-menu">
                            <label style="color:#888; font-size:12px;">Nome do Produto</label>
                            <input type="text" value="${p.title}" onchange="atualizarProduto('${key}', 'title', this.value)">
                            <label style="color:#888; font-size:12px;">Preço (R$)</label>
                            <input type="number" step="0.01" value="${p.price}" onchange="atualizarProduto('${key}', 'price', this.value)">
                            <label style="color:#888; font-size:12px;">Ingredientes</label>
                            <input type="text" value="${p.ingredientes}" onchange="atualizarProduto('${key}', 'ingredientes', this.value)">
                        </div>
                    `;
                });
            });
        }

        function atualizarProduto(id, campo, valor) {
            let dado = valor;
            if(campo === 'price') dado = parseFloat(valor);
            db.ref(`cardapio_kings/produtos/${id}`).update({ [campo]: dado });
        }

        // --- PEDIDOS E FINANCEIRO (REUTILIZADO DO ANTERIOR) ---
        function carregarDados() {
            if (!iniciado || abaAtiva === 'cardapio') return;
            const path = (abaAtiva === 'historico') ? 'relatorios_kings' : 'pedidos_kings';
            
            db.ref(path).on('value', (snapshot) => {
                const container = document.getElementById('pedidos-container');
                container.innerHTML = "";
                let totalDia = 0;

                snapshot.forEach(child => {
                    const p = child.val();
                    if (abaAtiva !== 'historico' && p.status !== abaAtiva) return;

                    totalDia += parseFloat(p.total);
                    const li = document.createElement('li');
                    li.className = `pedido-card`;
                    li.innerHTML = `
                        <div class="card-header"><b>${p.cliente}</b> <span>${p.horario || ''}</span></div>
                        <div class="itens-box">${p.itens ? p.itens.map(i => `${i.qtd}x ${i.produto}`).join('<br>') : ''}</div>
                        <div class="total-area">R$ ${parseFloat(p.total).toFixed(2)}</div>
                        <div class="btn-actions">
                            ${abaAtiva === 'pendente' ? `<button onclick="db.ref('pedidos_kings/${child.key}').update({status:'preparando'})">ACEITAR</button>` : ''}
                            ${abaAtiva === 'preparando' ? `<button onclick="db.ref('pedidos_kings/${child.key}').update({status:'entrega'})">SAIU ENTREGA</button>` : ''}
                            ${abaAtiva === 'entrega' ? `<button onclick="concluirPedido('${child.key}')">FINALIZAR</button>` : ''}
                        </div>
                    `;
                    container.appendChild(li);
                });

                if(abaAtiva === 'historico'){
                    document.getElementById('res-bruto').innerText = `R$ ${totalDia.toFixed(2)}`;
                    document.getElementById('res-comissao').innerText = `R$ ${(totalDia * 0.1).toFixed(2)}`;
                }
            });
        }

        function concluirPedido(id) {
            db.ref('pedidos_kings/' + id).once('value', s => {
                const dados = s.val();
                dados.concluidoEm = Date.now();
                db.ref('relatorios_kings').push(dados).then(() => db.ref('pedidos_kings/' + id).remove());
            });
        }
    </script>
</body>
</html>
