<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINGS BURGER - ADMIN PROFISSIONAL</title>
    <style>
        body{ margin:0; font-family:Arial, sans-serif; background:#0f0f0f; color:white; }
        header{ background:#000; padding:15px; text-align:center; font-size:22px; font-weight:bold; border-bottom:2px solid #ff9800; }
        header span{ color:#ff9800; }
        .tabs{ display:flex; overflow:auto; background:#111; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
        .tab-btn{ flex:1; padding:14px; background:#111; border:none; color:white; font-weight:bold; cursor:pointer; min-width: 100px; transition: 0.3s; }
        .tab-btn.active{ background:#ff9800; color:black; }
        
        #pedidos-container{ list-style:none; padding:10px; display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:10px; }
        .pedido-card{ background:#1a1a1a; padding:15px; border-radius:10px; border:1px solid #333; }
        .cliente{ font-size:18px; font-weight:bold; color:#ff9800; }
        .info{ font-size:14px; margin-top:4px; border-bottom: 1px solid #222; padding-bottom: 2px; }
        .itens{ background:#000; padding:8px; margin-top:8px; border-radius:5px; border-left: 3px solid #ff9800; }
        .total{ font-size:18px; font-weight:bold; margin-top:8px; color: #4CAF50; }
        
        .btn-area{ margin-top:10px; display:flex; gap:5px; flex-wrap:wrap; }
        button{ border:none; padding:8px 12px; border-radius:5px; font-weight:bold; cursor:pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-success{background:#4CAF50;color:white;}
        .btn-danger{background:#f44336;color:white;}
        .btn-info{background:#2196F3;color:white;}
        .btn-warning{background:#ff9800;color:black;}
        .btn-gray{background:#444;color:white;}

        .painel{ padding:20px; background: #111; margin: 10px; border-radius: 10px; max-width: 900px; margin-left: auto; margin-right: auto; }
        .form-group { background:#1a1a1a; padding:15px; border-radius:8px; margin-bottom: 20px; border: 1px solid #333; }
        input, select { padding:10px; margin:5px 0; border:1px solid #333; border-radius:5px; background:#000; color:white; width: 100%; box-sizing: border-box; }
        
        .grid-produtos { display: grid; gap: 10px; }
        .prod-item { display: flex; align-items: center; background: #1a1a1a; padding: 10px; border-radius: 8px; gap: 15px; border: 1px solid #333; }
        .prod-img { width: 60px; height: 60px; border-radius: 5px; object-fit: cover; background: #333; }
        .prod-info { flex: 1; }
        .cat-title { color: #ff9800; border-left: 4px solid #ff9800; padding-left: 10px; margin: 20px 0 10px 0; text-transform: uppercase; font-size: 14px; }
        
        .badge-status { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .status-on { background: #4CAF50; color: white; }
        .status-off { background: #f44336; color: white; }
    </style>
</head>
<body>

<header>KINGS <span>BURGER</span> ADMIN</header>

<nav class="tabs">
    <button class="tab-btn active" onclick="mudarAba('pendente',this)">NOVOS</button>
    <button class="tab-btn" onclick="mudarAba('preparando',this)">COZINHA</button>
    <button class="tab-btn" onclick="mudarAba('entrega',this)">ENTREGA</button>
    <button class="tab-btn" onclick="mudarAba('historico',this)">HISTÓRICO</button>
    <button class="tab-btn" onclick="mudarAba('produtos',this)">PRODUTOS</button>
    <button class="tab-btn" onclick="mudarAba('cupons',this)">CUPONS</button>
</nav>

<ul id="pedidos-container"></ul>
<div id="painel" class="painel" style="display:none;"></div>

<audio id="alerta"><source src="https://assets.mixkit.co/sfx/preview/mixkit-alarm-digital-clock-beep-989.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// --- CONFIGURAÇÃO FIREBASE ---
const firebaseConfig = {
    apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
    databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
    projectId: "myproject26-10f0e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let aba = "pendente";
let primeiroCarregamento = true;

// --- NAVEGAÇÃO ---
function mudarAba(a, btn) {
    aba = a;
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    const container = document.getElementById("pedidos-container");
    const painel = document.getElementById("painel");

    if (["produtos", "cupons"].includes(a)) {
        container.style.display = "none";
        painel.style.display = "block";
        if (a == "produtos") painelProdutos();
        if (a == "cupons") painelCupons();
    } else {
        container.style.display = "grid";
        painel.style.display = "none";
        carregarPedidos();
    }
}

// --- GESTÃO DE PEDIDOS ---
function tocarSom() {
    const audio = document.getElementById("alerta");
    audio.play().catch(e => console.log("Som bloqueado"));
}

function carregarPedidos() {
    const path = aba == "historico" ? "relatorios_kings" : "pedidos_kings";
    db.ref(path).on("value", snap => {
        const container = document.getElementById("pedidos-container");
        if (aba === "produtos" || aba === "cupons") return;
        container.innerHTML = "";
        
        if (!primeiroCarregamento && aba == "pendente") tocarSom();
        primeiroCarregamento = false;

        snap.forEach(child => {
            const p = child.val();
            if (aba != "historico" && p.status != aba) return;

            let itensHtml = "";
            if (p.itens) p.itens.forEach(i => itensHtml += `<div><b>${i.qtd}x</b> ${i.produto}</div>`);

            let botoes = "";
            if (p.status == "pendente") {
                botoes = `<button class="btn-success" onclick="mudarStatus('${child.key}', 'preparando')">ACEITAR</button>
                          <button class="btn-danger" onclick="recusar('${child.key}')">RECUSAR</button>`;
            } else if (p.status == "preparando") {
                botoes = `<button class="btn-info" onclick="mudarStatus('${child.key}', 'entrega')">SAIU ENTREGA</button>`;
            } else if (p.status == "entrega") {
                botoes = `<button class="btn-success" onclick="finalizar('${child.key}')">FINALIZAR</button>`;
            }

            const li = document.createElement("li");
            li.className = "pedido-card";
            li.innerHTML = `
                <div class="cliente">${p.cliente || "Sem Nome"}</div>
                <div class="info">${p.telefone || ""}</div>
                <div class="info">${p.endereco || (p.rua + ', ' + p.numero)}</div>
                <div class="itens">${itensHtml}</div>
                <div class="total">TOTAL R$ ${p.total?.toFixed(2)}</div>
                <div class="btn-area">${botoes}</div>
            `;
            container.appendChild(li);
        });
    });
}

function mudarStatus(id, novoStatus) { db.ref("pedidos_kings/" + id).update({ status: novoStatus }); }

function finalizar(id) {
    db.ref("pedidos_kings/" + id).once("value", s => {
        let d = s.val();
        d.status = "concluido";
        db.ref("relatorios_kings").push(d).then(() => db.ref("pedidos_kings/" + id).remove());
    });
}

function recusar(id) { if (confirm("Recusar pedido?")) db.ref("pedidos_kings/" + id).remove(); }

// --- PAINEL DE PRODUTOS COMPLETO ---
function painelProdutos() {
    const painel = document.getElementById("painel");
    painel.innerHTML = `
        <h2>Gerenciar Cardápio</h2>
        <div class="form-group">
            <input id="pNome" placeholder="Nome do Produto (ex: X-Salada)">
            <input id="pPreco" type="number" step="0.01" placeholder="Preço (ex: 28.50)">
            <input id="pImg" placeholder="Link da Foto (URL)">
            <input id="pCat" placeholder="Categoria (ex: Burgers, Bebidas, Combos)">
            <button class="btn-success" style="width:100%; margin-top:10px;" onclick="addProduto()">ADICIONAR / ATUALIZAR</button>
        </div>
        <div id="listaProdutos"></div>
    `;

    db.ref("produtos_db").on("value", snap => {
        const lista = document.getElementById("listaProdutos");
        lista.innerHTML = "";
        let categorias = {};

        snap.forEach(c => {
            const p = c.val();
            const cat = p.categoria || "Geral";
            if (!categorias[cat]) categorias[cat] = [];
            categorias[cat].push({ id: c.key, ...p });
        });

        for (let cat in categorias) {
            lista.innerHTML += `<div class="cat-title">${cat}</div>`;
            categorias[cat].forEach(p => {
                lista.innerHTML += `
                    <div class="prod-item">
                        <img src="${p.img || 'https://via.placeholder.com/60'}" class="prod-img">
                        <div class="prod-info">
                            <div style="font-weight:bold">${p.nome}</div>
                            <div style="color:#4CAF50">R$ ${p.preco.toFixed(2)}</div>
                        </div>
                        <button class="${p.ativo ? 'btn-success' : 'btn-gray'}" onclick="toggleStatus('${p.id}', ${p.ativo})">
                            ${p.ativo ? 'ATIVO' : 'PAUSADO'}
                        </button>
                        <button class="btn-info" onclick="editarProduto('${p.id}')">EDITAR</button>
                        <button class="btn-danger" onclick="delProduto('${p.id}')">X</button>
                    </div>`;
            });
        }
    });
}

function addProduto() {
    const nome = document.getElementById("pNome").value;
    const preco = document.getElementById("pPreco").value;
    const img = document.getElementById("pImg").value;
    const categoria = document.getElementById("pCat").value || "Geral";

    if(!nome || !preco) return alert("Preencha Nome e Preço!");

    const dados = { nome, preco: parseFloat(preco), img, categoria, ativo: true };
    
    // Se o nome já existe, ele atualiza, se não, cria novo
    db.ref("produtos_db").push(dados);
    
    document.getElementById("pNome").value = "";
    document.getElementById("pPreco").value = "";
    document.getElementById("pImg").value = "";
}

function toggleStatus(id, status) { db.ref("produtos_db/" + id).update({ ativo: !status }); }
function delProduto(id) { if(confirm("Excluir produto?")) db.ref("produtos_db/" + id).remove(); }

function editarProduto(id) {
    db.ref("produtos_db/" + id).once("value", s => {
        const p = s.val();
        document.getElementById("pNome").value = p.nome;
        document.getElementById("pPreco").value = p.preco;
        document.getElementById("pImg").value = p.img;
        document.getElementById("pCat").value = p.categoria;
        // Remove o antigo para salvar como novo ao clicar em adicionar ou você pode implementar update direto
        db.ref("produtos_db/" + id).remove();
        window.scrollTo(0,0);
    });
}

// --- PAINEL DE CUPONS COMPLETO ---
function painelCupons() {
    const painel = document.getElementById("painel");
    painel.innerHTML = `
        <h2>Gerenciar Cupons</h2>
        <div class="form-group">
            <input id="cNome" placeholder="Código (ex: KINGS10)" style="text-transform:uppercase">
            <input id="cValor" type="number" placeholder="Valor (R$ ou %)">
            <select id="cTipo">
                <option value="porcentagem">% Porcentagem</option>
                <option value="fixo">R$ Valor Fixo</option>
            </select>
            <button class="btn-success" style="width:100%; margin-top:10px;" onclick="addCupom()">CRIAR CUPOM</button>
        </div>
        <div id="listaCupons"></div>
    `;

    db.ref("cupons_db").on("value", snap => {
        const lista = document.getElementById("listaCupons");
        lista.innerHTML = "";
        snap.forEach(c => {
            const p = c.val();
            lista.innerHTML += `
                <div class="prod-item">
                    <div class="prod-info">
                        <b style="color:#ff9800">${p.codigo}</b> - 
                        <span>${p.valor}${p.tipo == 'porcentagem' ? '%' : ' Reais'} de desconto</span>
                    </div>
                    <button class="btn-danger" onclick="delCupom('${c.key}')">REMOVER</button>
                </div>`;
        });
    });
}

function addCupom() {
    const codigo = document.getElementById("cNome").value.toUpperCase();
    const valor = document.getElementById("cValor").value;
    const tipo = document.getElementById("cTipo").value;
    if(!codigo || !valor) return alert("Preencha tudo!");
    db.ref("cupons_db").push({ codigo, valor: parseFloat(valor), tipo, ativo: true });
    document.getElementById("cNome").value = "";
    document.getElementById("cValor").value = "";
}

function delCupom(id) { db.ref("cupons_db/" + id).remove(); }

// Iniciar
carregarPedidos();
</script>
</body>
</html>
