<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestão de Pedidos - Kings Burger</title>
    <link rel="stylesheet" href="admin.css">
    
</head>

<body>
    <div id="container-ativacao">
        <div style="text-align: center; background: #222; padding: 30px; border-radius: 15px; border: 2px solid #ffcc00;">
            <h2 style="color: #ffcc00; margin-bottom: 20px;">KINGS BURGER</h2>
            <p style="color: white; margin-bottom: 20px;">Painel Administrativo</p>
            <button onclick="ativarSom()" style="padding: 15px 30px; font-weight: bold; cursor: pointer; background: #ffcc00; border: none; border-radius: 8px;">INICIAR SISTEMA</button>
        </div>
    </div>

    <header class="admin-header">
        <h1>KINGS <span>BURGER</span></h1>
        <button class="btn-refresh" onclick="location.reload()">🔄</button>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" onclick="mudarAba('Pendente', this)">NOVOS</button>
        <button class="tab-btn" onclick="mudarAba('Preparando', this)">COZINHA</button>
        <button class="tab-btn" onclick="mudarAba('Saiu para Entrega', this)">ENTREGA</button>
        <button class="tab-btn btn-hist" onclick="mudarAba('historico', this)">HISTÓRICO</button>
    </nav>

    <div id="area-relatorio" style="display:none; padding: 15px;">
        <button class="btn-pdf" onclick="gerarPDF()">GERAR PDF DO HISTÓRICO</button>
    </div>

    <ul id="pedidos-container"></ul>

    <iframe id="iframe-impressao" style="display:none;"></iframe>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
            authDomain: "myproject26-10f0e.firebaseapp.com",
            databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
            projectId: "myproject26-10f0e",
            storageBucket: "myproject26-10f0e.firebasestorage.app",
            messagingSenderId: "884850608032",
            appId: "1:884850608032:web:79db6983346c3c20edc6c5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const SENHA_ADMIN = "Kings@20BR26burger"; 
        const ID_LOJA = "kings_burger";
        const audioAlerta = new Audio('alert.mpeg');
        let abaAtiva = 'Pendente';
        let iniciado = false;

        function ativarSom() {
            const senha = prompt("Digite a senha de acesso:");
            if (senha !== SENHA_ADMIN) return alert("Senha incorreta!");
            document.getElementById('container-ativacao').style.display = 'none';
            iniciado = true;
            audioAlerta.play().then(() => { audioAlerta.pause(); carregarDados(); }).catch(() => carregarDados());
        }

        function mudarAba(aba, btn) {
            abaAtiva = aba;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('area-relatorio').style.display = (aba === 'historico') ? 'block' : 'none';
            carregarDados();
        }

        function carregarDados() {
            if (!iniciado) return;
            const path = (abaAtiva === 'historico') ? `relatorios/${ID_LOJA}` : `pedidos/${ID_LOJA}`;

            db.ref(path).on('value', (snapshot) => {
                const container = document.getElementById('pedidos-container');
                container.innerHTML = "";
                let temPendente = false;

                snapshot.forEach(child => {
                    const p = child.val();
                    const id = child.key;
                    
                    if (abaAtiva !== 'historico' && p.status !== abaAtiva) return;
                    if (p.status === 'Pendente') temPendente = true;

                    const li = document.createElement('li');
                    li.className = `pedido-card`;

                    let botoes = "";
                    if (p.status === 'Pendente') {
                        botoes = `
                            <button class="btn-success" onclick="db.ref('pedidos/${ID_LOJA}/${id}').update({status:'Preparando'})">ACEITAR PEDIDO</button>
                            <button class="btn-recusar" onclick="if(confirm('Recusar?')) db.ref('pedidos/${ID_LOJA}/${id}').remove()">RECUSAR</button>`;
                    } else if (p.status === 'Preparando') {
                        botoes = `
                            <button class="btn-warning" onclick="imprimirPedido('${id}')">IMPRIMIR</button>
                            <button class="btn-info" onclick="db.ref('pedidos/${ID_LOJA}/${id}').update({status:'Saiu para Entrega'})">SAIU PARA ENTREGA</button>`;
                    } else if (p.status === 'Saiu para Entrega') {
                        botoes = `<button class="btn-success" onclick="concluirPedido('${id}')">CONCLUIR</button>`;
                    }

                    li.innerHTML = `
                        <div class="card-header">
                            <span class="cliente-nome">${p.cliente}</span>
                            <span class="hora">${p.horario || ''}</span>
                        </div>
                        <p class="info"><b>CELULAR:</b> ${p.contato || 'N/A'}</p>
                        <p class="info"><b>ENDEREÇO:</b> ${p.endereco}</p>
                        ${p.referencia ? `<p class="info-detalhe"><b>REF:</b> ${p.referencia}</p>` : ''}
                        
                        <p class="info"><b>PGTO:</b> ${p.pagamento} ${p.troco && p.troco !== 'Não precisa' ? `<span class="troco-alerta">(Troco p/ ${p.troco})</span>` : ''}</p>
                        
                        <div class="obs-caixa">
                            <b>OBS COZINHA:</b><br>
                            ${p.obs_cozinha || 'Nenhuma'}
                        </div>

                        <div class="itens-box">
                            ${p.itens ? p.itens.map(i => `• ${i.produto}`).join('<br>') : 'Sem itens'}
                        </div>
                        <div class="total-area">TOTAL: R$ ${parseFloat(p.total).toFixed(2)}</div>
                        <div class="btn-actions">${botoes}</div>
                    `;
                    container.appendChild(li);
                });

                if (temPendente && abaAtiva === 'Pendente' && audioAlerta.paused) {
                    audioAlerta.play().catch(() => {});
                }
            });
        }

        function concluirPedido(id) {
            db.ref(`pedidos/${ID_LOJA}/${id}`).once('value', s => {
                const dados = s.val();
                if(!dados) return;
                dados.status = 'Finalizado';
                db.ref(`relatorios/${ID_LOJA}`).push(dados).then(() => db.ref(`pedidos/${ID_LOJA}/${id}`).remove());
            });
        }

        function imprimirPedido(id) {
            db.ref(`pedidos/${ID_LOJA}/${id}`).once('value', (snapshot) => {
                const p = snapshot.val();
                if(!p) return;
                const cupom = `
                    <html><body style="font-family:Arial; width:80mm;">
                        <center><b>KINGS BURGER</b><br>------------------------</center>
                        <b>CLIENTE:</b> ${p.cliente}<br>
                        <b>FONE:</b> ${p.contato}<br>
                        <b>DATA:</b> ${p.horario}<br>
                        ------------------------<br>
                        <b>ITENS:</b><br>${p.itens ? p.itens.map(i => `• ${i.produto}`).join('<br>') : ''}<br>
                        ------------------------<br>
                        <b>ENDEREÇO:</b> ${p.endereco}<br>
                        <b>REF:</b> ${p.referencia || '-'}<br>
                        <b>PGTO:</b> ${p.pagamento}<br>
                        <b>TROCO:</b> ${p.troco || 'N/A'}<br>
                        <b>OBS:</b> ${p.obs_cozinha || '-'}<br>
                        ------------------------<br>
                        <center><b style="font-size:18px;">TOTAL: R$ ${parseFloat(p.total).toFixed(2)}</b></center>
                    </body></html>`;
                const frame = document.getElementById('iframe-impressao');
                frame.contentWindow.document.open();
                frame.contentWindow.document.write(cupom);
                frame.contentWindow.document.close();
                setTimeout(() => frame.contentWindow.print(), 500);
            });
        }
    </script>
</body>
</html>
