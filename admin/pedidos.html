<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINGS BURGER - ADMIN</title>
    <style>
        body{ margin:0; font-family:Arial; background:#0f0f0f; color:white; }
        header{ background:#000; padding:15px; text-align:center; font-size:22px; font-weight:bold; border-bottom:2px solid #ff9800; }
        header span{ color:#ff9800; }
        .tabs{ display:flex; overflow:auto; background:#111; position: sticky; top: 0; z-index: 100; }
        .tab-btn{ flex:1; padding:14px; background:#111; border:none; color:white; font-weight:bold; cursor:pointer; min-width: 100px; }
        .tab-btn.active{ background:#ff9800; color:black; }
        #pedidos-container{ list-style:none; padding:10px; display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:10px; }
        .pedido-card{ background:#1a1a1a; padding:15px; border-radius:10px; border:1px solid #333; position: relative; }
        .cliente{ font-size:18px; font-weight:bold; color:#ff9800; }
        .info{ font-size:14px; margin-top:4px; border-bottom: 1px solid #222; padding-bottom: 2px; }
        .itens{ background:#000; padding:8px; margin-top:8px; border-radius:5px; border-left: 3px solid #ff9800; }
        .total{ font-size:18px; font-weight:bold; margin-top:8px; color: #4CAF50; }
        .btn-area{ margin-top:10px; display:flex; gap:5px; flex-wrap:wrap; }
        button{ border:none; padding:8px 10px; border-radius:5px; font-weight:bold; cursor:pointer; }
        .btn-success{background:#4CAF50;color:white;}
        .btn-danger{background:#f44336;color:white;}
        .btn-info{background:#2196F3;color:white;}
        .btn-warning{background:#ff9800;color:black;}
        .painel{ padding:20px; background: #111; margin: 10px; border-radius: 10px; }
        input{ padding:8px; margin:5px; border:none; border-radius:5px; width: 200px; }
        .badge-pagamento { background: #333; padding: 2px 6px; border-radius: 4px; font-size: 11px; text-transform: uppercase; }
    </style>
</head>
<body>

<header>KINGS <span>BURGER</span> ADMIN</header>

<nav class="tabs">
    <button class="tab-btn active" onclick="mudarAba('pendente',this)">NOVOS</button>
    <button class="tab-btn" onclick="mudarAba('preparando',this)">COZINHA</button>
    <button class="tab-btn" onclick="mudarAba('entrega',this)">ENTREGA</button>
    <button class="tab-btn" onclick="mudarAba('historico',this)">HISTÓRICO</button>
    <button class="tab-btn" onclick="mudarAba('produtos',this)">PRODUTOS</button>
    <button class="tab-btn" onclick="mudarAba('cupons',this)">CUPONS</button>
</nav>

<ul id="pedidos-container"></ul>
<div id="painel" class="painel" style="display:none;"></div>

<audio id="alerta"><source src="https://assets.mixkit.co/sfx/preview/mixkit-alarm-digital-clock-beep-989.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
    databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
    projectId: "myproject26-10f0e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let aba = "pendente";
let primeiroCarregamento = true;

function mudarAba(a, btn) {
    aba = a;
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    const container = document.getElementById("pedidos-container");
    const painel = document.getElementById("painel");

    if (["produtos", "cupons"].includes(a)) {
        container.style.display = "none";
        painel.style.display = "block";
        if (a == "produtos") painelProdutos();
        if (a == "cupons") painelCupons();
    } else {
        container.style.display = "grid";
        painel.style.display = "none";
        carregarPedidos();
    }
}

function tocarSom() {
    const audio = document.getElementById("alerta");
    audio.play().catch(e => console.log("Som bloqueado pelo navegador"));
}

function carregarPedidos() {
    const path = aba == "historico" ? "relatorios_kings" : "pedidos_kings";
    
    db.ref(path).on("value", snap => {
        const container = document.getElementById("pedidos-container");
        if (aba === "produtos" || aba === "cupons") return; 
        
        container.innerHTML = "";
        
        // Alerta sonoro apenas para novos pedidos na aba Pendente
        if (!primeiroCarregamento && aba == "pendente") tocarSom();
        primeiroCarregamento = false;

        snap.forEach(child => {
            const p = child.val();
            // Filtra pelo status, exceto na aba histórico que mostra todos
            if (aba != "historico" && p.status != aba) return;

            let itensHtml = "";
            if (p.itens) {
                p.itens.forEach(i => {
                    itensHtml += `<div><b>${i.qtd}x</b> ${i.produto}</div>`;
                });
            }

            let botoes = "";
            if (p.status == "pendente") {
                botoes = `
                    <button class="btn-success" onclick="mudarStatus('${child.key}', 'preparando')">ACEITAR</button>
                    <button class="btn-danger" onclick="recusar('${child.key}')">RECUSAR</button>`;
            } else if (p.status == "preparando") {
                botoes = `<button class="btn-info" onclick="mudarStatus('${child.key}', 'entrega')">SAIU ENTREGA</button>`;
            } else if (p.status == "entrega") {
                botoes = `<button class="btn-success" onclick="finalizar('${child.key}')">FINALIZAR</button>`;
            }

            const li = document.createElement("li");
            li.className = "pedido-card";
            li.innerHTML = `
                <div class="cliente">${p.cliente || "Sem Nome"}</div>
                <div class="info">${p.telefone || "Sem Telefone"}</div>
                <div class="info">${p.endereco || (p.rua + ', ' + p.numero)}</div>
                <div class="info">Ref: ${p.referencia || "N/A"}</div>
                <div class="info">Pagamento: <span class="badge-pagamento">${p.pagamento}</span></div>
                <div class="itens">${itensHtml}</div>
                <div class="info" style="margin-top:10px">Subtotal: R$ ${p.subtotal?.toFixed(2)}</div>
                <div class="info">Taxa: R$ ${p.taxaEntrega?.toFixed(2)}</div>
                ${p.desconto > 0 ? `<div class="info" style="color:red">Desconto: - R$ ${p.desconto.toFixed(2)}</div>` : ''}
                <div class="total">TOTAL R$ ${p.total?.toFixed(2)}</div>
                <div class="info" style="color:#888; font-size:11px">${p.horario} | ID: ${child.key.slice(-5)}</div>
                <div class="btn-area">${botoes}</div>
            `;
            container.appendChild(li);
        });
    });
}

function mudarStatus(id, novoStatus) {
    db.ref("pedidos_kings/" + id).update({ status: novoStatus });
}

function finalizar(id) {
    db.ref("pedidos_kings/" + id).once("value", s => {
        let d = s.val();
        d.status = "concluido";
        d.finalizadoEm = new Date().toLocaleString();
        db.ref("relatorios_kings").push(d).then(() => {
            db.ref("pedidos_kings/" + id).remove();
        });
    });
}

function recusar(id) {
    if (confirm("Deseja realmente recusar e excluir este pedido?")) {
        db.ref("pedidos_kings/" + id).remove();
    }
}

// --- PAINEL PRODUTOS (Por que não abria? Porque faltava o nó 'produtos' no Firebase) ---
function painelProdutos() {
    const painel = document.getElementById("painel");
    painel.innerHTML = `
        <h2>Gerenciar Produtos</h2>
        <p style="font-size:12px; color:#888">Nota: Estes produtos são salvos no Firebase, não no produtos.json fixo.</p>
        <div style="background:#222; padding:15px; border-radius:5px">
            <input id="nomeProduto" placeholder="Nome do Produto">
            <input id="precoProduto" type="number" placeholder="Preço (ex: 25.50)">
            <button class="btn-success" onclick="addProduto()">ADICIONAR</button>
        </div>
        <div id="listaProdutos" style="margin-top:20px"></div>
    `;

    db.ref("produtos_db").on("value", snap => {
        const lista = document.getElementById("listaProdutos");
        lista.innerHTML = "";
        snap.forEach(c => {
            const p = c.val();
            lista.innerHTML += `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid #333">
                    <span>${p.nome} - <b>R$ ${parseFloat(p.preco).toFixed(2)}</b></span>
                    <button class="btn-danger" onclick="delProduto('${c.key}')">REMOVER</button>
                </div>`;
        });
    });
}

function addProduto() {
    const nome = document.getElementById("nomeProduto").value;
    const preco = document.getElementById("precoProduto").value;
    if(!nome || !preco) return alert("Preencha tudo!");
    db.ref("produtos_db").push({ nome, preco: parseFloat(preco) });
    document.getElementById("nomeProduto").value = "";
    document.getElementById("precoProduto").value = "";
}

function delProduto(id) { db.ref("produtos_db/" + id).remove(); }

// --- PAINEL CUPONS ---
function painelCupons() {
    const painel = document.getElementById("painel");
    painel.innerHTML = `
        <h2>Gerenciar Cupons</h2>
        <div style="background:#222; padding:15px; border-radius:5px">
            <input id="cupomNome" placeholder="CÓDIGO (ex: KINGS10)">
            <input id="cupomValor" type="number" placeholder="Valor (R$ ou %)">
            <select id="cupomTipo" style="padding:8px; border-radius:5px">
                <option value="porcentagem">% Porcentagem</option>
                <option value="fixo">R$ Valor Fixo</option>
            </select>
            <button class="btn-success" onclick="addCupom()">GERAR CUPOM</button>
        </div>
        <div id="listaCupons" style="margin-top:20px"></div>
    `;

    db.ref("cupons_db").on("value", snap => {
        const lista = document.getElementById("listaCupons");
        lista.innerHTML = "";
        snap.forEach(c => {
            const p = c.val();
            lista.innerHTML += `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid #333">
                    <span><b>${p.codigo}</b> - ${p.valor}${p.tipo == 'porcentagem' ? '%' : ' Reais'}</span>
                    <button class="btn-danger" onclick="delCupom('${c.key}')">X</button>
                </div>`;
        });
    });
}

function addCupom() {
    const codigo = document.getElementById("cupomNome").value.toUpperCase();
    const valor = document.getElementById("cupomValor").value;
    const tipo = document.getElementById("cupomTipo").value;
    if(!codigo || !valor) return alert("Preencha tudo!");
    db.ref("cupons_db").push({ codigo, valor: parseFloat(valor), tipo, ativo: true });
}

function delCupom(id) { db.ref("cupons_db/" + id).remove(); }

// Iniciar
carregarPedidos();
</script>
</body>
</html>
