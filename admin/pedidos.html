<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KINGS BURGER - PAINEL</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<header class="admin-header">
<h1>KINGS <span>BURGER</span></h1>
</header>

<nav class="tabs">

<button class="tab-btn active"
onclick="mudarAba('pendente',this)">
NOVOS
</button>

<button class="tab-btn"
onclick="mudarAba('preparando',this)">
COZINHA
</button>

<button class="tab-btn"
onclick="mudarAba('entrega',this)">
ENTREGA
</button>

<button class="tab-btn"
onclick="mudarAba('historico',this)">
HISTÓRICO
</button>

</nav>

<ul id="pedidos-container"></ul>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {

apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
projectId: "myproject26-10f0e"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let abaAtiva="pendente";

function mudarAba(a,btn){

abaAtiva=a;

document.querySelectorAll(".tab-btn")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

carregarPedidos();

}

function carregarPedidos(){

const path = abaAtiva==="historico"
? "relatorios_kings"
: "pedidos_kings";

db.ref(path).on("value",(snap)=>{

const container=document.getElementById("pedidos-container");

container.innerHTML="";

snap.forEach(child=>{

const p = child.val();

if(abaAtiva!=="historico" && p.status!==abaAtiva) return;

let itensHTML="";

if(p.itens){

p.itens.forEach(i=>{

itensHTML+=`
<div>
${i.qtd}x ${i.produto}
</div>
`;

});

}

let botoes="";

if(abaAtiva==="pendente"){

botoes=`

<button class="btn-success"
onclick="aceitar('${child.key}')">
ACEITAR
</button>

<button class="btn-danger"
onclick="recusar('${child.key}')">
RECUSAR
</button>

`;

}

if(abaAtiva==="preparando"){

botoes=`

<button class="btn-info"
onclick="entrega('${child.key}')">
SAIU PARA ENTREGA
</button>

`;

}

if(abaAtiva==="entrega"){

botoes=`

<button class="btn-success"
onclick="finalizar('${child.key}')">
FINALIZAR
</button>

`;

}

const li=document.createElement("li");

li.className="pedido-card";

li.innerHTML=`

<div class="cliente-nome">

${p.nomeCliente || "Cliente"}

</div>

<div class="info">

📍 ${p.rua || ""}, ${p.numero || ""} - ${p.bairro || ""}

</div>

<div class="info">

📞 WhatsApp: ${p.whatsappCliente || "não informado"}

</div>

<div class="info">

💳 Pagamento: ${p.pagamento || "-"}

</div>

<div class="info">

📍 Referência: ${p.referencia || "não informada"}

</div>

<div class="itens-box">

${itensHTML}

</div>

<div class="info">

Subtotal: R$ ${parseFloat(p.subtotal || 0).toFixed(2)}

</div>

<div class="info">

Entrega: R$ ${parseFloat(p.taxaEntrega || 0).toFixed(2)}

</div>

<div class="total-area">

TOTAL: R$ ${parseFloat(p.total || 0).toFixed(2)}

</div>

<div class="info">

⏰ ${p.horario || ""}

</div>

<div class="btn-actions">

${botoes}

</div>

`;

container.appendChild(li);

});

});

}

function aceitar(id){

db.ref("pedidos_kings/"+id)
.update({status:"preparando"});

}

function entrega(id){

db.ref("pedidos_kings/"+id)
.update({status:"entrega"});

}

function finalizar(id){

db.ref("pedidos_kings/"+id)
.once("value",s=>{

let dados=s.val();

dados.status="concluido";

db.ref("relatorios_kings")
.push(dados)
.then(()=>{

db.ref("pedidos_kings/"+id)
.remove();

});

});

}

function recusar(id){

if(confirm("Recusar pedido?")){

db.ref("pedidos_kings/"+id)
.remove();

}

}

carregarPedidos();

</script>

</body>
</html>
