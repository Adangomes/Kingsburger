<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KINGS BURGER - PEDIDOS</title>
</head>
<body>
<header>
<h1>KINGS BURGER</h1>
</header>
<nav class="tabs">
<button class="active" onclick="mudarAba('pendente',this)">NOVOS</button>
<button onclick="mudarAba('preparando',this)">COZINHA</button>
<button onclick="mudarAba('entrega',this)">ENTREGA</button>
<button onclick="mudarAba('historico',this)">HISTÓRICO</button>
</nav>
<ul id="pedidos-container"></ul>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
projectId: "myproject26-10f0e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let abaAtiva="pendente";

function mudarAba(a,btn){

abaAtiva=a;

document.querySelectorAll(".tabs button")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

carregarPedidos();
}

function carregarPedidos(){

const path = abaAtiva==="historico"
? "relatorios_kings"
: "pedidos_kings";

db.ref(path).on("value",(snap)=>{

const container=document.getElementById("pedidos-container");

container.innerHTML="";

snap.forEach(child=>{

const p = child.val();

if(abaAtiva!=="historico" && p.status!==abaAtiva) return;

const li=document.createElement("li");

li.className="pedido-card";

let itensHTML="";

if(p.itens){

p.itens.forEach(i=>{

itensHTML += `
<div>${i.qtd}x ${i.produto} - R$ ${i.precoUn}</div>
`;

});

}

let botoes="";

if(abaAtiva==="pendente"){

botoes=`

<button class="btn-aceitar"
onclick="aceitar('${child.key}')">
ACEITAR
</button>

<button class="btn-recusar"
onclick="recusar('${child.key}')">
RECUSAR
</button>

`;

}

if(abaAtiva==="preparando"){

botoes=`

<button class="btn-entrega"
onclick="entrega('${child.key}')">
SAIU PARA ENTREGA
</button>

`;

}

if(abaAtiva==="entrega"){

botoes=`

<button class="btn-finalizar"
onclick="finalizar('${child.key}')">
FINALIZAR
</button>

`;

}

li.innerHTML=`

<div class="cliente">${p.cliente}</div>

<div class="endereco">
${p.endereco}
</div>

<div class="info-extra">
📞 WhatsApp: ${p.whatsapp || "não informado"} <br>
💳 Pagamento: ${p.pagamento} <br>
📍 Referência: ${p.referencia}
</div>

<div class="itens">

${itensHTML}

</div>

<div class="total">

Total: R$ ${parseFloat(p.total).toFixed(2)}

</div>

<div class="info-extra">

⏰ ${p.horario}

</div>

<div class="btns">

${botoes}

</div>

`;

container.appendChild(li);

});

});
}

function aceitar(id){

db.ref("pedidos_kings/"+id)
.update({status:"preparando"});

}

function entrega(id){

db.ref("pedidos_kings/"+id)
.update({status:"entrega"});

}

function finalizar(id){

db.ref("pedidos_kings/"+id)
.once("value",s=>{

let dados=s.val();

dados.status="concluido";

db.ref("relatorios_kings")
.push(dados)
.then(()=>{

db.ref("pedidos_kings/"+id)
.remove();

});

});
}

function recusar(id){

if(confirm("Recusar pedido?")){

db.ref("pedidos_kings/"+id)
.remove();

}

}

carregarPedidos();

</script>

</body>
</html>
