<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Kings Burger - Gestão Pro</title>
    <link rel="stylesheet" href="admin.css">
</head>

<body>
    <div id="tela-login">
        <div class="login-box">
            <h2>KINGS <span>ADMIN</span></h2>
            <input type="text" id="user-id" placeholder="ID do Usuário">
            <input type="password" id="user-pass" placeholder="Senha de Acesso">
            <button onclick="validarAcesso()">ACESSAR PAINEL</button>
            <p id="msg-erro" style="color:red; display:none; margin-top: 10px;">Acesso negado.</p>
        </div>
    </div>

    <div id="modal-editor">
        <div class="editor-content">
            <div class="editor-header">
                <h2 style="color: white; margin: 0;">Configurações</h2>
                <button class="btn-fechar-modal" onclick="fecharEditor()">X SAIR</button>
            </div>

            <div class="editor-tabs">
                <button class="e-tab active" onclick="tabEditor('loja', this)">LOJA</button>
                <button class="e-tab" onclick="tabEditor('produtos', this)">PRODUTOS</button>
                <button class="e-tab" onclick="tabEditor('categorias', this)">CATEGORIAS</button>
                <button class="e-tab" onclick="tabEditor('cupons', this)">CUPONS</button>
            </div>

            <div id="tab-loja" class="e-content">
                <div class="secao-edit">
                    <h3>Status do Restaurante</h3>
                    <div id="status-loja-container"></div>
                </div>
                <div class="secao-edit" style="border-left-color: #28a745;">
                    <h3>Sincronização Inicial</h3>
                    <p style="color: #888; font-size: 11px;">Use apenas se o cardápio estiver vazio.</p>
                    <button onclick="sincronizarTudo()" style="background:#28a745; color:white; border:none; padding:10px; border-radius:5px; width:100%; cursor:pointer;">🔄 RESETAR E CARREGAR PADRÃO</button>
                </div>
            </div>

            <div id="tab-produtos" class="e-content" style="display:none;">
                <div class="secao-edit">
                    <h3>+ Novo Produto</h3>
                    <div class="item-edit-card">
                        <input type="text" id="add-p-titulo" placeholder="Nome do Produto">
                        <input type="number" id="add-p-preco" placeholder="Preço (Ex: 25.90)">
                        <select id="add-p-cat"></select>
                        <textarea id="add-p-desc" placeholder="Ingredientes"></textarea>
                        <input type="text" id="add-p-img" placeholder="Caminho da Imagem">
                        <button onclick="salvarNovoProduto()" style="background:#f37021; color:white; border:none; padding:10px; border-radius:5px; width:100%;">CADASTRAR</button>
                    </div>
                </div>
                <div class="secao-edit">
                    <h3>Editar Existentes</h3>
                    <div id="lista-produtos-editor"></div>
                </div>
            </div>

            <div id="tab-categorias" class="e-content" style="display:none;">
                <div class="secao-edit">
                    <h3>Nova Categoria</h3>
                    <div style="display:flex; gap:5px;">
                        <input type="text" id="nova-categoria" placeholder="Ex: Bebidas" style="flex:1;">
                        <button onclick="addCategoria()" style="background:#f37021; border:none; color:white; padding:0 15px; border-radius:5px;">+</button>
                    </div>
                    <div id="lista-categorias-gerir" style="margin-top:15px;"></div>
                </div>
            </div>

            <div id="tab-cupons" class="e-content" style="display:none;">
                <div class="secao-edit">
                    <h3>Novo Cupom</h3>
                    <div class="item-edit-card">
                        <input type="text" id="cup-codigo" placeholder="CÓDIGO (Ex: KINGS10)">
                        <select id="cup-tipo">
                            <option value="porcentagem">Porcentagem (%)</option>
                            <option value="fixo">Valor Fixo (R$)</option>
                        </select>
                        <input type="number" id="cup-valor" placeholder="Valor">
                        <button onclick="salvarCupom()" style="background:#f37021; color:white; border:none; padding:10px; border-radius:5px; width:100%;">CRIAR CUPOM</button>
                    </div>
                </div>
                <div id="lista-cupons-editor"></div>
            </div>
        </div>
    </div>

    <div id="container-ativacao" style="display: none;">
        <button onclick="ativarSom()">INICIAR PAINEL</button>
    </div>

    <header class="admin-header">
        <h1>KINGS <span>BURGER</span></h1>
        <div style="display: flex; gap: 10px;">
            <button class="btn-refresh" onclick="abrirEditor()" style="background: #f37021;">⚙️</button>
            <button class="btn-refresh" onclick="location.reload()">🔄</button>
            <button class="btn-refresh" onclick="logout()" style="background: #444;">🚪</button>
        </div>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" onclick="mudarAba('pendente', this)">NOVOS</button>
        <button class="tab-btn" onclick="mudarAba('preparando', this)">COZINHA</button>
        <button class="tab-btn" onclick="mudarAba('entrega', this)">ENTREGA</button>
        <button class="tab-btn btn-hist" onclick="mudarAba('historico', this)">HISTÓRICO</button>
    </nav>

    <div id="area-relatorio" style="display:none;">
        <div class="filtro-container">
            <div class="filtro-btns">
                <button class="btn-filtro active" onclick="setFiltro('hoje', this)">HOJE</button>
                <button class="btn-filtro" onclick="setFiltro('semana', this)">SEMANA</button>
                <button class="btn-filtro" onclick="setFiltro('mes', this)">MÊS</button>
                <button class="btn-filtro" onclick="setFiltro('ano', this)">ANO</button>
            </div>
            <input type="date" id="filtro-data" onchange="setFiltro('especifico', this)" style="width:100%; padding:8px; border-radius:5px; background: #222; color: white; border: 1px solid #444;">
        </div>

        <div id="resumo-box" class="resumo-financeiro">
            <div class="resumo-item"><span>Total Bruto:</span> <span id="res-bruto">R$ 0,00</span></div>
            <div class="resumo-item"><span>Total Entregas:</span> <span id="res-entrega">R$ 0,00</span></div>
            <div class="resumo-item comissao-destaque"><span>Comissão (10%):</span> <span id="res-comissao">R$ 0,00</span></div>
        </div>
    </div>

    <ul id="pedidos-container"></ul>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        const CREDENCIAIS = { usuario: "kings##26burger", senha: "35Op89Bk190" };
        const firebaseConfig = {
            apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
            databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
            projectId: "myproject26-10f0e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let abaAtiva = 'pendente';
        let iniciado = false;

        // --- LOGIN ---
        function validarAcesso() {
            const user = document.getElementById('user-id').value;
            const pass = document.getElementById('user-pass').value;
            if (user === CREDENCIAIS.usuario && pass === CREDENCIAIS.senha) {
                localStorage.setItem('kings_session', btoa(user + ":" + pass));
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('container-ativacao').style.display = 'flex';
            } else {
                document.getElementById('msg-erro').style.display = 'block';
            }
        }

        window.onload = () => {
            if (localStorage.getItem('kings_session') === btoa(CREDENCIAIS.usuario + ":" + CREDENCIAIS.senha)) {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('container-ativacao').style.display = 'flex';
            }
        };

        function logout() { localStorage.removeItem('kings_session'); location.reload(); }

        function ativarSom() {
            document.getElementById('container-ativacao').style.display = 'none';
            iniciado = true;
            carregarDados();
            ouvirStatusLoja();
            ouvirCardapio();
            ouvirCategorias();
            ouvirCupons();
        }

        // --- FUNÇÕES DO EDITOR ---
        function abrirEditor() { document.getElementById('modal-editor').style.display = 'block'; }
        function fecharEditor() { document.getElementById('modal-editor').style.display = 'none'; }
        
        function tabEditor(aba, btn) {
            document.querySelectorAll('.e-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.e-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + aba).style.display = 'block';
            btn.classList.add('active');
        }

        // --- FIREBASE: CARDÁPIO, STATUS, CUPONS ---
        function ouvirCardapio() {
            db.ref('cardapio_kings/produtos').on('value', snap => {
                const lista = document.getElementById('lista-produtos-editor');
                lista.innerHTML = "";
                snap.forEach(item => {
                    const p = item.val(); const key = item.key;
                    lista.innerHTML += `
                        <div class="item-edit-card">
                            <input type="text" value="${p.title}" onchange="atualizarItem('${key}', 'title', this.value)">
                            <div style="display:flex; gap:5px;">
                                <input type="number" step="0.01" value="${p.price}" onchange="atualizarItem('${key}', 'price', this.value)" style="flex:1">
                                <input type="text" value="${p.categoria}" onchange="atualizarItem('${key}', 'categoria', this.value)" style="flex:1">
                            </div>
                            <textarea onchange="atualizarItem('${key}', 'ingredientes', this.value)">${p.ingredientes}</textarea>
                            <button class="btn-danger-sm" onclick="deletarItem('produtos', '${key}')">Excluir</button>
                        </div>`;
                });
            });
        }

        function salvarNovoProduto() {
            const p = {
                title: document.getElementById('add-p-titulo').value,
                price: parseFloat(document.getElementById('add-p-preco').value),
                categoria: document.getElementById('add-p-cat').value,
                ingredientes: document.getElementById('add-p-desc').value,
                image: document.getElementById('add-p-img').value || "imagens/default.jpg"
            };
            if(!p.title || !p.price) return alert("Preencha nome e preço!");
            db.ref('cardapio_kings/produtos').push(p).then(() => {
                alert("Produto Adicionado!");
                document.querySelectorAll('#tab-produtos input, #tab-produtos textarea').forEach(i => i.value = "");
            });
        }

        function atualizarItem(id, campo, valor) {
            let v = (campo === 'price') ? parseFloat(valor) : valor;
            db.ref(`cardapio_kings/produtos/${id}`).update({ [campo]: v });
        }

        function ouvirCategorias() {
            db.ref('cardapio_kings/categorias').on('value', snap => {
                const lista = document.getElementById('lista-categorias-gerir');
                const select = document.getElementById('add-p-cat');
                lista.innerHTML = ""; select.innerHTML = "";
                snap.forEach(c => {
                    const nome = c.val().nome;
                    lista.innerHTML += `<div style="display:flex; justify-content:space-between; background:#222; padding:8px; margin-bottom:5px; border-radius:5px;">${nome} <button class="btn-danger-sm" onclick="deletarItem('categorias', '${c.key}')" style="margin:0">X</button></div>`;
                    select.innerHTML += `<option value="${nome}">${nome}</option>`;
                });
            });
        }

        function addCategoria() {
            const nome = document.getElementById('nova-categoria').value;
            if(!nome) return;
            db.ref('cardapio_kings/categorias').push({ nome: nome });
            document.getElementById('nova-categoria').value = "";
        }

        function ouvirCupons() {
            db.ref('cardapio_kings/cupons').on('value', snap => {
                const lista = document.getElementById('lista-cupons-editor');
                lista.innerHTML = "<h3>Cupons Ativos</h3>";
                snap.forEach(c => {
                    const cup = c.val();
                    lista.innerHTML += `<div class="item-edit-card"><b style="color:#f37021">${cup.codigo}</b> - ${cup.tipo === 'porcentagem' ? cup.valor+'%' : 'R$ '+cup.valor}<button class="btn-danger-sm" onclick="deletarItem('cupons', '${c.key}')" style="display:block">Remover</button></div>`;
                });
            });
        }

        function salvarCupom() {
            const cup = {
                codigo: document.getElementById('cup-codigo').value.toUpperCase(),
                tipo: document.getElementById('cup-tipo').value,
                valor: parseFloat(document.getElementById('cup-valor').value),
                ativo: true
            };
            if(!cup.codigo || !cup.valor) return alert("Preencha o cupom!");
            db.ref('cardapio_kings/cupons').push(cup);
        }

        function deletarItem(path, id) {
            if(confirm("Tem certeza que deseja excluir?")) db.ref(`cardapio_kings/${path}/${id}`).remove();
        }

        function sincronizarTudo() {
            if(!confirm("Resetar cardápio para o padrão?")) return;
            const inicial = {
                produtos: { "p1": { title: "Kings Burger Tradicional", price: 23.99, categoria: "Burger", ingredientes: "Hambúrguer 140g, queijo e pão brioche", image: "imagens/kingstradicional.jpg" } },
                categorias: { "c1": {nome: "Burger"} },
                cupons: { "cp1": {codigo: "KINGS10", tipo: "porcentagem", valor: 10, ativo: true} }
            };
            db.ref('cardapio_kings').set(inicial).then(() => alert("Sincronizado!"));
        }

        function ouvirStatusLoja() {
            db.ref('status_kings').on('value', snap => {
                const s = snap.val() || { aberto: true };
                document.getElementById('status-loja-container').innerHTML = `<button class="status-loja-btn ${s.aberto ? 'aberta' : 'fechada'}" onclick="alternarLoja(${!s.aberto})">LOJA ESTÁ ${s.aberto ? 'ABERTA' : 'FECHADA'}</button>`;
            });
        }
        function alternarLoja(status) { db.ref('status_kings').update({ aberto: status }); }

        // --- GESTÃO DE PEDIDOS ---
        function carregarDados() {
            if (!iniciado) return;
            const path = (abaAtiva === 'historico') ? 'relatorios_kings' : 'pedidos_kings';
            db.ref(path).on('value', (snapshot) => {
                const container = document.getElementById('pedidos-container');
                container.innerHTML = "";
                let somaBruto = 0, somaEntrega = 0;
                snapshot.forEach(child => {
                    const p = child.val();
                    if (abaAtiva !== 'historico' && p.status !== abaAtiva) return;
                    
                    somaBruto += parseFloat(p.total || 0);
                    somaEntrega += parseFloat(p.taxaEntrega || 0);

                    const li = document.createElement('li');
                    li.className = `pedido-card`;
                    let acaoHtml = "";
                    if (abaAtiva === 'pendente') acaoHtml = `<button class="btn-success" onclick="db.ref('pedidos_kings/${child.key}').update({status:'preparando'})">ACEITAR</button>`;
                    else if (abaAtiva === 'preparando') acaoHtml = `<button class="btn-info" onclick="db.ref('pedidos_kings/${child.key}').update({status:'entrega'})">ENTREGA</button>`;
                    else if (abaAtiva === 'entrega') acaoHtml = `<button class="btn-success" onclick="concluirPedido('${child.key}')">FINALIZAR</button>`;

                    li.innerHTML = `
                        <div class="card-header"><span class="cliente-nome">${p.cliente}</span></div>
                        <div class="itens-box">${p.itens ? p.itens.map(i => `<b>${i.qtd}x</b> ${i.produto}`).join('<br>') : ''}</div>
                        <div class="total-area">TOTAL: R$ ${parseFloat(p.total).toFixed(2)}</div>
                        <div class="btn-actions">${acaoHtml}</div>`;
                    container.appendChild(li);
                });
                if(abaAtiva === 'historico'){
                    document.getElementById('res-bruto').
