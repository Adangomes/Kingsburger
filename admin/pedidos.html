<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestão de Pedidos - Kings Burger</title>
    <link rel="stylesheet" href="admin.css">
</head>

<body>
    <div id="container-ativacao">
        <div style="text-align: center; background: #222; padding: 30px; border-radius: 15px; border: 2px solid #ffcc00;">
            <h2 style="color: #ffcc00; margin-bottom: 20px;">KINGS BURGER</h2>
            <p style="color: white; margin-bottom: 20px;">Painel Administrativo</p>
            <button onclick="ativarSom()" style="padding: 15px 30px; font-weight: bold; cursor: pointer; background: #ffcc00; border: none; border-radius: 8px;">INICIAR SISTEMA</button>
        </div>
    </div>

    <header class="admin-header">
        <h1>KINGS <span>BURGER</span></h1>
        <button class="btn-refresh" onclick="location.reload()">🔄</button>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" onclick="mudarAba('pendente', this)">NOVOS</button>
        <button class="tab-btn" onclick="mudarAba('preparando', this)">COZINHA</button>
        <button class="tab-btn" onclick="mudarAba('entrega', this)">ENTREGA</button>
        <button class="tab-btn btn-hist" onclick="mudarAba('historico', this)">HISTÓRICO</button>
    </nav>

    <div id="area-relatorio" style="display:none; padding: 15px;">
        <button class="btn-pdf" onclick="gerarPDF()">📄 GERAR PDF DO HISTÓRICO</button>
    </div>

    <ul id="pedidos-container"></ul>

    <iframe id="iframe-impressao" style="display:none;"></iframe>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
            authDomain: "myproject26-10f0e.firebaseapp.com",
            databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
            projectId: "myproject26-10f0e",
            storageBucket: "myproject26-10f0e.firebasestorage.app",
            messagingSenderId: "884850608032",
            appId: "1:884850608032:web:79db6983346c3c20edc6c5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- CONFIGURAÇÕES ---
        const SENHA_ADMIN = "1234"; // Altere sua senha aqui
        const audioAlerta = new Audio('alert.mpeg');
        audioAlerta.loop = false;
        let contadorRepeticao = 0;
        const LIMITE_REPETICAO = 2;
        let abaAtiva = 'pendente';
        let iniciado = false;

        audioAlerta.onended = function() {
            if (contadorRepeticao < LIMITE_REPETICAO - 1) {
                contadorRepeticao++;
                audioAlerta.play();
            }
        };

        // --- FUNÇÕES DE INICIALIZAÇÃO ---
        function ativarSom() {
            const senha = prompt("Digite a senha de acesso:");
            if (senha !== SENHA_ADMIN) {
                alert("Senha incorreta!");
                return;
            }

            document.getElementById('container-ativacao').style.display = 'none';
            iniciado = true;
            
            audioAlerta.play().then(() => {
                audioAlerta.pause();
                audioAlerta.currentTime = 0;
                carregarDados();
            }).catch(() => carregarDados());
        }

        function mudarAba(aba, btn) {
            abaAtiva = aba;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('area-relatorio').style.display = (aba === 'historico') ? 'block' : 'none';
            carregarDados();
        }

        // --- GESTÃO DE PEDIDOS ---
        function recusarPedido(id) {
            if (confirm("Deseja realmente RECUSAR este pedido? O cliente será avisado.")) {
                db.ref('pedidos/' + id).update({ status: 'Recusado' }).then(() => {
                    alert("Pedido recusado com sucesso.");
                    // Deixa 10 segundos para o cliente ver o status e depois remove
                    setTimeout(() => { db.ref('pedidos/' + id).remove(); }, 10000);
                });
            }
        }

        function concluirPedido(id) {
            db.ref('pedidos/' + id).once('value', s => {
                const dados = s.val();
                if(!dados) return;
                dados.concluidoEm = Date.now();
                dados.status = 'Finalizado';
                db.ref('relatorios').push(dados).then(() => db.ref('pedidos/' + id).remove());
            });
        }

        function carregarDados() {
            if (!iniciado) return;
            const path = (abaAtiva === 'historico') ? 'relatorios' : 'pedidos';

            db.ref(path).on('value', (snapshot) => {
                const container = document.getElementById('pedidos-container');
                container.innerHTML = "";
                let temPendente = false;
                const agora = Date.now();

                snapshot.forEach(child => {
                    const p = child.val();
                    const id = child.key;
                    const status = p.status || 'pendente';

                    if (abaAtiva !== 'historico' && status !== abaAtiva) return;
                    if (status === 'pendente') temPendente = true;

                    const li = document.createElement('li');
                    li.className = `pedido-card`;

                    let botoes = "";
                    if (abaAtiva === 'pendente') {
                        botoes = `
                            <button class="btn-success" onclick="db.ref('pedidos/${id}').update({status:'preparando'})">ACEITAR PEDIDO</button>
                            <button class="btn-recusar" onclick="recusarPedido('${id}')">RECUSAR PEDIDO</button>`;
                    } else if (abaAtiva === 'preparando') {
                        botoes = `
                            <button class="btn-warning" onclick="imprimirPedido('${id}', 'pedidos')">IMPRIMIR CUPOM</button>
                            <button class="btn-info" onclick="db.ref('pedidos/${id}').update({status:'entrega'})">SAIU PARA ENTREGA</button>`;
                    } else if (abaAtiva === 'entrega') {
                        botoes = `<button class="btn-success" onclick="concluirPedido('${id}')">CONCLUIR E FINALIZAR</button>`;
                    } else {
                        botoes = `<button class="btn-warning" style="width:100%" onclick="imprimirPedido('${id}', 'relatorios')">REIMPRIMIR CUPOM</button>`;
                    }

                    li.innerHTML = `
                        <div class="card-header">
                            <span class="cliente-nome">${p.cliente}</span>
                            <span class="hora">${p.horario || ''}</span>
                        </div>
                        <p class="info"><b>Contato:</b> ${p.contato || 'N/A'}</p>
                        <p class="info"><b>Endereço:</b> ${p.endereco}</p>
                        <div class="itens-box">
                            ${p.itens ? p.itens.map(i => `<b>${i.qtd}x</b> ${i.produto}`).join('<br>') : 'Sem itens'}
                        </div>
                        <div class="total-area">TOTAL: R$ ${parseFloat(p.total).toFixed(2)}</div>
                        <div class="btn-actions">${botoes}</div>
                    `;
                    container.appendChild(li);
                });

                // Alerta sonoro
                if (temPendente && abaAtiva === 'pendente') {
                    if (audioAlerta.paused && contadorRepeticao === 0) {
                        contadorRepeticao = 0;
                        audioAlerta.play().catch(e => console.log("Erro áudio:", e));
                    }
                } else {
                    audioAlerta.pause();
                    audioAlerta.currentTime = 0;
                    contadorRepeticao = 0;
                }
            });
        }

        // --- IMPRESSÃO E PDF ---
        function imprimirPedido(id, pasta) {
            db.ref(pasta + '/' + id).once('value', (snapshot) => {
                const p = snapshot.val();
                if(!p) return;
                const cupom = `
                    <html>
                    <body style="font-family:Arial; width:80mm; padding:5mm;">
                        <div style="text-align:center; border-bottom:1px solid #000; padding-bottom:5px;">
                            <b style="font-size:20px;">KINGS BURGER</b><br>CUPOM DE PEDIDO
                        </div>
                        <div style="padding:5px 0;">
                            <b>CLIENTE:</b> ${p.cliente}<br>
                            <b>HORA:</b> ${p.horario}<br>
                            <b>PGTO:</b> ${p.pagamento || 'Pix'}
                        </div>
                        <div style="border-top:1px dashed #000; padding:5px 0;">
                            ${p.itens ? p.itens.map(i => `${i.qtd}x ${i.produto}`).join('<br>') : ''}
                        </div>
                        <div style="border-top:1px dashed #000; padding:5px 0;">
                            <b>ENDEREÇO:</b> ${p.endereco}
                        </div>
                        <div style="text-align:center; font-size:22px; font-weight:bold; border:1px solid #000; padding:5px; margin-top:5px;">
                            TOTAL: R$ ${parseFloat(p.total).toFixed(2)}
                        </div>
                    </body>
                    </html>`;
                const frame = document.getElementById('iframe-impressao');
                const doc = frame.contentWindow.document;
                doc.open(); doc.write(cupom); doc.close();
                setTimeout(() => { frame.contentWindow.print(); }, 500);
            });
        }

        function gerarPDF() {
            const container = document.getElementById('pedidos-container').cloneNode(true);
            const win = window.open('', '', 'height=700,width=900');
            win.document.write('<html><head><title>Relatório</title></head><body>');
            win.document.write('<h1>Histórico de Vendas</h1>' + container.innerHTML);
            win.document.write('</body></html>');
            win.document.close();
            win.print();
        }
    </script>
</body>
</html>
