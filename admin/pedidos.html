<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Kings Burger - Gestão</title>
    <link rel="stylesheet" href="admin.css">
    <style>
        /* Estilos da Tela de Login */
        #tela-login {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .login-box {
            background: #111;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #f37021;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 0 20px rgba(243, 112, 33, 0.2);
        }
        .login-box h2 { color: #f37021; margin-bottom: 20px; font-family: sans-serif; }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #333;
            background: #222;
            color: white;
            box-sizing: border-box;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #f37021;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-box button:active { transform: scale(0.98); }
        #msg-erro { color: #ff4444; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>

<body>
    <div id="tela-login">
        <div class="login-box">
            <h2>KINGS <span>ADMIN</span></h2>
            <input type="text" id="user-id" placeholder="ID do Usuário">
            <input type="password" id="user-pass" placeholder="Senha de Acesso">
            <button onclick="validarAcesso()">ACESSAR PAINEL</button>
            <p id="msg-erro">Acesso negado. Verifique os dados.</p>
        </div>
    </div>

    <div id="container-ativacao" style="display: none;">
        <div style="text-align: center;">
            <h2 style="color: #ffcc00; margin-bottom: 20px;">KINGS BURGER</h2>
            <button onclick="ativarSom()">INICIAR PAINEL</button>
        </div>
    </div>

    <header class="admin-header">
        <h1>KINGS <span>BURGER</span></h1>
        <div style="display: flex; gap: 10px;">
            <button class="btn-refresh" onclick="location.reload()">🔄</button>
            <button class="btn-refresh" onclick="logout()" style="background: #444;">🚪</button>
        </div>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" onclick="mudarAba('pendente', this)">NOVOS</button>
        <button class="tab-btn" onclick="mudarAba('preparando', this)">COZINHA</button>
        <button class="tab-btn" onclick="mudarAba('entrega', this)">ENTREGA</button>
        <button class="tab-btn btn-hist" onclick="mudarAba('historico', this)">HISTÓRICO</button>
    </nav>

    <div id="area-relatorio" style="display:none; padding: 15px;">
        <button class="btn-pdf" onclick="gerarPDF()">GERAR PDF DO HISTÓRICO</button>
    </div>

    <ul id="pedidos-container"></ul>

    <iframe id="iframe-impressao" style="display:none;"></iframe>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        // --- CONFIGURAÇÃO DE ACESSO ---
        const CREDENCIAIS = {
            usuario: "kings##26burger",      // Mude seu usuário aqui
            senha: "35Op89Bk190"           // Mude sua senha aqui
        };

        const firebaseConfig = {
            apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
            authDomain: "myproject26-10f0e.firebaseapp.com",
            databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
            projectId: "myproject26-10f0e",
            storageBucket: "myproject26-10f0e.firebasestorage.app",
            messagingSenderId: "884850608032",
            appId: "1:884850608032:web:79db6983346c3c20edc6c5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const audioAlerta = new Audio('alert.mpeg');
        audioAlerta.loop = false;
        let contadorRepeticao = 0;
        const LIMITE_REPETICAO = 2;

        audioAlerta.onended = function() {
            if (contadorRepeticao < LIMITE_REPETICAO - 1) {
                contadorRepeticao++;
                audioAlerta.play();
            }
        };

        // --- FUNÇÕES DE SEGURANÇA ---
        function validarAcesso() {
            const user = document.getElementById('user-id').value;
            const pass = document.getElementById('user-pass').value;
            const erro = document.getElementById('msg-erro');

            if (user === CREDENCIAIS.usuario && pass === CREDENCIAIS.senha) {
                // Gera um "Token" simples de sessão
                const sessionToken = btoa(user + ":" + pass); 
                localStorage.setItem('kings_session', sessionToken);
                
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('container-ativacao').style.display = 'flex';
            } else {
                erro.style.display = 'block';
                setTimeout(() => erro.style.display = 'none', 3000);
            }
        }

        // Verifica se já está logado ao carregar a página
        window.onload = function() {
            const token = localStorage.getItem('kings_session');
            if (token === btoa(CREDENCIAIS.usuario + ":" + CREDENCIAIS.senha)) {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('container-ativacao').style.display = 'flex';
            }
        };

        function logout() {
            localStorage.removeItem('kings_session');
            location.reload();
        }

        // --- LÓGICA DO PAINEL ---
        let abaAtiva = 'pendente';
        let iniciado = false;

        function ativarSom() {
            document.getElementById('container-ativacao').style.display = 'none';
            iniciado = true;
            audioAlerta.play().then(() => {
                audioAlerta.pause();
                audioAlerta.currentTime = 0;
                carregarDados();
            }).catch(e => {
                carregarDados();
            });
        }

        function mudarAba(aba, btn) {
            abaAtiva = aba;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('area-relatorio').style.display = (aba === 'historico') ? 'block' : 'none';
            carregarDados();
        }

        function carregarDados() {
            if (!iniciado) return;
            const path = (abaAtiva === 'historico') ? 'relatorios_kings' : 'pedidos_kings';

            db.ref(path).on('value', (snapshot) => {
                const container = document.getElementById('pedidos-container');
                container.innerHTML = "";
                let temPendente = false;
                const agora = Date.now();
                const trintaDias = 30 * 24 * 60 * 60 * 1000;

                snapshot.forEach(child => {
                    const p = child.val();
                    const id = child.key;
                    const status = p.status || 'pendente';
                    const timestamp = p.concluidoEm || agora;

                    if (abaAtiva === 'historico') {
                        if (agora - timestamp > trintaDias) {
                            db.ref('relatorios_kings/' + id).remove();
                            return;
                        }
                    } else {
                        if (status === 'pendente') temPendente = true;
                        if (status !== abaAtiva) return;
                    }

                    const li = document.createElement('li');
                    li.className = `pedido-card`;

                    let botoes = "";
                    if (abaAtiva === 'pendente') {
                        botoes = `<button class="btn-success" onclick="db.ref('pedidos_kings/${id}').update({status:'preparando'})">ACEITAR PEDIDO</button>`;
                    } else if (abaAtiva === 'preparando') {
                        botoes = `
                            <button class="btn-warning" onclick="imprimirPedido('${id}', 'pedidos_kings')">IMPRIMIR CUPOM</button>
                            <button class="btn-info" onclick="db.ref('pedidos_kings/${id}').update({status:'entrega'})">SAIU PARA ENTREGA</button>`;
                    } else if (abaAtiva === 'entrega') {
                        botoes = `<button class="btn-success" onclick="concluirPedido('${id}')">CONCLUIR E FINALIZAR</button>`;
                    } else {
                        botoes = `<button class="btn-warning" style="width:100%" onclick="imprimirPedido('${id}', 'relatorios_kings')">REIMPRIMIR CUPOM</button>`;
                    }

                    li.innerHTML = `
                        <div class="card-header">
                            <span class="cliente-nome">${p.cliente}</span>
                            <span class="hora">${p.horario || ''}</span>
                        </div>
                        <p class="info"><b>Endereço:</b> ${p.endereco}</p>
                        <p class="info"><b>Total:</b> R$ ${parseFloat(p.total).toFixed(2)}</p>
                        <div class="itens-box">
                            ${p.itens ? p.itens.map(i => `<b>${i.qtd}x</b> ${i.produto}`).join('<br>') : 'Sem itens'}
                        </div>
                        <div class="btn-actions">${botoes}</div>
                    `;
                    container.appendChild(li);
                });

                if (temPendente && abaAtiva === 'pendente') {
                    if (audioAlerta.paused && contadorRepeticao === 0) {
                        contadorRepeticao = 0; 
                        audioAlerta.play().catch(e => console.log("Aguardando interação."));
                    }
                } else {
                    audioAlerta.pause();
                    audioAlerta.currentTime = 0;
                    contadorRepeticao = 0; 
                }
            });
        }

        function concluirPedido(id) {
            db.ref('pedidos_kings/' + id).once('value', s => {
                const dados = s.val();
                if(!dados) return;
                dados.concluidoEm = Date.now();
                dados.status = 'concluido';
                db.ref('relatorios_kings').push(dados).then(() => db.ref('pedidos_kings/' + id).remove());
            });
        }

        function imprimirPedido(id, pasta) {
            db.ref(pasta + '/' + id).once('value', (snapshot) => {
                const p = snapshot.val();
                if(!p) return;
                const cupom = `
                    <html>
                    <body style="font-family:Arial,sans-serif; width:80mm; padding:0; margin:0; color:#000;">
                        <div style="text-align:center; border-bottom:2px solid #000; padding:10px 0;">
                            <b style="font-size:24px;">KINGS BURGER</b><br>
                            <span style="font-size:18px;">CUPOM DE ENTREGA</span>
                        </div>
                        <div style="padding:10px 0; font-size:18px; border-bottom:1px dashed #000;">
                            <b>CLIENTE:</b> ${p.cliente.toUpperCase()}<br>
                            <b>PGTO:</b> ${p.pagamento || 'Pix'}
                        </div>
                        <div style="padding:10px 0; font-size:20px; font-weight:bold;">
                            ${p.itens ? p.itens.map(i => `${i.qtd}x ${i.produto}`).join('<br>') : ''}
                        </div>
                        <div style="padding:10px 0; font-size:19px; border-top:1px dashed #000;">
                            <b>ENDEREÇO:</b><br>${p.endereco}
                        </div>
                        <div style="text-align:center; font-size:28px; font-weight:bold; margin-top:10px; border:3px solid #000; padding:5px;">
                            TOTAL: R$ ${parseFloat(p.total).toFixed(2)}
                        </div>
                    </body>
                    </html>
                `;
                const frame = document.getElementById('iframe-impressao');
                const doc = frame.contentWindow.document;
                doc.open(); doc.write(cupom); doc.close();
                setTimeout(() => { frame.contentWindow.print(); }, 500);
            });
        }

        function gerarPDF() {
            let conteudoTabela = `<table style="width:100%; border-collapse: collapse; margin-top: 20px; font-family: Arial, sans-serif;">
                <thead><tr style="background-color: #f2f2f2; text-align: left;">
                    <th style="border: 1px solid #ddd; padding: 12px;">Hora</th>
                    <th style="border: 1px solid #ddd; padding: 12px;">Cliente</th>
                    <th style="border: 1px solid #ddd; padding: 12px;">Itens</th>
                    <th style="border: 1px solid #ddd; padding: 12px;">Total (R$)</th>
                </tr></thead><tbody>`;

            const cards = document.querySelectorAll('.pedido-card');
            cards.forEach(card => {
                const nome = card.querySelector('.cliente-nome').innerText;
                const hora = card.querySelector('.hora').innerText;
                const itens = card.querySelector('.itens-box').innerText.replace(/\n/g, ', ');
                const total = card.querySelector('.info:nth-of-type(2)').innerText.replace('Total: R$ ', '');

                conteudoTabela += `<tr>
                    <td style="border: 1px solid #ddd; padding: 10px;">${hora}</td>
                    <td style="border: 1px solid #ddd; padding: 10px;"><b>${nome}</b></td>
                    <td style="border: 1px solid #ddd; padding: 10px; font-size: 12px;">${itens}</td>
                    <td style="border: 1px solid #ddd; padding: 10px;">${total}</td>
                </tr>`;
            });
            conteudoTabela += `</tbody></table>`;

            const win = window.open('', '', 'height=700,width=900');
            win.document.write('<html><head><title>Relatório Kings Burger</title></head><body>');
            win.document.write('<h1 style="text-align:center;">Relatório de Pedidos - Kings Burger</h1>');
            win.document.write(conteudoTabela);
            win.document.write('</body></html>');
            win.document.close();
            setTimeout(() => { win.print(); }, 500);
        }
    </script>
</body>
</html>
