<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Kings Burger - Gestao Pro</title>
    <link rel="stylesheet" href="admin.css">
</head>

<body>
    <div id="tela-login">
        <div class="login-box">
            <h2>KINGS <span>ADMIN</span></h2>
            <input type="text" id="user-id" placeholder="Usuario">
            <input type="password" id="user-pass" placeholder="Senha">
            <button onclick="validarAcesso()">ACESSAR</button>
        </div>
    </div>

    <div id="container-ativacao" style="display: none; justify-content: center; align-items: center; height: 100vh; background: rgba(0,0,0,0.9); position: fixed; width: 100%; z-index: 9999;">
        <button onclick="ativarSom()" style="padding: 20px 50px; background: #f37021; color: white; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer;">INICIAR PAINEL</button>
    </div>

    <header class="admin-header">
        <h1>KINGS <span>BURGER</span></h1>
        <div style="display: flex; gap: 10px;">
            <button class="btn-refresh" onclick="abrirEditor()" style="background: #f37021;">EDITAR SITE</button>
            <button class="btn-refresh" onclick="logout()" style="background: #cc0000;">SAIR</button>
        </div>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" onclick="mudarAba('pendente', this)">NOVOS</button>
        <button class="tab-btn" onclick="mudarAba('preparando', this)">COZINHA</button>
        <button class="tab-btn" onclick="mudarAba('entrega', this)">ENTREGA</button>
        <button class="tab-btn btn-hist" onclick="mudarAba('historico', this)">HISTORICO</button>
    </nav>

    <ul id="pedidos-container" style="padding: 10px;"></ul>

    <div id="modal-editor">
        <div class="editor-content">
            <div class="editor-header">
                <h2>CONFIGURAÇÕES DO SITE</h2>
                <button class="btn-fechar-modal" onclick="fecharEditor()">X</button>
            </div>
            <div id="editor-abas-categorias" class="editor-tabs"></div>
            <div id="editor-itens-container"></div>
            <button onclick="salvarConfiguracoes()" style="width: 100%; background: var(--success); margin-top: 20px;">SALVAR ALTERAÇÕES</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        const CREDENCIAIS = { usuario: "kings26burger", senha: "kings2026@" };
        const firebaseConfig = {
            apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
            databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
            projectId: "myproject26-10f0e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let abaAtiva = 'pendente';
        let iniciado = false;

        function validarAcesso() {
            const user = document.getElementById('user-id').value;
            const pass = document.getElementById('user-pass').value;
            if (user === CREDENCIAIS.usuario && pass === CREDENCIAIS.senha) {
                localStorage.setItem('kings_session', btoa(user + ":" + pass));
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('container-ativacao').style.display = 'flex';
            } else { alert("Acesso negado"); }
        }

        window.onload = () => {
            if (localStorage.getItem('kings_session') === btoa(CREDENCIAIS.usuario + ":" + CREDENCIAIS.senha)) {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('container-ativacao').style.display = 'flex';
            }
        };

        function logout() { localStorage.removeItem('kings_session'); location.reload(); }

        function ativarSom() {
            document.getElementById('container-ativacao').style.display = 'none';
            iniciado = true;
            carregarDados();
        }

        function carregarDados() {
            if (!iniciado) return;
            const path = (abaAtiva === 'historico') ? 'relatorios_kings' : 'pedidos_kings';
            
            db.ref(path).on('value', (snapshot) => {
                const container = document.getElementById('pedidos-container');
                container.innerHTML = "";
                
                snapshot.forEach(child => {
                    const p = child.val();
                    if (abaAtiva !== 'historico' && p.status !== abaAtiva) return;

                    const li = document.createElement('li');
                    li.className = `pedido-card`;
                    
                    let acaoHtml = "";
                    if (abaAtiva === 'pendente') {
                        acaoHtml = `
                        <div style="display: flex; gap: 10px;">
                            <button class="btn-success" style="flex: 3; padding:12px;" onclick="db.ref('pedidos_kings/${child.key}').update({status:'preparando'})">ACEITAR</button>
                            <button class="btn-recusar-acao" style="flex: 1; padding:12px;" onclick="recusarPedido('${child.key}')">RECUSAR</button>
                        </div>`;
                    }
                    else if (abaAtiva === 'preparando') acaoHtml = `<button class="btn-info" style="width:100%; padding:12px;" onclick="db.ref('pedidos_kings/${child.key}').update({status:'entrega'})">SAIU PARA ENTREGA</button>`;
                    else if (abaAtiva === 'entrega') acaoHtml = `<button class="btn-success" style="width:100%; padding:12px;" onclick="concluirPedido('${child.key}')">FINALIZAR</button>`;

                    li.innerHTML = `
                        <div class="cliente-header"><span style="color: #f37021; font-weight: bold;">${(p.nomeCliente || 'S/N').toUpperCase()}</span></div>
                        <div class="info-entrega">
                            <p><b>END:</b> ${p.rua || ''}, ${p.numero || ''} - ${p.bairro || ''}</p>
                            <p><b>PAG:</b> ${p.pagamento || ''} | <b>WHATS:</b> ${p.whatsappCliente || ''}</p>
                            <p><b>OBS:</b> ${p.obsPedido || 'Nenhuma'}</p>
                        </div>
                        <div class="itens-box">${p.itens ? p.itens.map(i => `<div><b>${i.qtd}x</b> ${i.produto}</div>`).join('') : ''}</div>
                        <div style="text-align: right;"><span style="font-size:18px; color: #f37021; font-weight: bold;">TOTAL: R$ ${parseFloat(p.total).toFixed(2)}</span></div>
                        <div style="margin-top:15px;">${acaoHtml}</div>`;
                    
                    container.appendChild(li);
                });
            });
        }

        function recusarPedido(id) {
            if (confirm("Deseja realmente apagar este pedido?")) {
                db.ref('pedidos_kings/' + id).remove();
            }
        }

        function mudarAba(aba, btn) {
            abaAtiva = aba;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            carregarDados();
        }

        function concluirPedido(id) {
            db.ref('pedidos_kings/' + id).once('value', s => {
                const dados = s.val(); dados.status = 'concluido';
                db.ref('relatorios_kings').push(dados).then(() => db.ref('pedidos_kings/' + id).remove());
            });
        }

        // LÓGICA DO EDITOR DE SITE
        function abrirEditor() { document.getElementById('modal-editor').style.display = 'block'; carregarConfigSite(); }
        function fecharEditor() { document.getElementById('modal-editor').style.display = 'none'; }

        function carregarConfigSite() {
            db.ref('configuracoes_site').once('value', snapshot => {
                const config = snapshot.val();
                // Aqui você renderiza os inputs para editar preços/produtos
                // Vou deixar o container pronto para você preencher conforme seu banco
                document.getElementById('editor-itens-container').innerHTML = "<p style='color:white; text-align:center;'>Carregando dados do cardápio...</p>";
            });
        }
    </script>
</body>
</html>
