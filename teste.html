<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin Cloud - Kings Burger</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
        body { background: #111; color: white; padding: 20px; font-family: sans-serif; }
        .card-prod { background: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        .card-prod img { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; background: #333; }
        .form-control { background: #2b2b2b; border: 1px solid #444; color: white; }
        .form-control:focus { background: #333; color: white; border-color: #ffc107; box-shadow: none; }
        label { font-size: 0.8rem; color: #888; margin-bottom: 2px; }
        .header-painel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .btn-warning { font-weight: bold; }
        .scale-150 { transform: scale(1.5); margin-right: 10px; }

        /* --- ESTILOS DO LOGIN E FACE ID --- */
        #lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
            transition: 0.5s;
        }
        .login-box {
            background: #1e1e1e; padding: 30px; border-radius: 20px; border: 1px solid #ffc107;
            text-align: center; width: 90%; max-width: 400px; box-shadow: 0 0 30px rgba(255, 193, 7, 0.1);
        }

        #face-area { display: none; margin-top: 20px; position: relative; }
        
        /* O Círculo do Face ID */
        .camera-circle {
            width: 250px; height: 250px;
            margin: 0 auto;
            border-radius: 50%;
            border: 3px solid #333;
            position: relative;
            overflow: hidden;
            background: #000;
        }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* Animação de Scan */
        .scanner-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(to bottom, transparent, #ffc107);
            box-shadow: 0 0 15px #ffc107;
            animation: scan 2s linear infinite;
            display: none;
        }
        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        /* Aro de progresso */
        .loading-ring {
            position: absolute;
            top: -5px; left: -5px; width: 260px; height: 260px;
            border: 5px solid transparent;
            border-top-color: #ffc107;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .status-msg { font-size: 0.9rem; margin-top: 15px; min-height: 24px; font-weight: bold; }
        .text-near { color: #ffc107; }
        .text-success { color: #28a745 !important; }

        /* --- RESTANTE DOS SEUS ESTILOS --- */
        .dias-semana { display: flex; gap: 5px; justify-content: space-between; margin: 10px 0; flex-wrap: wrap; }
        .dia-btn { 
            flex: 1; min-width: 35px; height: 35px; border-radius: 5px; border: 1px solid #444;
            background: #2b2b2b; color: #888; display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .dia-btn.active { background: #ffc107; color: #000; border-color: #ffc107; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="login-box">
            <h3 class="text-warning mb-2">Kings Burger</h3>
            <p id="main-label" class="text-muted small">Acesso Restrito ao Administrador</p>
            
            <div id="pass-area">
                <input type="password" id="admin-pass" class="form-control mb-3 text-center" placeholder="Senha de Acesso">
                <button class="btn btn-warning w-100" onclick="verificarSenha()">Entrar</button>
            </div>

            <div id="face-area">
                <div class="camera-circle">
                    <video id="video" autoplay muted></video>
                    <div class="scanner-line" id="scan-line"></div>
                    <div class="loading-ring" id="ring"></div>
                </div>
                <div id="face-status" class="status-msg text-secondary">Iniciando câmera...</div>
            </div>
            
            <div id="setup-msg" class="mt-3 small text-muted">Carregando IA...</div>
        </div>
    </div>

<div class="container">
    <div class="header-painel">
        <h2>Painel Admin <span class="text-warning">Kings Burger</span></h2>
        </div>
    <div id="listaProdutos">
        <p class="text-center text-muted">Carregando cardápio...</p>
    </div>
</div>

<script>
    // --- SEU FIREBASE (MANTIDO) ---
    const firebaseConfig = {
        apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
        authDomain: "myproject26-10f0e.firebaseapp.com",
        databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
        projectId: "myproject26-10f0e",
        storageBucket: "myproject26-10f0e.firebasestorage.app",
        messagingSenderId: "884850608032",
        appId: "1:884850608032:web:79db6983346c3c20edc6c5"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- LÓGICA FACE ID ---
    const video = document.getElementById('video');
    const faceStatus = document.getElementById('face-status');
    const scanLine = document.getElementById('scan-line');
    const ring = document.getElementById('ring');
    let faceMatcher = null;

    // 1. Carregar Modelos e Fotos da Galeria
    async function initFaceID() {
        const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
        
        try {
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            
            // Coloque o nome das fotos que estão na sua pasta /imagens
            const users = ['Programador', 'Admin']; 
            const descriptors = await Promise.all(users.map(async user => {
                const img = await faceapi.fetchImage(`imagens/${user}.jpeg`);
                const fullDesc = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                return new faceapi.LabeledFaceDescriptors(user, [fullDesc.descriptor]);
            }));

            faceMatcher = new faceapi.FaceMatcher(descriptors, 0.6);
            document.getElementById('setup-msg').innerText = "Biometria Pronta ✅";
        } catch (e) {
            document.getElementById('setup-msg').innerText = "Erro ao carregar fotos da pasta.";
            console.error(e);
        }
    }

    // 2. Iniciar Câmera
    function startCamera() {
        navigator.mediaDevices.getUserMedia({ video: {} })
            .then(stream => { video.srcObject = stream; startDetection(); })
            .catch(err => faceStatus.innerText = "Erro ao acessar câmera");
    }

    // 3. Detecção e Feedback (Perto/Longe)
    async function startDetection() {
    // 1. O intervalo menor (400ms) deixa a captura mais fluida
    const interval = setInterval(async () => {
        const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                                       .withFaceLandmarks()
                                       .withFaceDescriptor();

        if (detection) {
            const { width } = detection.box;
            
            // Ativa os elementos visuais de "escaner"
            scanLine.style.display = "block";
            ring.style.display = "block";
            ring.style.borderTopColor = "#ffc107"; // Cor padrão: Amarelo

            // 2. Guia o usuário pela distância
            if (width < 130) {
                faceStatus.innerText = "➜ Aproxime seu rosto";
                faceStatus.className = "status-msg text-near";
            } 
            else if (width > 220) {
                faceStatus.innerText = "⬅ Afaste-se um pouco";
                faceStatus.className = "status-msg text-near";
            } 
            else {
                // 3. POSIÇÃO IDEAL: Faz a comparação com a foto .jpeg
                faceStatus.innerText = "Validando Identidade...";
                faceStatus.className = "status-msg text-warning";

                const match = faceMatcher.findBestMatch(detection.descriptor);
                
                if (match.label !== 'unknown') {
                    // SUCESSO: O rosto bateu com Programador.jpeg ou Admin.jpeg
                    faceStatus.innerText = "✓ " + match.label + " Identificado!";
                    faceStatus.className = "status-msg text-success";
                    
                    // Feedback Visual de Sucesso
                    ring.style.borderTopColor = "#28a745"; // Círculo fica Verde
                    scanLine.style.background = "#28a745";
                    
                    clearInterval(interval); // Para o scanner
                    
                    // Aguarda 1.2s para o usuário ver a confirmação e libera
                    setTimeout(() => {
                        liberarAcesso();
                    }, 1200);
                } else {
                    // ROSTO DESCONHECIDO
                    faceStatus.innerText = "Usuário não autorizado";
                    faceStatus.className = "text-danger";
                    ring.style.borderTopColor = "#dc3545"; // Círculo fica Vermelho
                }
            }
        } else {
            // NINGUÉM NA CÂMERA
            faceStatus.innerText = "Posicione o rosto no círculo";
            faceStatus.className = "text-secondary";
            scanLine.style.display = "none";
            ring.style.display = "none";
        }
    }, 400); 
}
    function liberarAcesso() {
        document.getElementById("lock-screen").style.opacity = "0";
        setTimeout(() => {
            document.getElementById("lock-screen").style.display = "none";
            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
        }, 500);
        carregarProdutos();
    }

    // --- FUNÇÃO DE SENHA (MODIFICADA) ---
    const SENHA_MESTRA = "Kings@20BR26burger"; 
    function verificarSenha() {
        if (document.getElementById("admin-pass").value === SENHA_MESTRA) {
            document.getElementById("pass-area").style.display = "none";
            document.getElementById("face-area").style.display = "block";
            document.getElementById("main-label").innerText = "Validação Biométrica";
            startCamera();
        } else {
            alert("Senha Incorreta!");
        }
    }

    // Inicializar IA ao carregar
    document.addEventListener("DOMContentLoaded", initFaceID);

    // --- RESTANTE DAS SUAS FUNÇÕES (EDITAR, EXCLUIR, CUPONS...) ---
    // (Mantenha o resto do seu código original aqui exatamente como estava)
    function carregarProdutos() {
        db.ref('cardapio/produtos').on('value', (snapshot) => {
            const data = snapshot.val();
            produtos = data ? (Array.isArray(data) ? data : Object.values(data)) : [];
            renderizar();
        });
    }
    // ... adicione aqui o restante das funções que você já tinha ...
</script>
</body>
</html>
