<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Kings Burger</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
        body { background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        
        .login-box {
            background: #1a1a1a; padding: 40px 30px; border-radius: 25px; border: 1px solid #ffc107;
            text-align: center; width: 90%; max-width: 400px; box-shadow: 0 0 40px rgba(255, 193, 7, 0.15);
        }

        /* Container da Câmera Circular */
        #face-area { display: none; margin-top: 20px; position: relative; }
        .camera-circle {
            width: 260px; height: 260px; margin: 0 auto; border-radius: 50%;
            border: 4px solid #333; position: relative; overflow: hidden; background: #000;
        }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* Scanner e Loop */
        .scanner-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(to bottom, transparent, #ffc107);
            box-shadow: 0 0 15px #ffc107; animation: scan 2s linear infinite; display: none;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .loading-ring {
            position: absolute; top: -5px; left: -5px; width: 270px; height: 270px;
            border: 5px solid transparent; border-top-color: #ffc107; border-radius: 50%;
            animation: spin 1s linear infinite; display: none;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .status-msg { font-size: 0.95rem; margin-top: 20px; font-weight: bold; min-height: 24px; }
        .btn-ready { margin-top: 20px; display: none; border-radius: 50px; padding: 10px 30px; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="login-box">
            <h2 class="text-warning mb-1">Kings Burger</h2>
            <p id="label-top" class="text-muted small mb-4">Acesso Restrito</p>
            
            <div id="pass-area">
                <input type="password" id="admin-pass" class="form-control mb-3 text-center bg-dark text-white border-secondary" placeholder="Senha de Acesso">
                <button class="btn btn-warning w-100 fw-bold" onclick="verificarSenha()">Próximo</button>
            </div>

            <div id="face-area">
                <div class="camera-circle">
                    <video id="video" autoplay muted playsinline></video>
                    <div class="scanner-line" id="scan-line"></div>
                    <div class="loading-ring" id="ring"></div>
                </div>
                <div id="face-status" class="status-msg text-secondary">Ajuste seu rosto no círculo</div>
                <button id="btn-capture" class="btn btn-outline-warning btn-ready" onclick="iniciarCaptura()">Estou Pronto</button>
            </div>
            
            <div id="setup-msg" class="mt-4 small text-muted">Carregando sistemas...</div>
        </div>
    </div>

<script>
    const video = document.getElementById('video');
    const faceStatus = document.getElementById('face-status');
    const scanLine = document.getElementById('scan-line');
    const ring = document.getElementById('ring');
    const btnCapture = document.getElementById('btn-capture');
    let faceMatcher = null;

    // 1. Inicializa a IA e busca as fotos .jpeg
    async function initFaceID() {
        const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
        try {
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            
            // Nomes exatos das suas fotos na pasta imagens/
            const users = ['Programador', 'Admin']; 
            const descriptors = await Promise.all(users.map(async user => {
                const img = await faceapi.fetchImage(`imagens/${user}.jpeg`);
                const fullDesc = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                return new faceapi.LabeledFaceDescriptors(user, [fullDesc.descriptor]);
            }));

            faceMatcher = new faceapi.FaceMatcher(descriptors.filter(d => d), 0.6);
            document.getElementById('setup-msg').innerText = "Sistemas Prontos ✅";
        } catch (e) {
            document.getElementById('setup-msg').innerText = "Erro ao carregar biometria.";
        }
    }

    // 2. Verifica a Senha Mestra
    function verificarSenha() {
        const pass = document.getElementById("admin-pass").value;
        if (pass === "Kings@20BR26burger") {
            document.getElementById("pass-area").style.display = "none";
            document.getElementById("face-area").style.display = "block";
            document.getElementById("label-top").innerText = "Validação Facial";
            startCamera();
        } else {
            alert("Senha Incorreta!");
        }
    }

    // 3. Abre a câmera e mostra o botão "Estou Pronto"
    function startCamera() {
        navigator.mediaDevices.getUserMedia({ video: {} })
            .then(stream => { 
                video.srcObject = stream; 
                btnCapture.style.display = "inline-block"; // Só mostra o botão quando a câmera ligar
            })
            .catch(() => faceStatus.innerText = "Erro: Ative a câmera");
    }

    // 4. Ação do Botão: Capturar e Analisar
    async function iniciarCaptura() {
        btnCapture.style.display = "none"; // Esconde o botão durante o scan
        ring.style.display = "block";      // Liga o círculo giratório
        scanLine.style.display = "block";  // Liga a linha de scan
        faceStatus.innerText = "Capturando Imagem...";
        faceStatus.className = "status-msg text-warning";

        // Tenta detectar por 3 segundos até achar um rosto estável
        let attempts = 0;
        const scanInterval = setInterval(async () => {
            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                                           .withFaceLandmarks()
                                           .withFaceDescriptor();

            if (detection) {
                const match = faceMatcher.findBestMatch(detection.descriptor);
                
                if (match.label !== 'unknown') {
                    // SUCESSO - BATEU COM A FOTO JPEG
                    clearInterval(scanInterval);
                    sucessoFinal(match.label);
                } else {
                    // ROSTO ERRADO
                    faceStatus.innerText = "Acesso Negado: Rosto não autorizado";
                    faceStatus.className = "status-msg text-danger";
                    ring.style.borderTopColor = "#dc3545"; // Vermelho
                    setTimeout(() => resetarInterface(), 2000);
                    clearInterval(scanInterval);
                }
            }
            
            attempts++;
            if (attempts > 15) { // Se passar muito tempo sem detectar nada
                faceStatus.innerText = "Rosto não detectado. Tente novamente.";
                resetarInterface();
                clearInterval(scanInterval);
            }
        }, 500);
    }

    function sucessoFinal(nome) {
        faceStatus.innerText = "✓ Bem-vindo, " + nome + "!";
        faceStatus.className = "status-msg text-success";
        ring.style.borderTopColor = "#28a745"; // Verde
        scanLine.style.display = "none";
        
        setTimeout(() => {
            // Aqui você redireciona para o seu painel ou libera o conteúdo
            document.getElementById("lock-screen").style.opacity = "0";
            setTimeout(() => {
                document.getElementById("lock-screen").style.display = "none";
                video.srcObject.getTracks().forEach(t => t.stop()); // Desliga câmera
            }, 500);
        }, 1500);
    }

    function resetarInterface() {
        ring.style.display = "none";
        scanLine.style.display = "none";
        ring.style.borderTopColor = "#ffc107";
        btnCapture.style.display = "inline-block";
    }

    document.addEventListener("DOMContentLoaded", initFaceID);
</script>

</body>
</html>
