<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin Cloud - Kings Burger</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
        body { background: #111; color: white; padding: 20px; font-family: sans-serif; }
        .card-prod { background: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        .card-prod img { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; background: #333; }
        .form-control { background: #2b2b2b; border: 1px solid #444; color: white; }
        .form-control:focus { background: #333; color: white; border-color: #ffc107; box-shadow: none; }
        label { font-size: 0.8rem; color: #888; margin-bottom: 2px; }
        .header-painel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .btn-warning { font-weight: bold; }

        /* --- ESTILOS DO LOGIN E FACE ID --- */
        #lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
            transition: 0.5s;
        }
        .login-box {
            background: #1e1e1e; padding: 30px; border-radius: 20px; border: 1px solid #ffc107;
            text-align: center; width: 90%; max-width: 400px; box-shadow: 0 0 30px rgba(255, 193, 7, 0.1);
        }

        #face-area { display: none; margin-top: 20px; position: relative; }
        
        .camera-circle {
            width: 250px; height: 250px;
            margin: 0 auto;
            border-radius: 50%;
            border: 3px solid #333;
            position: relative;
            overflow: hidden;
            background: #000;
        }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .scanner-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(to bottom, transparent, #ffc107);
            box-shadow: 0 0 15px #ffc107;
            animation: scan 2s linear infinite;
            display: none;
        }
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        .loading-ring {
            position: absolute;
            top: -5px; left: -5px; width: 260px; height: 260px;
            border: 5px solid transparent;
            border-top-color: #ffc107;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
            z-index: 10;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .status-msg { font-size: 0.9rem; margin-top: 15px; min-height: 24px; font-weight: bold; }
        .text-near { color: #ffc107; }
        .text-danger { color: #ff4d4d !important; }
        .text-success { color: #28a745 !important; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="login-box">
            <h3 class="text-warning mb-2">Kings Burger</h3>
            <p id="main-label" class="text-muted small">Acesso Restrito ao Administrador</p>
            
            <div id="pass-area">
                <input type="password" id="admin-pass" class="form-control mb-3 text-center" placeholder="Senha de Acesso">
                <button class="btn btn-warning w-100" onclick="verificarSenha()">Entrar</button>
            </div>

            <div id="face-area">
                <div class="camera-circle">
                    <video id="video" autoplay muted playsinline></video>
                    <div class="scanner-line" id="scan-line"></div>
                    <div class="loading-ring" id="ring"></div>
                </div>
                <div id="face-status" class="status-msg text-secondary">Aguardando rosto...</div>
            </div>
            
            <div id="setup-msg" class="mt-3 small text-muted">Carregando IA...</div>
        </div>
    </div>

<div class="container">
    <div class="header-painel">
        <h2>Painel Admin <span class="text-warning">Kings Burger</span></h2>
    </div>
    <div id="listaProdutos">
        <p class="text-center text-muted">Aguardando autenticação...</p>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
        authDomain: "myproject26-10f0e.firebaseapp.com",
        databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
        projectId: "myproject26-10f0e",
        storageBucket: "myproject26-10f0e.firebasestorage.app",
        messagingSenderId: "884850608032",
        appId: "1:884850608032:web:79db6983346c3c20edc6c5"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- VARIÁVEIS FACE ID ---
    const video = document.getElementById('video');
    const faceStatus = document.getElementById('face-status');
    const scanLine = document.getElementById('scan-line');
    const ring = document.getElementById('ring');
    let faceMatcher = null;

    // 1. Inicializar Modelos e Carregar as Fotos de Referência
    async function initFaceID() {
        const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
        
        try {
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            
            // Busca Programador.jpeg e Admin.jpeg na pasta imagens
            const users = ['Programador', 'Admin']; 
            const descriptors = await Promise.all(users.map(async user => {
                try {
                    const img = await faceapi.fetchImage(`imagens/${user}.jpeg`);
                    const fullDesc = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                    return new faceapi.LabeledFaceDescriptors(user, [fullDesc.descriptor]);
                } catch (err) {
                    console.error("Erro ao carregar foto de:", user);
                    return null;
                }
            }));

            // Filtra nulos e cria o comparador (precisão de 60%)
            faceMatcher = new faceapi.FaceMatcher(descriptors.filter(d => d), 0.6);
            document.getElementById('setup-msg').innerText = "Biometria Pronta ✅";
        } catch (e) {
            document.getElementById('setup-msg').innerText = "Erro ao carregar modelos de IA.";
            console.error(e);
        }
    }

    // 2. Ligar Câmera
    function startCamera() {
        navigator.mediaDevices.getUserMedia({ video: {} })
            .then(stream => { 
                video.srcObject = stream; 
                startDetection(); 
            })
            .catch(err => faceStatus.innerText = "Erro ao acessar câmera. Verifique o HTTPS.");
    }

    // 3. Loop de Detecção e Bloqueio
    async function startDetection() {
        const interval = setInterval(async () => {
            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                                           .withFaceLandmarks()
                                           .withFaceDescriptor();

            if (detection) {
                const { width } = detection.box;
                scanLine.style.display = "block";
                ring.style.display = "block";
                ring.style.borderTopColor = "#ffc107"; // Amarelo (Processando)

                if (width < 130) {
                    faceStatus.innerText = "➜ Aproxime seu rosto";
                    faceStatus.className = "status-msg text-near";
                } else if (width > 220) {
                    faceStatus.innerText = "⬅ Afaste-se um pouco";
                    faceStatus.className = "status-msg text-near";
                } else {
                    faceStatus.innerText = "Analisando Identidade...";
                    faceStatus.className = "status-msg text-warning";

                    const match = faceMatcher.findBestMatch(detection.descriptor);
                    
                    // Bloqueio: Se for 'unknown', ele não entra
                    if (match.label !== 'unknown') {
                        faceStatus.innerText = "✓ Acesso Liberado: " + match.label;
                        faceStatus.className = "status-msg text-success";
                        ring.style.borderTopColor = "#28a745"; // Verde (Sucesso)
                        
                        clearInterval(interval);
                        setTimeout(liberarAcesso, 1200);
                    } else {
                        faceStatus.innerText = "Usuário não reconhecido!";
                        faceStatus.className = "status-msg text-danger";
                        ring.style.borderTopColor = "#dc3545"; // Vermelho (Erro)
                    }
                }
            } else {
                faceStatus.innerText = "Posicione o rosto no círculo";
                faceStatus.className = "status-msg text-secondary";
                scanLine.style.display = "none";
                ring.style.display = "none";
            }
        }, 400); // Rápido o suficiente para não parecer 'estranho'
    }

    function liberarAcesso() {
        document.getElementById("lock-screen").style.opacity = "0";
        setTimeout(() => {
            document.getElementById("lock-screen").style.display = "none";
            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
        }, 500);
        carregarProdutos(); // Carrega o painel original
    }

    // 4. Validação de Senha para abrir a Câmera
    const SENHA_MESTRA = "Kings@20BR26burger"; 
    function verificarSenha() {
        if (document.getElementById("admin-pass").value === SENHA_MESTRA) {
            document.getElementById("pass-area").style.display = "none";
            document.getElementById("face-area").style.display = "block";
            document.getElementById("main-label").innerText = "Validação Biométrica";
            startCamera();
        } else {
            alert("Senha Incorreta!");
        }
    }

    // Inicia a IA
    document.addEventListener("DOMContentLoaded", initFaceID);

    // FUNÇÃO ORIGINAL DE CARREGAMENTO (Firebase)
    function carregarProdutos() {
        db.ref('cardapio/produtos').on('value', (snapshot) => {
            const data = snapshot.val();
            const lista = document.getElementById("listaProdutos");
            lista.innerHTML = "";
            
            if (!data) {
                lista.innerHTML = "<p class='text-center'>Nenhum produto cadastrado.</p>";
                return;
            }

            const produtosArray = Array.isArray(data) ? data : Object.values(data);
            produtosArray.forEach(p => {
                lista.innerHTML += `
                    <div class="card-prod d-flex align-items-center gap-3">
                        <img src="${p.imagem}" alt="${p.nome}">
                        <div>
                            <h5 class="mb-1">${p.nome}</h5>
                            <p class="text-warning mb-0">R$ ${p.preco}</p>
                        </div>
                    </div>
                `;
            });
        });
    }
</script>
</body>
</html>
