<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin Cloud - Kings Burger</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body { background: #111; color: white; padding: 20px; font-family: sans-serif; }
        .card-prod { background: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        .card-prod img { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; background: #333; }
        .form-control { background: #2b2b2b; border: 1px solid #444; color: white; }
        .form-control:focus { background: #333; color: white; border-color: #ffc107; box-shadow: none; }
        label { font-size: 0.8rem; color: #888; margin-bottom: 2px; }
        .header-painel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .btn-warning { font-weight: bold; }
        .scale-150 { transform: scale(1.5); margin-right: 10px; }

        /* Estilo para os Dias da Semana */
        .dias-semana { display: flex; gap: 5px; justify-content: space-between; margin: 10px 0; flex-wrap: wrap; }
        .dia-btn { 
            flex: 1; min-width: 35px; height: 35px; border-radius: 5px; border: 1px solid #444;
            background: #2b2b2b; color: #888; display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .dia-btn.active { background: #ffc107; color: #000; border-color: #ffc107; }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .header-painel h2 { font-size: 1.5rem; width: 100%; text-align: center; }
            .header-painel .text-end { width: 100%; text-align: center !important; display: flex; flex-direction: column; gap: 10px; }
            .header-painel .btn { margin: 0 !important; width: 100%; }
            .card-prod img { width: 80px; height: 80px; margin-bottom: 10px; }
            .col-md-1, .col-md-2, .col-md-3 { margin-bottom: 10px; }
            .scale-150 { transform: scale(1.2); }
            .card-prod { padding: 15px; }
        }

        #lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        .login-box {
            background: #1e1e1e; padding: 30px; border-radius: 15px; border: 1px solid #ffc107;
            text-align: center; width: 90%; max-width: 400px;
        }
    </style>
</head>
<body>
    <div id="lock-screen">
        <div class="login-box">
            <h3 class="text-warning mb-3">Acesso Restrito</h3>
            <p class="text-muted small">Painel Kings Burger</p>
            <input type="password" id="admin-pass" class="form-control mb-3 text-center" placeholder="Senha de Acesso">
            <button class="btn btn-warning w-100" onclick="verificarSenha()">Entrar</button>
        </div>
    </div>

<div class="container">
    <div class="header-painel">
        <h2>Painel Admin <span class="text-warning">Kings Burger</span></h2>
        <div class="w-100 mt-2">
            <div class="card-prod border-warning">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="mb-0">Loja: <span id="txtStatus" class="badge bg-secondary">Carregando...</span></h4>
                    <div class="form-check form-switch scale-150">
                        <input class="form-check-input" type="checkbox" id="switchStatus" onchange="alterarStatusLoja(this.checked)">
                    </div>
                </div>

                <label class="d-block mb-1">Dias de Funcionamento:</label>
                <div class="dias-semana" id="gradeDias">
                    <div class="dia-btn" data-dia="0" onclick="toggleDia(this)">D</div>
                    <div class="dia-btn" data-dia="1" onclick="toggleDia(this)">S</div>
                    <div class="dia-btn" data-dia="2" onclick="toggleDia(this)">T</div>
                    <div class="dia-btn" data-dia="3" onclick="toggleDia(this)">Q</div>
                    <div class="dia-btn" data-dia="4" onclick="toggleDia(this)">Q</div>
                    <div class="dia-btn" data-dia="5" onclick="toggleDia(this)">S</div>
                    <div class="dia-btn" data-dia="6" onclick="toggleDia(this)">S</div>
                </div>

                <div class="row g-2 align-items-end mt-2">
                    <div class="col-5">
                        <label class="d-block">Abertura</label>
                        <input type="time" id="horaAbre" class="form-control form-control-sm">
                    </div>
                    <div class="col-5">
                        <label class="d-block">Fechamento</label>
                        <input type="time" id="horaFecha" class="form-control form-control-sm">
                    </div>
                    <div class="col-2">
                        <button class="btn btn-warning btn-sm w-100" onclick="salvarHorariosKings()">OK</button>
                    </div>
                </div>
            </div>

            <div class="text-end mb-4">
                <button class="btn btn-outline-info btn-sm me-2" onclick="migrarArquivoParaFirebase()">📥 Importar JSON</button>
                <button class="btn btn-success btn-sm me-2" onclick="novoProduto()">+ Novo Item</button>
                <button class="btn btn-warning btn-sm" id="btnSalvar" onclick="salvarNoFirebase()">☁️ Salvar Cloud</button>
            </div>
        </div>
    </div>

    <div class="card-prod mb-4" style="border: 1px dashed #0dcaf0; background: #1a1a1a;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0 text-info">🎟️ Gerenciar Cupons</h4>
            <button class="btn btn-outline-info btn-sm" onclick="novoCupom()">+ Novo Cupom</button>
        </div>
        <div id="listaCuponsAdmin">
            <p class="text-center text-muted small">Buscando cupons...</p>
        </div>
    </div>

    <div id="listaProdutos">
        <p class="text-center text-muted">Carregando cardápio...</p>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
        authDomain: "myproject26-10f0e.firebaseapp.com",
        databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
        projectId: "myproject26-10f0e",
        storageBucket: "myproject26-10f0e.firebasestorage.app",
        messagingSenderId: "884850608032",
        appId: "1:884850608032:web:79db6983346c3c20edc6c5"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let produtos = [];

    // --- FUNÇÕES DE INTERAÇÃO ---
    function toggleDia(el) {
        el.classList.toggle('active');
    }

    // --- GESTÃO DE STATUS E HORÁRIO ---
    db.ref('configuracoes/statusLoja').on('value', (snapshot) => {
        const data = snapshot.val();
        const txt = document.getElementById("txtStatus");
        const sw = document.getElementById("switchStatus");
        
        if (txt && sw && data) {
            const aberto = (typeof data === 'object') ? data.aberto : data;
            txt.innerText = aberto ? "Aberto" : "Fechado";
            txt.className = aberto ? "badge bg-success" : "badge bg-danger";
            sw.checked = aberto;

            if (data.horarioAbertura) document.getElementById("horaAbre").value = data.horarioAbertura;
            if (data.horarioFechamento) document.getElementById("horaFecha").value = data.horarioFechamento;
            
            // Marcar os dias ativos na tela
            const diasAtivos = data.diasAbertos || [];
            document.querySelectorAll('.dia-btn').forEach(btn => {
                const diaNum = parseInt(btn.getAttribute('data-dia'));
                if (diasAtivos.includes(diaNum)) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }
    });

    function alterarStatusLoja(novoStatus) { 
        db.ref('configuracoes/statusLoja').update({ aberto: novoStatus }); 
    }

    function salvarHorariosKings() {
        const abre = document.getElementById("horaAbre").value;
        const fecha = document.getElementById("horaFecha").value;
        
        // Coletar dias marcados
        const diasMarcados = [];
        document.querySelectorAll('.dia-btn.active').forEach(btn => {
            diasMarcados.push(parseInt(btn.getAttribute('data-dia')));
        });

        if (!abre || !fecha) return alert("Preencha os horários!");
        if (diasMarcados.length === 0) return alert("Selecione pelo menos um dia da semana!");

        db.ref('configuracoes/statusLoja').update({
            horarioAbertura: abre,
            horarioFechamento: fecha,
            diasAbertos: diasMarcados
        }).then(() => alert("Configurações da Kings Burger salvas! ✅"));
    }

    // --- GESTÃO DE PRODUTOS ---
    async function carregarProdutos() {
        db.ref('cardapio/produtos').on('value', (snapshot) => {
            const data = snapshot.val();
            produtos = data ? (Array.isArray(data) ? data : Object.values(data)) : [];
            renderizar();
        });
    }

    function renderizar() {
        const lista = document.getElementById("listaProdutos");
        if (!lista) return;
        lista.innerHTML = produtos.length ? "" : '<p class="text-center text-danger">Nenhum produto.</p>';
        produtos.forEach((p, i) => {
            lista.innerHTML += `
            <div class="card-prod">
                <div class="row align-items-center">
                    <div class="col-md-1 text-center"><img src="${p.image}" onerror="this.src='https://via.placeholder.com/100?text=Sem+Foto'"></div>
                    <div class="col-md-3 col-12"><label>Título</label><input class="form-control" value="${p.title || ''}" onchange="editar(${i}, 'title', this.value)"></div>
                    <div class="col-md-2 col-6"><label>Preço</label><input class="form-control" type="number" step="0.01" value="${p.price || 0}" onchange="editar(${i}, 'price', this.value)"></div>
                    <div class="col-md-2 col-6"><label>Categoria</label><input class="form-control" value="${p.categoria || ''}" onchange="editar(${i}, 'categoria', this.value)"></div>
                    <div class="col-md-3 col-10"><label>Imagem</label><input class="form-control" value="${p.image || ''}" onchange="editar(${i}, 'image', this.value)"></div>
                    <div class="col-md-1 col-2 text-end"><button class="btn btn-outline-danger btn-sm" onclick="excluir(${i})">X</button></div>
                    <div class="col-12 mt-2"><label>Ingredientes</label><input class="form-control" value="${p.ingredientes || ''}" onchange="editar(${i}, 'ingredientes', this.value)"></div>
                </div>
            </div>`;
        });
    }

    function editar(i, campo, valor) { produtos[i][campo] = (campo === "price") ? parseFloat(valor) : valor; }
    function excluir(i) { if (confirm("Excluir item?")) { produtos.splice(i, 1); db.ref('cardapio/produtos').set(produtos); } }
    function novoProduto() { produtos.unshift({ title: "Novo Burger", price: 0, categoria: "burger", ingredientes: "", image: "" }); renderizar(); }
    function salvarNoFirebase() { 
        const btn = document.getElementById("btnSalvar"); btn.innerText = "⏳..."; btn.disabled = true;
        db.ref('cardapio/produtos').set(produtos).then(() => alert("Cloud Atualizado! ✅")).finally(() => { btn.innerText = "☁️ Salvar Cloud"; btn.disabled = false; });
    }

    // --- GESTÃO DE CUPONS ---
    function renderizarCupons(cuponsObj) {
        const container = document.getElementById("listaCuponsAdmin");
        if (!container) return; container.innerHTML = "";
        if (!cuponsObj) { container.innerHTML = "<p class='text-muted text-center small'>Nenhum cupom.</p>"; return; }
        Object.entries(cuponsObj).forEach(([id, c]) => {
            container.innerHTML += `
            <div class="bg-dark p-2 mb-2 rounded border border-secondary row align-items-center mx-1">
                <div class="col-md-4 col-12 mb-2"><label class="text-info small">Código</label><input class="form-control form-control-sm" value="${c.codigo}" onchange="editarCupom('${id}', 'codigo', this.value.toUpperCase())"></div>
                <div class="col-md-3 col-6"><label class="text-info small">Valor</label><input class="form-control form-control-sm" type="number" value="${c.valor}" onchange="editarCupom('${id}', 'valor', parseFloat(this.value))"></div>
                <div class="col-md-3 col-6"><div class="form-check form-switch mt-3"><input class="form-check-input" type="checkbox" ${c.ativo ? 'checked' : ''} onchange="editarCupom('${id}', 'ativo', this.checked)"><label class="ms-1 small text-white">${c.ativo ? 'ON' : 'OFF'}</label></div></div>
                <div class="col-md-2 col-12 text-end mt-2"><button class="btn btn-sm btn-outline-danger w-100" onclick="excluirCupom('${id}')">🗑️</button></div>
            </div>`;
        });
    }
    function novoCupom() { db.ref('configuracoes/cupons').push({ codigo: "NOVO10", valor: 10, tipo: "fixo", ativo: true }); }
    function editarCupom(id, campo, valor) { db.ref(`configuracoes/cupons/${id}`).update({ [campo]: valor }); }
    function excluirCupom(id) { if(confirm("Excluir?")) db.ref(`configuracoes/cupons/${id}`).remove(); }
    db.ref('configuracoes/cupons').on('value', (snapshot) => renderizarCupons(snapshot.val()));

    async function migrarArquivoParaFirebase() {
        if (!confirm("Confirma importação JSON?")) return;
        try {
            const resP = await fetch("content/produtos.json?v=" + Date.now());
            const dataP = await resP.json();
            if (dataP.produtos) await db.ref('cardapio/produtos').set(dataP.produtos);
            alert("Sucesso! ✅");
        } catch (err) { alert("Erro."); }
    }

    const SENHA_MESTRA = "Kings@20BR26burger"; 
    let timerInatividade;
    function verificarSenha() {
        if (document.getElementById("admin-pass").value === SENHA_MESTRA) { document.getElementById("lock-screen").style.display = "none"; resetarTimer(); }
        else alert("Incorreta!");
    }
    function bloquearPainel() { document.getElementById("admin-pass").value = ""; document.getElementById("lock-screen").style.display = "flex"; }
    function resetarTimer() { clearTimeout(timerInatividade); timerInatividade = setTimeout(bloquearPainel, 600000); }
    document.addEventListener("DOMContentLoaded", bloquearPainel);
    document.onmousemove = resetarTimer; document.onkeypress = resetarTimer;


    
    // Função para verificar se a loja deve fechar sozinha
function verificarFechamentoAutomatico() {
    db.ref('configuracoes/statusLoja').once('value', (snapshot) => {
        const data = snapshot.val();
        if (!data || !data.aberto) return; // Se já estiver fechado, não faz nada
        const agora = new Date();
        const horaAtual = agora.getHours().toString().padStart(2, '0') + ":" + 
                          agora.getMinutes().toString().padStart(2, '0');
        // Se a hora atual for igual ou maior que a hora de fechamento
        if (horaAtual >= data.horarioFechamento) {
            console.log("Horário de fechar atingido! Desligando loja...");
            alterarStatusLoja(false); // Chama sua função que já existe para fechar
        }
    });
}

// Executa a verificação a cada 30 segundos enquanto o painel estiver aberto
setInterval(verificarFechamentoAutomatico, 30000);

    carregarProdutos();
</script>
</body>
</html>
